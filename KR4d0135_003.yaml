body:
  text: 宗忠簡集卷三宋宗澤撰記賢樂堂記巴别乘治廨之北有地數畝荒穢不治其日久矣自熙寧命倅以來凡更二十餘政間有好事者足跡及之往往掩鼻蹙額唾之而去其他則未嘗過而問也宣和六年春朝廷以僕承乏郡二視事屢月日有暇矣因一訪焉為之躊躇四顧怡然有得于心者噫天下佳處嘗藏於衆人不識之地而臭腐化為神竒且物有是理則兹境也未必不待我而後顯又烏知僕之意不出於造化之所使耶於是斬荆棘鋤蓬茅易敗壞泄汙潦因髙而基之就下而鑿之首構一堂獨擅羣勝四山回環如列屏嶂爭雄競秀來人目中巖花春盛木葉秋落於此可以鑒榮謝岫雲朝出林翮暮歸於此可以喻出處非特是也堂之東濬為方池植竹以環其峯强名曰竹溪臨溪為小閣目曰思逸於是可以想見徂徠之侣依翠隂俯清漣放浪沈飲髙吟大笑於清聖濁賢之間脫然逺跡於聲利之場也堂之西洄為曲池種桃以復其島强名曰桃溪跨溪為小橋目曰訪隱于是可以想見武陵桃源流水瑩碧落英泛紅漁舟之子訪昔隱人夜半月明魂清骨冷灑然如出風塵之外也堂居其中衆美并見因榜之曰賢樂有客登堂而笑曰賢者之樂固如是乎僕因莞爾應之曰然客固不知也昔者惡木蔽天不剪不伐梟鴟捷鳴於其上今則桃李成蹊松柏如蓋春鶯鳴秋鶴唳矣昔者蔓草據地不芟不夷蛇蚖蟠伏於其下今則蘭杜夾徑芙蕖滿塘鴛鷺游嘉魚躍矣方時序之良景物之美揖賔友而進之游目堂上縱步堂下無復敗人意者賞心油然生矣或舉白痛飲或揮麈劇談或射或奕或琴或嘯披襟清徑㺯花香渚終日與魚鳥相樂恍然無異濠梁之觀海上之游也此其所樂人之所同者也若曰是地不過數十步山得無謝崑崙之髙乎水得無謝雲夢之大乎堂得不為大厦耽耽者羞乎不知一拳之石與泰山同體一勺之水與滄海同性堂髙數仞榱題數尺亦古人得志者所不為而吾耳目所寄方寸所寓自有至大者存雖在環堵之間曠兮曾無異乎廣莫之野無何有之鄉也此之所樂已之所獨者也人之所同其樂自外已之所獨其樂自內二境雖不同要之非賢者則不與知也客改容謝曰斯堂之名真得之矣余內外俱進矣願紀之以告豫之儔僕曰諾於是乎書義烏滿心寺鐘記宣和甲辰十一月十八癸巳如來以大悲心欲令衆生於十二時中因耳所聞生利益見不為欲所沈迷不為邪所障蔽斷除惡念滋種善根於是建置洪鐘以時撞擊俾有識無識虛懷聼受隨所聞聲夤緣入道譬如雷霆蟄驚凡牙甲昆蟲悉皆感悟所以者何日將旦羣動咸作奔趨爭逐擾擾競前於是警之廣令衆生起戒懼心暨至食時饑火煎迫噉涎貪噬腥羶無厭于是警之廣令衆生起齊潔心日之方中交易為市矜智嚇愚籠絡利巳于是警之廣令衆生起方便心昧谷斂昏隂邪氣盛一念差誤為盜為淫于是警之廣令衆生起畏懼心至夜未央神識俱晦夢想顛倒莫覺莫知于是警之廣令衆生起修省心人之云亡氣魄隨去倀倀冥行莫知所趨于是警之廣令衆生起依歸心如是等心悉繇中起念念勿絶證無上緣因知衆生因鐘以聽其聲因聲以考其意因意以明其心因心以㑹其道如來所寓思𢎞濟人滿心古精剎也形勢盤礴據湖山之勝舊雖有鐘形度小瑣發響焦急無從容韻寺僧有宗遍募擅越弋陽主簿葉天將捐財倡之寺衆環喜和者㳫至於是大體鈞模采鳬氏法規天地以為爐翕隂陽以鼓氣回祿騰焰飛亷助威熠耀璀燦融爍銷液神施鬼設一瀉而就頂蟠蒼虬蠖蛇鈎搦徽以金索懸置挈之隱隱闐闐滿虛空界應四生六道濡滯幽冥聽此法聲悉皆解脫兹勝事也樂為頌云人得是身不自愛重貪殘暴忍長惡弗悛劫劫輪回歷盡苦報如來悲憫以鐘代言俾衆生聞警覺省悟隨聲懺悔滋益善心豫適宰官代佛宣說願咸諦聽無量無邊公忠義得于性學顏淵季路嫡𣲖正宗而時獵釋氏之精以助我法此鐘記分明從戒懼不聞雞鳴平旦中討出不第作海潮音也正德間寺改為文廟三乘金鐃地頓作千秋木鐸天殆此記文心實隂啓之耶鐘猶在明倫堂西序之懸欵識隆隆古色照人向亦無人知為宗公手澤者余每朔望登堂鼓鐘與羣弟子起恭敬心隨聲滋益肅然先覺之言提其耳也熊人霖識重修英惠侯義濟廟記巴子之國逺在西南一隅封爵卑而土地廣自秦伐蜀時師還滅之以其國為郡曰巴郡西漢因之列郡境為宕渠等十餘縣東漢又於宕渠之北置漢昌縣元魏延昌中遣將平蜀始以其地為州曰巴州則今之巴州實昔巴郡之屬封也故州有巴郡太守嚴將軍事劉璋名顔沒千有餘載巴人事之如存嵗月追祀而歌舞之若嘗親見其人躬被其惠澤不可忘者凡過其門無老壯賢不肖必以手加頂至于再三如神真在其上以至雨暘之愆疾病之苦率詣祠禱之無或不驗前後郡太守數上其事于朝朝廷嘉之既錫之廟號又封之侯爵其所以旌寵神德至渥也宣和四年冬公被命出守其邦下車之三日謁于侯廟禮甚恭明年春閔雨秋復潦皆有請于神昭答如響嵗則大熟六年秋郡國修常祀公至祠下視其堂廡弊甚因顧其屬曰嚴侯實在祀典且有德于巴人今棟宇傾壞支以他木上漏下濕不芘風雨人不可舍其下神其肯安之乎傳曰誰敢不齊肅恭敬致力於神矧是州年榖屢豐朝廷德澤下流饑者哺勞者息囹圄空虛盜賊不作民安且治矣致力於神適其時也乃擇屬吏之事事而敏者委以完繕且戒之毋取於民毋勸於衆繇太守而下爭出俸錢以助其費數有差皆不約而從也始事之日羣心欣愈工不候呼而集材不俟鳩而足陶甄致良剞劂致巧易腐以堅代撓以直增卑而使髙廓隘而使廣欹者正之潰者起之昏汚者飾之晦朔不再匠氏告成公乃率僚佐落而祀之公親為祝辭以告之禮成就次衆皆曰事神若是謂無負矣曰謂僕紀其事僕曰然夫智有餘者常不足於忠勇有餘者常不足於義僕竊謂嚴侯兼之方先主之將入蜀也劉璋既遣法正結好發兵協助逮其來也親出都城三百里與之㑹飲百日璋巳墮先主彀中曾不少悟侯獨拊心嘆曰所謂獨坐窮山放虎自衛非曰智而忠乎及張飛擁大兵而西勢欲吞噬巴蜀郡縣聞之不棄城走則閉門降惟侯領一州之卒以死拒敵力屈被獲猶數飛而罵之且曰我州有斷頭將軍無降將軍飛怒將斬顏色不變終不少屈非曰勇而義乎嗚呼侯之赤心烈火之赫侯之徑氣金石之堅智足以謀而惟忠是效勇足以斷而惟義是為使之遭盛時佐明王任之大事假以重權必能奮不顧身行其所志而盡其所長勳烈之偉名節之顯當與古社稷臣比肩矣惜乎生而不幸委質於僣竊之牧使功名不顯於天下死而不幸史臣不為立傳本末不見於後世僕每讀張飛傳見侯行事未嘗不廢卷太息而為之橫涕也抑世之士大夫有以柔聲媚色期就軟熟巧為進取冒躐華要或不得已而補外猶竊名藩巨鎮坐尸寵祿一旦事出非意神氣駭奪莫知為計甚至於變服雜庸匿田舍中以幸苟生俾一方生靈魚肉賊手國家果何賴於鼠輩為哉然則嚴侯之忠誼誠可尚也宜乎血食巴土萬世而無替義烏景德禪院新建藏殿記夫百億妙門三藏為總大哉利生之本不可得而思議也如來出世以大士因緣示悟衆生繇一道清淨用一音演法機感不同而所聞亦異故五時五味半滿權實圓機定假之義播列諸部星躔霞布沒世不能誦其文終身不能發其藴於是彌勒大士闡大方便聚諸經以歸三藏使流通教典盡載一輪塵沙法門同歸一揆倘衆生信而揚之則不須朝講暮習於彈指頃間含受法要心怡神悅蕩釋諸苦發探蒙愚展迪聾瞽復性命之真救迷妄之失可不謂無窮之利乎烏傷之北附縣一舍有院曰景德肇荒於唐山主琳師始建經藏寫經律等僅一百函師歸寂缺而不講越治平二年院之徒契湜遍募士庶經滿其數置函五百成卷五千有八星環金晃墨寶珍嚴燦然煥赫顧舊藏不足以容時竊景慕至元豐中居士葉詵崇信佛法誠謂長者一旦發念出家聚材孱工作轉輪以廣其度住持沙門契海又化檀信益為經理其屋十八楹越二年畢乃告成隆廈廣闊飾以珠貝華輪盛麗負以虬龍窮極雕繪間錯文藻內外一新逺近信仗四方之人皆得轉輪是猶振風之過衆竅甘雨之成百榖然後美根長固惡蔓除滅芬芳嘉實皆得饒益設有下愚至賤之人若見若聞或瞻或禮隨其根莖各有所潤譬夫饑者入太倉觀夫榖粟雖未得食固知可以飽其饑矣病者之藥肆觀夫劑料雖未投藥固知可以療其病矣以此法味永施衆生則饑能充而食難盡病有止而藥無窮究其㫖歸何須外求周旋於方寸運動於日用從容中道左右逢源動無所牽止無所纍行無所遮奚俟輪哉今觀葉氏所謂藏者如是如是至於布琅函列朱軸誠為除衆生饑病方便法也銘宗汝賢墓志銘先大夫四子嶧灝二弟皆少亡惟兄與某自幼歷艱辛某既忝一命惟兄服勤力穡肯播肯穫以克幹裕厥家某嘗愧弗獲朝夕相從事意謂投老當奉几杖於東臯西疇優游以憑化遷及方丐宮祠浸圖為休致計不幸以罪斥繼而睦寇竊發橫肆焚劫衣冠良善尤被害兄逼凶焰遑遽挈妻孥奔避山林間昏夜迷誤因溺死實宣和辛丑二月二十四日也是時路尚梗逮閏五月始聞訃嗟乎兄之積行乃罹斯禍耶某失怙恃繄兄是賴聞問痛弗自勝即寄書諭稷曰汝父存某既不能相倚以生今亡又不得撫棺號慟以盡哀所可報友愛者惟襄奉耳汝舉葬宜俟某躬與執紼庶酬夙志稷卜地協吉泣血來告某啓緘梗塞且自言曰吾尚忍銘吾兄耶然義不當辭兄諱沃字汝賢世為婺州義烏縣人曽祖惠祖拱皆不仕父舜卿贈朝散大夫母劉氏贈太宜人兄始娶劉氏先兄卒再娶時氏享年六十有七兄天姿夷曠撥置邊幅直情徑行靡所阿徇事親孝於飲食起居際時作諧語慈顔每為囅然一笑平居怡怡無慘沮意甘疏淡氣不下人未嘗以圭撮干親舊亦未嘗以㸃墨擾州縣喜賓客曽不顧供具有無朋游中有倚豪富作氣勢陵轢貧下或掩其不善而見其善者兄於廣坐中直以理折之彼雖暴戾心自愧服鄉人欲作一不義事必先畏縮曰宗汝賢知之定衆辱我矣以是俗多敬慕五子曰愈兩貢於禮部曰三六少俊爽皆先兄卒曰稷謹願有志趣能訖大事曰臯曰䕫皆勉學稷卜宣和丙午正月乙酉葬兄於同義鄉新塘原泣而為之銘銘曰兄任直心不生虛妄惟是寡求故氣不喪諸子詵詵蔚有趨向善之所鍾神自來相他日錦章賁松阡上歸安兹丘慰斯人望葉處士墓志銘公諱桐字彥倫其先睦州人五世祖徙居婺之義烏後宅里人祖迎父遜潜德不仕公天資沈靜偉特始居貧約生理日蹙因擇地之廣口見層巒沃壤築居其間治家先勤勞不妄取諸人而生日裕不私蓄諸已而用必舒本末緩急咸得其宜常自言曰養身可矣養其心者可失乎為今計可矣為厥後計可緩乎觴詠固可樂豈若田園之樂深籝金固可積豈若詩書之積久乃依山原緝園亭四方賓客過其門者延之無虛日一時英才碩德咸發胸中之藴與其子孫遊講明為學之方皆嚴整無他好公亦游泳其間讀古人典要自得真趣鄉里皆稱為處士紹聖元年四月以疾終享年七十有五娶錢氏一子曰琳克孝克倫不幸先亡公哭之慟雖諸孫敬養更侍甚於平日終鬱鬱不釋嘆曰每期諸子事余終某天年今若此非天喪我乎未朞遂亡一女適駱氏孫男四長義鄉貢進士次䇿筠太學生幼筌三年十月甲申葬于邑之永安鄉方丈塢余嘗受知於公之季氏熟公言行來請銘乃弗果辭銘曰氣偉特兮性溫厚躬儉約兮致豐厚樂田園兮得所守資詩書兮貽厥後與山嶽兮齊其夀石可壞兮銘不朽陳公墓志銘公處麗水人幼喪母隨其父僑寓因與先人遊遂相結為義兄弟某省事即尊奉公若叔公撫視某猶子也後雖為姻家而眷眷克恭如念天顯未嘗一日替先人中疫氣病幾死至親無肯過門者惟公不忍離側凡藥餌必嘗而後進某護先人喪歸自膠水公迎之路撫棺號慟哀感行路人先人諱日公躬走佛剎薦奠以叙追悼意公與先人自幼至老自老至死巳死且不忘每語及必梗塞泣下嗚呼公有實德於某曾未一報今乃云亡墓隧之刻非某其誰宜為公諱允昌字得全今為婺之義烏人三世皆不仕曾祖桓祖生父居昱母魏氏公父某尚及見之龎厚溫粹與人侃侃言必以誠獨生公公娶霅溪潘氏先公卒公自幼特立嚴正而和疏通而信惟喜佛思淨覺心求寂滅趣於是屏居小室宴坐湛然離諸染著凡所酬對取靜為證無毫留礙事如老尊宿常梵行者一方鄉人有訟必質公公為剖析理道定論曲直又飲之酒以和之故凶悍狡獪愧服無復敢譁間有窘乏不吝假貸怠慢者諭以勤浮侈者諭以儉漫浪不謹者諭以修飭不獨隨宜周濟而必寓之教焉里有喪不問識與不識常備棺櫬以副其求若急難所需無少難色以是鄉人依歸愛慕若疏若戚若逺若近咸不言姓名止以公稱之惡少不逞輩不敢造公門或持縣檄至必唧唧下氣怡聲惟恐公聞知此非有力脅持之也皆自心悅誠服如是爾公享年八十八未亡前一月屏去茹葷浸不欲食但飲沉香水三日百無所苦神識不亂以宣和壬寅十一月十二日若睡而逝兹逮學佛積善所致然也公一子一女子昻迪功郎前任邵州新化簿公薨背後哀苦毁瘠去公九十日而卒女適遊士傅璨孫詩懋於學公不欲其去膝下强納粟為太廟齊郎曾孫敦仁敦義敦禮敦智敦信曾孫女四人卜以宣和癸卯十二月乙酉葬公於永安鄉卞岩原使來乞銘某不敢以廢學辭謹為之銘銘曰公坐一室心自內觀了知六塵皆見幻妄故於財色盡欲逺離方寸泊然清淨圓滿公無所住豫復何言兹强銘公聊示爾後尊翁之懷惟某深知之故樂為之銘數日究心方能成此切不可令人改動一字如不可意請托能者别作仍為寫一本燒靈前庶少慰亡靈至扣至扣某上聞陳評事墓志銘某先父行巳謹且信不泛交游與公相厚善情好既篤遂結為姻家今公之孫暘以書告某曰暘祖安厝有期願丐銘藏諸幽暘某甥也某公壻也義不可辭公陳姓系出有媯世為婺之義烏人曾祖祖父皆晦迹不仕公諱裕字寬夫天資莊重不妄嬉笑不輕然諾孝於親母年九十餘公下氣怡聲左右承順起居飲食必躬省視出入戀慕不啻如童稚時二兄一弟疏懦不立公俯仰友愛相怡怡至老不少懈嘗聞禮記云毋不敬公曰嘻果能行此一句即不失為善人君子某幼聞是語暨長觀公褆身接物循循侃侃其與鄰里不問長少必委蛇致恭毋敢慢有以急難告者隨分周濟見樵牧子亦推誠遇之使僕妾未嘗形之色聚族數百指閨門雍肅中外姻戚咸以長者稱娶劉氏享年八十有六某年某月某日以疾卒于正室垂死神識沖靜殆平生樂善寡欲之致也男六人曰什和易孝友踐履如公曰錫處太學以文行馳名及進士第朝廷除復州教授二子不幸皆先公卒曰伋曰備曰成曰鏜咸修謹克家女三人長適劉哲次適宗嶧幼適某孫男七人長孫宗哲醇厚可喜亦少亡次宗暘以武舉進士第試吏密之安丘尉方力爽邁當塗交章薦之曰宗益曰宗臯曰宗卨曰鼐曰昭兩預鄉薦孫女十人曾孫男一十七人曾孫女五人伋備成鏜卜以政和丙申某月某日葬公於祖塋之側某自幼與公子錫游且係葭莩之末知公之所存為詳銘曰修之家其德乃真盟之獨其行乃惇嗚呼如公是宜慶流衍溢而俾子孫振振宗忠簡集卷三
