body:
  text: 宗忠簡集卷六宋宗澤撰雜著寧國長老語録序趙州柏子果是分明靈雲桃花更無疑惑一宿不為迅速九年未是遲延萬法只是一門千口豈有兩舌寧國堂頭宗乘東道覺路南車儒釋兼通死生了達包藏無礙常發大慈悲心度接有緣默傳正法眼藏如某愚昧願師提撕濟我無底舟航還我未生面目深悟筌蹄之要證此上機姑有土苴之餘寓諸方册閿鄉麻衣寺瘦佛畫像贊壁上瘦者乃人天師非病維摩亦非辟支學道雪山跏趺忍飢中包太虛外示清羸方其瘦也一麻一麥鬢髮如蓬巉巗面骨及其肥也丈六金身相三十二為佛世尊非我癯儒亦非飛仙願此法身充滿大千是故合掌作此偈言題珣師休牧軒頌青居曾露一絲頭謾示人能解牧牛究竟本來無一物未知能使阿誰休一乘休去已忘機恰似當初未牧時雲起雲消本無迹有為全體是無為空餘短笠與輕蓑道著休時事早多更向中間問消息夜深無奈月明何告金天廟文維嶽雄峻維神司之雲雷翕張神固專之作帝金天號位髙明云胡戎醜竊我盛名夫金者奠方則為西制器則為兵論幣則為上鍾人則為英厥號耿光可享維神彼敵無知擅于厥身匪國之殃繄神之讐神弗殄誅為神之羞大發隂兵百萬其師怒目張牙龍甲豹皮彍弩橫刀鐵騎沓馳助我羆熊戮彼鯨鯢神以獨尊祀以不隳借神威靈一掃無遺請寧國再開堂疏伏以山上浮雲本無心於去就海中潮水豈有意於往來無非時節因緣要識卷舒任用寧國堂頭自家衣鉢非徒庾嶺傳來心地泉源便是曹溪流出吞盡三世諸佛跳出四面八方七縱七擒縱橫妙用三仕三已喜愠不生何妨舊店重開可謂前燈復續珠還合浦鶴返故巢正當恁麼時請説這箇法請海長老住蘇溪崇德疏伏以萬法本空一性圓寂撚花鷲嶺曾虧一笑之瑕面壁少林猶病多言之失必也忘真俗之二諦泯色空之兩途自非圓頓之流曷致機筌之用某人長老洞明宗旨深達祖風始出世於治平實印可於法湧退藏密旨栖心彌勒之道場重振宗乘示迹法輪之古剎人天共集凡聖瞻依會須振領提綱十方坐斷若也超佛越祖一線不容除是慣戰作家能具正法眼藏既登寶座願振潮音俯徇衆情無煩退托請舉老住滁州寶林靈山正法眼本從微笑傳來金粟不二門亦向無言悟入必將説難説之法相與參未參之禪灼然開口便差須是當仁始得某人導雲門之一派住龜鷲之三春祖風夙振於淮壖道價浸髙於海內屬寶林之虛席合衆剎以謀師既蒙赴感於隨緣何異逢場而作戲前日琅琊席上巳示老婆心只今襄水岸頭佇聞獅子吼為華州作延請晝老疏義標第一建特地之伽藍語揭前三屹衝天之窣堵雖伏神龍之暗護亦資象數之冥搜不有當仁豈容作禮某人性融圓覺迹契因緣定裡光明入惠持之境界句中法令得智老之門庭願解禪包來提祖印奮拳擲臂宜借掌於巨靈舉拂拈鎚試拔蓮於玉井不憂末劫端是本心千手眼大悲偈千手一手用千眼一眼觀用觀無差殊何必許多般覽鏡偈覽鏡影還在掩鏡影還去試問鏡中人却歸什麼處盧行者偈休問東西南北莫説之乎者也直饒神秀文章不似老盧行者佛説偈後學要説禪教人學圑謎佛祖意分明但為傳衣鉢宗忠簡集卷六
