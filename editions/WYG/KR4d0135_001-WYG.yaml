body:
  text: 宗忠簡集巻一宋宗澤撰劄子上大元帥康王劄子某恭惟太祖皇帝創業垂統當傳之億萬世今方二百年豈謂仇方横肆邀迎二聖與諸親王渡河北去天下百姓所注耳目繫其望者惟大元帥康王一人大元帥行之得其道則天下將自安宗廟社稷將自寕二帝二后諸王將自回彼之仇方將自剿絶殄滅大元帥行之不得其道則天下從此而亂宗廟社稷亦從此而傾危二帝二后諸親王無夤縁可回仇方愈熾亦無因縁而亡此事在大元帥行之得其道與不得其道耳某所謂道者其説有五一曰近剛正而逺柔邪二曰納諫諍而拒諛佞三曰尚恭儉而抑驕奢四曰體憂勤而忘逸樂五曰進公實而退私偽是五者甚易知易行然歴世莫能知能行者繇剛正諫諍恭儉憂勤公實之事多逆於心也柔邪諛佞驕奢逸樂私偽之事多遜於志也伊尹曰有言逆于汝心必求諸道有言遜於汝志必求諸非道合諸道者君子也合諸非道者小人也願大王於應酬答問之間以兹五事卜驗則君子小人了然分矣某之血誠痛切每思我宋本嗣無疆今勢孤危岌嶪如此某願大元帥大王左右嘗膽不忘在濟時夙夜羹牆不忘我祖宗時則天下可安宗廟社稷可寕二帝二后諸王可回仇方雖熾可剿絶殄滅夫何逺之有在大元帥大王力行之而巳條畫四事劄子臣聞情生於愛愛生於見見生於目之所遇與左右之所接所遇所接果順於已則喜喜則賞之賞之者非懋其功也賞其順已而巳耳所遇所接果逆於已則怒怒則罰之罰之者非罰其罪也罰其逆已而已耳如是則賞罰出於喜怒喜怒出於逆順可謂之公而無私乎賞罰徇私其何以礪世磨鈍大有為於天下乎聖人無我故忘情忘情故忘逆順忘逆順故忘喜怒故賞一善而天下之為善者勸知其非私善也罰一惡而天下之為惡者沮亦知其非私惡也一賞一罰歸之至公而我無容心焉人其不心悦而誠服者乎陛下所以號令天下使人知所趨知所避知所行知所止者賞罰而已昔文王一怒而安天下之民武王亦一怒而安天下之民是怒也豈發於目之所遇與左右之所接哉彼仇方横肆兇暴侵犯我王室臣願陛下如文王武王亦一怒而安天下之民有賞有罰惟平惟一至于應酬萬機進退取予之際斷之至公以慰天下之望臣聞人君職在論相昔舜有天下選於衆舉臯陶不仁者逺湯有天下選于衆舉伊尹不仁者逺臯陶賛舜去四凶而後九徳咸事庻績其凝伊尹賛湯革夏而後咸有一徳格于皇天是知不仁者逺不能播其惡于衆始能使衆賢和於朝更相汲引以成大功也以人君身居九重其彌縫燮理鎮撫表正但仰成于朝而已髙宗得傅説而商中興憲宗得裴度而唐中興臣願陛下于稠人廣衆中不以親疎不以逺近不以夢不以卜虚心考驗叅以國人左右之言爰立作相俾之應變守文果得其人能率厲衆志交修不逮其在位皆節儉正直小大之臣咸懐忠良以持天下之正以成天下之務天下其有不大治者乎陛下果尊道徳逺邪佞與大臣言欽而信毋使小人叅焉與賢者遊親而禮毋使不肖者與焉用賢勿貳去邪弗疑斯言行而天下治矣書曰知之非艱行之惟艱知之不行無益也行之不至無益也兹事在陛下力行之而已矣臣伏聞李絳見憲宗于浴堂殿帝曰比諫官多朋黨論奏不實皆陷謗訕欲摘其尤者如何絳曰此非上意必憸人以此熒誤上心自古納諫昌拒諫亡夫臣進言于上豈易哉君尊如天臣卑如地加以雷霆之威彼晝夜思度如欲陳十事俄而去五六及將以聞則又憚而削其半故上達者纔十二何哉干不測之禍顧身無利雖開納奬勵尚恐不至若譴訶之使杜口非社稷利帝曰非卿之言我不知諫之益且人君深居嚴密又以旒纊蔽其聰明所以見天下之是非開天下之情偽者盖用諫官代為耳目俾姦邪䜛慝不敢掩其不善而見其善者也唐髙祖太宗初即位嘗賞孫伏伽蘇世長以激諫臣恭惟陛下聲色貨利弗邇弗殖舍己從人樂取諸人以為善固無可諫者至於臣下懐姦藏慝嫉賢蔽善敢肆欺罔茍朋比者當使耳目之臣廣其聞見瀝心彈糾毋有所隐以絶後艱臣聞天下之事為於可為之時則成為於不可為之時則敗成敗之機間不容穟是以古人有時哉不可失之語恭惟陛下繼離之照法乾之剛故見幾而作炳果斷而罔後艱成敗之幾不出昭回之鑒臣復何言臣誠心祗思徇國久荷眷遇臣非木石能不自知然臣每見事有當行請之必力言既拙直勢甚孤危願陛下察臣之衷力賜保祐使全骸骨以盡餘年臣之誠言不盡意奏乞過河措置事宜劄子臣契勘河北西路真定懐衛濬等處見有敵人占據今又分留敵馬於洺州四向劄寨密栽鹿角意欲攻打若河西諸州不守即彼之姦計包藏不淺京師雖為備禦未易可居臣為見有上件事宜巳於今月初七統押人馬自游家渡過河會約河西忠義統制等商議随宜措畫若事理可行即一靣招集同心協力以圖收復安集流移為久逺利若敵勢厚重不可施行即具所見利害的確便宜畫一敷奏伏望聖慈體念河北繫天下根本河北不守則干戈弓矢豈易櫜戢臣每思前日之失盖繇將相恃賴太平恬不為恤朝進一言暮入一説惟以講和乞盟為意今更㳂襲不習武備臣竊憂之兵法曰先為不可勝以待敵之可勝臣不揆衰薾無能見過河相度别具奏聞者狀大元帥府勸進第二狀某等累狀乞大王早決大計以安人心伏惟降到劄子所請難議施行者屢布忱誠仰祈洞鑒兹叶寰區之願實繫宗廟之依豈謂隆謙未蒙昭允竊以四海之逺必發號施令然後上下孚必信賞必罰然後小大服深惟軍國之重可虚宸極之尊二聖播遷羣黎翹佇念祖宗積累垂無疆燾養之恩而仇方貪殘起不測侵陵之變有疎早悟遂致稔姦雲甲霜戈共力追於朔野天旌龍馭期早復於皇居然推戴有繫於人心況寄託巳彰於天意尚稽獨斷曷慰輿情伏望大王以聰明之資振久大光明之業以智勇之略弭變亂窺竊之風鞏固洪圖措安大器不得巳臨蒞赫乎羣目之瞻惟式克欽承亶乃萬方之聽某等無任祈求懇切俟命之至乞大元帥於南京開府狀契勘張邦昌久在敵中范瓊亦自草野中起恐其包藏隂與敵結凡事未可容易憑信某十日前因與汪闕咨目乞密禀大王且於南京開府想旬浹間便可如意一京城是祖宗應天受命長發之地二道路居中四方萬里便於申禀三臨下流諸處漕運尤易辦集四於拱寕屯兵為嚴守計五可斷北來餉道敵雖稔姦當自破滅却令某統領見所管諸處節制人馬盡數前去京城十里以來劄寨齎大元帥榜文敘哀痛懇切未忍遽歸瞻望宗廟朝廷與省府舊官閭巷父老相見哽噎眷眷之意觀人心徯佇懇切然後按轡徐行庻為萬全不至落敵姦便某下情不勝瞻慕之至切望哀亮血誠早賜施行信王咨目某咨目頓首上呈領尹元帥延康台座春和伏惟輔國宣勞神相忠勤台候多福某切以國家多艱金人入宼兩犯京城劫遷二聖下及血屬三千餘口長驅北去某到慶源遽謀逃竄得敵中忠義數人為力遂脱羶網今具河北事宜利害敷奏聖上竊恐姦臣賊子障蔽難達某素知公梗槩敢為竭節報國遂再具奏煩公多方繳奏使之得到御前得兵速至不勝萬幸自餘更冀上為廟朝倍保台重前膺大拜祝望之至不宣疏奏乞依舊拘留敵使疏建炎元年六月臣伏見我國家承平幾二百年數世戴白之老不識兵革上下恬嬉猶夷度日不復以權謀戰争為念乃以仇方誕謾為可憑信朝廷恬視不少置疑不惟不曽教人坐作進退擊刺挽射之技俾嚴攻討其間有實欲賈勇思敵所愾之人士大夫不以為狂則以為妄因循茍且以致仇方顛越不恭遂有前日之禍臣不勝憤恨然兹非仇方之能也皆繇無誠實之士皷倡驕逸率以斂跡逃避曲辱不恥為智為勇耳萬一有慷慨論列則掩耳不聽别造佞説以相浮動兹無他大抵只欲助敵張皇聲勢直為我祖宗一統基業更不當顧藉宜兩手分付與仇方耳嗟乎何不忠不義之甚也臣每思念涕泗交下繼之以血此天地神明之所昭鑒臣恭惟淵聖皇帝靖康之初信此和議俾敵大獲而歸去冬與今春夏仇方猖獗大臣柔邪諛佞蓄縮畏避者不敢略有抗拒語但以詭譎為誠實包藏為智謀緘默為沉鷙遂致二聖蒙塵后妃與親王無辜之民流離北去想陛下龍潜濟鄆嘗親聞見張邦昌耿南仲輩所為也陛下入繼大統即將前主和議者竄之嶺外使天下寃抑之氣一旦舒快自後臣竊聞陛下日與二三大臣論思講畫必欲大雪我廟朝之恥激厲卒伍勸率義士俾思剿絶以正夷夏不意陛下復聽姦邪之語又浸漸望和迂回曲折為退走計臣願陛下試一思之陛下初即位何故以講和為非遂逐當世議臣陛下近日又何故只信憑姦邪與仇方為地者之畫營繕金陵迎奉元祐太后仍遣省官迎太廟木主棄河東河西河北京東京西淮南陜右七路千百萬生靈如糞壤草芥略不顧恤比仇方遣姦狡小醜假作使偽楚為名來覘我大宋虚實臣見如是因納諫狀與留守范訥乞收仇方奉使之人置之牢狴奏取朝廷指揮庻激軍民士庻懐寃之心俾肯力戰仰賛陛下再造王室中興大宋基業之意今却令遷置别館優加特遇臣奉此詔命憂思涕泣心欲折死不知二三大臣何為於仇方情欵如是之厚而於我國家訏謨如是之薄臣每思京師人情物價漸如我祖宗時若鑾駕一歸則再造之功與中興之烈必赫奕宏大跨商周而越漢唐矣何姦邪之臣尚狃和議惶惑聖聰伏望陛下察之臣之樸愚不敢奉詔以彰國弱此我大宋興衰治亂之機也臣願陛下思之陛下果以臣言為狂願盡賜禠削投之瘴烟逺惡之地以快姦邪賊臣之心不勝痛憤激切之至條畫五事疏臣衰老孱愚誤膺簡記但思瀝竭知無不為凡所敷奏仰干天聽過蒙採納委曲俞允臣非木石豈不知感但有經從三省與樞密院事百端阻抑幾不可行臣欲隐忍不言首䑕承禀切慮事干國體臣雖萬死奈宗廟朝廷天下根本與數百萬生靈何臣所管留鑰與畿甸事所繫實大願陛下憐憫孤忠毋以近言惶惑聖聰臣且以近日三省樞密院戒約之文臣有五疑焉器甲械用衲襖㯶衫兵幕之類皆樁管準備不得擅有支遣今遣將出師此是軍中合用之物不可闕誤而先行椿管不容支遣此一可疑也臣近召募人於四城劄寨為守禦之備今承問所召募之人係是何等色額如此則古人使貪使愚者皆不可憑信矣二可疑也臣為見尋常防河只以數千卒伍沿河分布敵有數騎侵犯即奔走潰散不復支吾臣今合京畿十六縣内有兩縣瀕河共七十二里均之諸縣縣管四里有畸各令開河闊一丈八尺於南岸埋鹿角連珠劄寨敵有侵犯併力禦之已蒙聖慈矜允行之亦似允當今樞宻院行下約束只令依倣陜西以三七分為率三分出戰七分出助軍錢陛下念畿縣居民例遭殘破平時保甲十亡五六若止用此其寔無幾況重遭傷殘之餘勞來安集之猶恐散去又烏可以助軍錢阨之使速去耶此三可疑也今嵗守禦之具與城池之備雖巳粗辦尚多鹵莽未能如舊去處必須曉夕修造補葺繕備今三省樞密院指揮諸塲庫務如修城造器械見僱工役不令支錢今修城雜塲與軍器監入作司皆縮手無所為此四可疑也夫人之情無大小無貧富靡不懐鄉土顧妻孥戀墳墓舉千萬人貌雖不同情即皆一歴世聖王所以成天下之大順而得多助之至天下順之者以能順人之情而已矣臣伏想陛下貔貅扈從億萬之衆多西北人陛下無偏聽三四重臣之言試廣詢僉同叶從之輿論斷自淵衷以決行幸臣竊見僕射黄潜善樞密汪伯彥張慤皆無逺識見無公議論偏頗回遹惟富貴是念朝入一言暮入一説皆欲賛陛下南幸此五可疑也伏望聖慈察臣之忠聽臣之言早賜睿㫖再奏乞修寳籙宮疏臣昨奏乞修寳籙宫為淵聖皇帝他日涖止之所未蒙降㫖臣聞有子曰孝弟也者其為仁之本與知孝弟則不犯上不犯上則天下治矣恭惟陛下孝於道君則天下莫不愛其親陛下弟於淵聖則天下莫不欽其兄是知上有所好則下必有甚焉者矣此所謂以身教者也臣竊見隆徳宮面勢翬飛孔安如舊將來迎奉道君皇帝自可臨御願陛下預勅有司洒掃嚴潔使天下知陛下孝於父淵聖將來還歸未有蒞止之處臣欲乞修寳籙宫改建以為迎奉之地使天下知陛下弟於兄也推而行之薄海内外父父子子兄兄弟弟黎民不時雍而萬國不咸寕者未之有也如蒙俞允伏望斷自淵衷御前處分行下付臣施行乞都長安疏聖宋都汴城垂二百年天下未嘗有犬吠之警靖康初年金人兩犯京闕兵將失守遂致二聖播遷臣子言之可為痛哭陛下纉承大統即位南京顧非不知宗廟社稷之所在而都人士庻之望幸也時金人退師之初大姦擅國之後或慮舊染未悛包藏不測固將有所待也臣區區愚衷每輙過計切以京師者諸夏之本根素號四通八達之郊舟車輻輳民物浩穰方天下無事而居之實為萬世之長利也今仇方猖獗動至畿甸恐議者慮今秋長驅南來不過請陛下遷都而巳洛陽既巳殘破大名稍近賊境必曰南都可矣若以其俯臨清汴緩急之際可以順流而下轉至江淮虎踞龍蟠金陵可都大不然也且並進而深入𢷬得金人巢穴以迎二聖陛下駐蹕長安則金人必不能西向潼闗中原豪傑盡樂為陛下用内外之患皆可消弭而祖宗大業可以永保而傳億萬世天下既定東還京師亦不晩矣臣狂愚言不足採惟陛下留神而聽之天下幸甚取進止奏給公據與契丹漢兒及被擄之民疏建炎三年四月臣契勘金人一族本大遼之臣曩縁羣臣姦謀茍以目前之利相結壊亂耶律天祚使金人假大遼之衆侵犯中國竊見契丹漢兒自與我宋盟約幾百年實唇齒兄弟之邦偶被金人殺擄忿怨不巳止縁勢弱末繇報寃今若復約盟㑹使得回戈共力破敵一舉便可滅亡臣以措置彫印文榜公據令生獲漢兒齎徃傳報自相激發設契丹漢兒未遽效命金人知之必相疑貳庻乘機併力賊勢可分所有本朝被擄良民臣亦依此措置曉諭今繳連文榜公據共三本在前者乞回鑾疏建炎元年知開封府通前後表疏係第一次奏請臣聞三代之得天下也得其民也得其民有道得其心也得其心有道所欲與之聚之所惡勿施爾也是則得民之道在察其心之所欲與其心之所惡而巳此古所以有天時不如地利地利不如人和之語求民之和豈必家至户到一一而求之哉應天順人承天下之大順則民不期和而自和矣臣蒙恩差知開封府臣雖衰老無能然久知開封染習諸統制下皆是招集惡少亡命無行者臣既領府事更不敢徇身自顧但以正道歴誠感之不旬浹間彼惡少輩咸知格心爍謀斂迹遁去其閭巷間亦自然悛改上下帖然無復肆横以是人人鼔舞仰陛下之威懐陛下之惠拳拳慕戀不啻嬰孺之愛父母咸思發憤敵其所愾臣每聞王畿内外日久嘉靖熙熙皥皥將如向祖宗慶祐熙豐時臣觀人心念念徯望者惟願陛下六龍之御警蹕之聲千乘萬騎來歸九重以副萬邦切切繫戀之誠再乞回鑾疏建炎元年七月通前後表疏係第二次奏請臣聞禹之行水行其所無事所謂無事者非泊然無所為於事也事無事而巳夫禹蒙天錫洪範九疇知水有順下之性且親見堯有洪水滔天績用弗成之患遂因水之性而順道之故天下免乎昏墊而奠厥攸居兹無他皆堯用禹之功也臣竊聞將士籍籍皆願陛下歸京師云京師是衆兵駐劄之本根也商旅籍籍皆願陛下歸京師云京師是天下賈販之要區也農民籍籍皆願陛下歸京師云京師是天下首善之地也士大夫懐忠義者籍籍皆願陛下歸京師云京師是陛下祖宗之域也臣前在臨濮兵寨中寔憂羣臣無逺識見恐賛陛下去維揚金陵又見京城有賊臣張邦昌僣竊與范瓊輩擅行威福無所忌憚所以曽暫乞駐蹕南都以觀天意以察人心仰蒙聽從臣誤被宸恩差知開封府事今到五十餘日物價市肆漸同平時每觀天意眷顧清明每察人心和平逸樂且商賈農民士大夫之懐忠義者咸曰若陛下歸正九重是王室再造大宋中興也臣竊料百僚中唱為異議不欲陛下歸京師者不過如張邦昌等姦邪輩隂與賊虜為地耳臣願陛下體堯禹順水之性順將士順商旅農民順士大夫之懐忠義者早降勅命整頓六師及詔百執事示謁欵宗廟垂拱九重之日毋一向聽張邦昌姦邪輩隂與仇方為地者之語不勝幸甚臣之少也猶不如人今年六十九矣眷眷血誠恨其學問荒鄙不能以激忠義之辭仰動天聽不勝涕泣痛怛之至乞回鑾疏建炎元年九月通前後表疏係第四次奏請臣聞聖人中天下而立定四海之民夫中原天下之中也京師又中原之中也我太祖太宗受天景命始基於汴肇造無疆膺大歴服固欲傳之億萬世偶去冬今春信憑仇方姦詐遂致二聖蒙塵陛下不得巳應天順人纉承寳緒四海生靈謳歌忭舞自西自東自南自北罔不率俾以俟庻績咸熙萬邦嘉靖陛下既即位乃宴安南京四方聞之懐疑胥動逓相鼓扇聞諸州縣間有驚劫傷殘之患盖是小民無知因疑致憂因憂致變旋相踐蹂弗奠攸居兹無他繇陛下寅畏過當駐蹕别都俯徇姦謀預圖遷幸使狡獪簧惑敢爾横肆盜據竊發罔循跼蹐有闕文以歸畎畝以操耒耜鑄劒㦸為農器思不犯於有司爾若陛下勅翠華之御俾千乗萬騎回復輦轂奠枕九重臣竊謂可以垂衣裳而天下治可以坐視天民之阜王室自然再造大宋可以中興尚何夷狄之足憂盜賊之足慮乎古先哲王凡有大疑必詢之左右又詢之卿士又詢之國人又詢之卜筮臣蒙陛下矜憐顧遇待罪開封臣夙夜思念竊恐陛下所親信左右輔弼之臣於對揚獻納之際不思祖宗創業之艱難與致一統之匪易輕徇臆説有誤國家大計所以狂妄冒死觸犯天威臣不勝憂憤戰慄激切之至乞回鑾疏建炎元年九月通前後表疏係第五次奏請臣恭惟我大宋深仁厚徳滲漉方夏幾二百年一旦金人邀迎二聖京師士民皇皇無依嗷嗷無告若窮民無所歸者若嬰兒而失其慈母者忽聞陛下龍潜在濟於是謳歌竭蹷交走道路兹乃祖宗湛徳浹洽得其心故也陛下紹登寳阼尚留南都臣自到京師聞道路籍籍咸曰陛下何不認我宗廟乎何不眷顧我朝廷乎何故使我社稷無所依乎何輕捨我生靈使我未有所仰乎是都人之望陛下也切切如此臣願早回六龍俾人感翠華之至深慰其心臣前劄具奏以謂得其民當得其心其所欲與之聚之所惡弗施爾也若陛下回鑾汴邑是人心所欲也願陛下與之聚之陛下聽姦邪畏避敵人之言妄議遷幸是所惡也願陛下勿施爾也老臣血誠言不盡意乞回鑾疏建炎元年九月通前後表疏係第六次奏請臣學問膚淺不能式是古訓對揚天休今再瀝悃誠干冐睿聽以臣耳目所親聞見事一二疏進伏望陛下哀憐特賜俞允伏覩國家嘗變更三舍之法以取士意謂臯䕫稷契皆自此塗出卒之廹於月試剽竊時文罔有稽古者是三舍果不足以取士也又嘗尊崇道教以奉眞亦謂神僊莊老皆自此塗出卒之誕謾譎怪汙染成風罔有成就者是道術果不足以奉眞也又嘗進貢花石以昭享上卒之驕滛矜誇蠧耗財計無有紀極是貢花石果不足以享上也又嘗結好敵人欲以息民卒之邀迎二聖劫掠侵欺靡所不至是守和議果不足以息民也當時行之固有阿意順㫖作為歌頌以叨富貴者其間亦有毅然獨立不相詭随以鯁亮獲罪者陛下觀之昔富貴者為是乎被罪者為非乎臣每思之宗廟社稷岌嶪如是者盡繇姦邪憸人皷唱四事俾民病敝幾不聊生所以致有今日之患詩曰商鑒不逺在夏后之世兹覆轍正陛下蕭墻之鑒今之言遷幸者猶前日之言四事為可行阿諛謟佞動為身謀翕翕訿訿更相助成今之言不可遷幸者猶前日之言四事不可行而罹其罪者也且我京師是祖宗二百年積累之基業是天下大一統之本根陛下奈何聽先入之言輕弃之欲以遺海陬一狂類乎臣觀河東河西河北京東京西之民咸懐寃負痛感慨激切想其慷慨之氣直欲吞此敵人陛下何忍怙聽諛順而不令剛正之士率厲同心剿絶兇殘乎今東京市井如舊上下安帖但嗷嗷之人思望翠華之歸謁欵宗廟垂衣九重不啻饑渴之望飲食大旱之望雲霓也臣竊謂陛下一歸則王室再造矣中興之業復成矣陛下如以臣為狂率誕妄願延左右之將士試一詢之昔周勃入北軍使左袒右袒以卜劉呂盖非獲已也臣區區誠意願陛下以遷幸大計不獨謀之一二大臣當與億萬之衆同之臣忠憤不勝涕泣交下激切屏營之至乞回鑾疏建炎元年九月通前後表疏係第七次奏請伏覩朝廷前遣翁彥國營繕金陵比有詔復欲遣官奉迎太后六宫以徃且謂朕當獨留中原臣伏讀詔書私竊疑之此必有進言者勸陛下過江避宼而不思天下大計託為愛君之迹以濟其不忠臣願陛下察其利害之實斷自淵衷早賜定論重念本朝提封萬里京師號為腹心以祖宗都此垂二百年宗廟社稷所在而民人依之以居者無慮萬萬計今兩河雖未敉寕猶一手臂之不伸也而乃遽欲去而之他非唯不能療一手臂之不伸并與腹心而弃之豈祖宗所以付託之意與天下睽睽萬目所以仰望之心哉彼進言之臣談何容易且利害之端曉然可見臣乞陛下且駐蹕南都未可輕議舉動臣雖老矣尚當矍鑠鼔勇立辦禦敵之具以圖萬全之舉然後掃除宫禁嚴備扈從奉迎鑾輿謁見九廟非特使神祇祖考安樂之庻幾中原有仗不失天下之大勢也不然則是徒為走計爾示敵以弱非唯不恤兩河抑又不恤中原且去宗廟社稷而不顧陛下豈忍乎臣重為陛下惜者此爾故敢直輸血誠幸陛下留意無忽昔景徳間契丹宼澶淵警報一聞中外震恐是時王欽若江南人即勸章聖幸金陵陳堯佐蜀人即勸幸成都惟宼準毅然闢之請帝親征卒用成功顧臣庸謬何敢望準然事適相類不敢不以章帝望陛下也臣又自期既以迎奉鑾輿還都臣當身率諸道之兵直趨兩河之外蹀血北廷非特生縛其帥直迎二聖以歸庻雪靖康一再之恥然後奉觴玉殿以為聖天子億萬斯年之賀臣之志願始畢矣竊自謂愛陛下者無踰老臣然不知臣者必指臣以為狂妄臣亦非所恤也伏望陛下觀事之宜察臣之心則知臣之忠於為國乞回鑾疏建炎元年十月通前後表疏係第八次奏請臣契勘京城四壁濠河樓櫓與守禦器具其當職官吏協心併力夙夜自公率厲不懈増築開濬起造輯理皆就緒浸臣又製造決勝戰車一千二百兩每兩用五十有五人一卒使車八人推車二人扶輪六人執牌輔車二十人執長鎗随牌輔車十有八人執神臂弓弩随鎗射逺小使臣兩員專幹辦閲習車事每十乘差大使臣一員總領為一隊見今四壁統制官日逐教閲坐作進退左右回旋曲折之陣委可以應用又沿河十六縣與上下州軍相接作聫珠寨以嚴備禦又見使王彥曹中正在河西攻擊收復州縣西京河陽鄭滑等州同為一體把截探伺次第仇方畏讋巳不敢輕動冒犯自速殄滅臣自到京奉揚陛下仁風布宣陛下徳意今街巷市井人情物態皆已忻悦敉寕嘉靖同祖宗太平時顧臣犬馬之齒六十有九此緣陛下委付之重常患才力不任惕惕憂懼近日頓覺衰瘁萬一溘先朝露辜負陛下眷恤憐憫之意臣死目不瞑若使臣與官吏士民望翠華回輦之塵瞻仰天顏俯伏百拜然後臣退塡溝壑如生之年死骨不朽論語曰為政以徳譬如北辰居其所而衆星拱之京師乃我祖宗基命肇造二百年大一統基業本根之地陛下奈何偏聽如張邦昌輩邪佞之語以廵幸為名輕去其所使四海來享來王之人徜徉道路於偏僻州軍為朝宗之地乎臣果得以此老身俯伏道左迎陛下千乗萬騎垂拱九重奉陛下指揮號令强敵可以消滅宼盜自然平蕩王室於焉再造大宋中興可必若誕妄之人言臣欲以海陬餘孽貽君父憂即臣自頂至踵甘俟斧鉞臣巳修整御街御廊護道杈子平整南薫門一帶御路聞萬邦百姓寓于京師者日夜顒顒望陛下迎奉祖宗之主與隆祐太后皇后妃嬪皇子天眷歸安大内以福天下臣夙夜憂思眷眷戀戀繼之以泣願陛下憐臣孤忠矜臣衰暮惟恐心力不逮或有誤陛下國家大計今年河流不冰惟陛下斷自淵衷無惑辟邪之議書曰惟克果斷乃罔後艱臣下情不勝激切之至乞回鑾疏建炎元年十月通前後表疏係第十一次奏請臣聞易於渙之卦曰渙汗其大號此言人君發號施令如汗焉一出而不可反也臣竊觀陛下踐膺大寳權時之宜駐蹕近甸天下之民延頸企踵日望鑾輿之歸經理中原以建中興之業故廼者親降詔書即將還闕恭謁宗廟延見父老中外聞之莫不鼓舞相慶以謂陛下英斷如此何事不立何功不就何浮言之可惑何外敵之足憂太平基業正在此舉下詔之後日復一日尚未聞千乗萬騎涓日啟行民心不能無疑焉臣愚竊意陛下乾剛不撓離明並照洞見安危之幾必不肯失信於天下是必有姦臣誤陛下負失信之謗也伏見邇者河陽水漲斷絶河梁有姓馬人妻王氏者率衆討敵敵勢窮窘不知所為此天亡敵宼之時也夫天與不取反受其咎臣欲因此時遣問勅王彥各統大兵乗其危孤大振軍聲盡平敵壘伏願陛下亟還京闕以繫天下之心則孰不用命且投機之會間不容穗願陛下毋惑於姦臣之言㫁自淵衷臣自謂兹舉可保萬全無可疑者也或姦謀蔽欺天聽未即還闕伏願陛下從臣措畫勿使姦臣沮抑以誤社稷大計陳師鞠旅與之決戰掃盡邊塵葺清海宇然後奉迎鑾輿歸還京闕以快天下之心以塞姦臣之口臣蒙陛下知遇誓效死節區區愚忠不能自已伏望聖慈特賜睿㫁天下幸甚乞回鑾疏建炎二年正月通前後表疏係第十二次奏請臣聞易曰天下之動貞夫一孟子曰天下烏乎定曰定於一恭惟京師是我太祖皇帝肇造大一統之本根也奕世聖人繼繼承承於此坐視天民之阜所以自西自東自南自北莫敢不來享莫敢不來王薄海内外莫不率俾陛下天錫勇智入紹寳緒天下之人竭蹷稽首咸曰一哉王心今既奄有九有實萬世無疆之休陛下奈何不念四海生靈切切徯后之意乃偏聼姦邪之言託為時廵駐蹕淮甸不思我宗廟朝廷祠享報上垂拱視下又不思我二聖后妃親王天屬蒙塵朝夕懐想迎取之志又不思我諸帝諸后陵園廟貌以時祀祭所以貽厥子孫之情臣竊謂陛下若於二月間詔勅回鑾登樓肆赦則天下皆知一人來歸九重强者當革心逺罪弱者當屏迹復業必無憂疑聚為盜賊諸軍將士震奮感激願敵所愾四夷凶殘必滅心爍謀以就殄滅尚何惡之能為乎書曰時哉弗可失臣若有毫髮誤國大計臣有一子五孫甘被誅戮以謝天下臣竊恐州縣狃於搔擾百姓扇揺不能耕桑果耕桑失時則衣食之源盡廢衣食不給使諸大臣中雖有臯䕫稷契伊尹周公亦不能善其後矣願陛下以祖宗二百年大一統基業為意不可憂思為計而信憑邪佞自為身謀者之語早勅回鑾則天下幸甚臣犬馬之齒巳七十於禮與法皆合致其事以歸南畝臣漏盡鐘鳴猶僕僕不敢乞身以退者非貪冒也寔為二聖蒙塵北狩陛下駐蹕在外夙夜泣血惟恐因循後時使天下自此失我祖宗大一統之緒所以狂妄屢有敷奏非臣好為此激訐恭望睿慈委曲詳察乞回鑾疏建炎二年三月通前後表疏係第十四次奏請臣聞人主中天下而立定四海之民恭惟太祖皇帝肇造區夏以今京師為天下中故創業垂統欲傳之億萬世太宗真宗仁宗英宗神宗哲廟奕世聖人傳以相授皆以京師為本根之地所以髙拱穆清坐視天民之阜必於天下之中也惟奠枕于京則自西自東自南自北莫敢不來享莫敢不來王矣偶縁玩習太平之久文武恬嬉狃於驕滛矜誇忘戰守之備遂致仇方横肆殘破州縣圍閉京城刼迎二聖后妃親王與諸天眷蒙塵北去僑寓沙漠此忠臣義士所以夙夜涕泣繼之以血自陛下即位應天四海萬方歡欣鼓舞垂髫鮐背山農野叟咸以手加額仰面謝天曰天下有真主矣萬世永賴寔天祚明徳為無疆之休矣四方貼然若逺若近並無盜賊暨陛下偏聼姦邪與仇方為地者之語移蹕淮甸諸處兇惡强盜如蝟毛起如蜂閧聚縱火殺掠所在猖獗罔有悛懼以謂朝廷在逺無所依歸遽至是爾臣於二月十八日祇授降到黄榜詔勅云遂假勤王之名公為聚寇之患如是則勤王之人皆解體矣臣竊謂自敵人圍閉京城天下忠義之士憤懣痛切感厲争奮故自廣之東西湖之南北福建江淮梯山航海越數千里争先勤王但當時大臣無逺識見無大謀略低回曲折憑信誕妄不能撫而用之遂致二聖北狩諸親骨肉皆為劫持牽聫道路當時大臣不出一語使勤王大兵前徃救援凡勤王人例遭斥逐未嘗有所犒賞未嘗有所幇助饑餓流離困厄道路弱者填滿溝壑强者盡為盜賊此非勤王人之罪皆一時措置乖謬耳比來姦邪之臣方爾肆横仇方自然得勢强梁惡少無綠殄滅竊念國家聖子神孫繼繼相承湛恩盛徳滲漉人心淪浹骨髄今河東河西不随順北敵雖為髠頭編􅀢而自保山寨者不知其幾千萬人諸處節義丈夫不顧其身而自黥其面為争先救駕者又不知幾萬數也今陛下以勤王者為盜賊則保山寨與自黥面者豈不失其心耶此語一出自今而後恐不復肯為勤王者矣噫得天下有道在得其民得其民有道在得其心陛下若駐蹕淮甸俾人顒顒之望皇皇之情未有所慰此失人之心也願陛下勿阻遏之以失人心臣仰詳詔語豈陛下之意皆詞臣失職不能敷繹之過臣願陛下黜代言之臣别降罪巳之詔許還闕之期以大慰元元激切之意陛下還京登樓肆赦則天下之人盡皆遷善逺罪不犯于有司豈復更有為盜者王室再造大宋中興在此一舉願陛下睿㫁而力行之若以臣言上咈陛下之意誅之赦之惟陛下命乞回鑾疏建炎二年三月通前後表疏係第十五次奏請臣聞范仲淹云天下之事有二黨焉一黨曰發必危言立必危行王道正直何用曲為一黨曰遜言易入遜行易合人生安樂何用憂為天下之治亂在二者勝負耳大抵危言危行是欲致君於無過致民於無怨而巳天下豈有不治者乎若夫遜言遜行之徒阿諛曲折随意所嚮迎逢茍合君施恩於上而下弗被民懐怨於下而上弗知如是天下豈有不亂者乎今之士大夫志氣每下議論卑陬上者不過持禄保寵下者不過便文自營曽不能留心惻怛為陛下思承祖宗二百年大一統基業為可惜又不為陛下思父母兄弟與至親天眷蒙塵沙漠翹翹徯望大兵救援之意又不曽為陛下思祖宗西京園陵寢廟為仇方所占今年寒食節未有祭享之地又不曽為陛下思京師是天下之本根宗廟朝廷百司倉廩儼然如舊又不曽為陛下思河北河東京之東西陜右淮甸百億萬生靈之衆罹塗炭劫掠殘破之苦但朝進一言暮入一説計較泛舟冒大風險欲南幸湖外此奸邪之謀耳臣嘗思之是一欲為仇方方便之計二為姦邪親屬皆先巳津置在南嗟乎為臣不忠不義乃至於此孔子所謂茍患失之無所不至正謂是也臣夙夜痛心泣血瀝竭愚忠為陛下保護京城自去年秋冬今春又三月矣農務是時陛下不早回九重則天下靡有定止臣不勝憤懣激切再凟天聽狂妄干冒甘俟鼎鑊乞回鑾疏建炎二年三月通前後表疏係第十六次奏請易曰幾者動之㣲吉之先見者也君子見幾而作不俟終日孟子曰雖有鎡基不如待時盖天下之事見幾而為之待時而措之則事無不成苟或失焉必至汗漫委靡而不振矣方今輦轂之下民俗安靖宗廟社稷儼然如故以致收復伊洛而北渠過河捍蔽滑臺而敵騎屢敗河東河北山寨義民數遣人至臣處乞出給牓旗引領舉踵日望官兵之至皆欲戮力協心掃蕩邊裔以幾言之則大宋中興之盛於是乎先見矣以時言之則金人滅亡之期於是乎可必矣惟在陛下見幾乗時早還華闕與忠臣義士究圖事功則萬舉萬全可以滅仇方而成中興也或者以謂自揚至汴時有小宼敵屬車之來途中不能無虞臣謂造此言者乃姦憸小人自為身謀爾殊不知盜賊所以作者誠緣法駕久寓外郡國勢未强天下不能定于一故時有竊發之事乃若六龍來復宅中圖大則比屋歡呼人各歸業强不陵弱衆不暴寡豈復有盜賊耶此事甚易明此理甚易知然而姦邪之蔽於營私徃徃不肯開陳而力為陛下詳説者惟老臣而已臣所以再三言之者豈好辯哉恭念祖宗二百年舊都不忍為姦臣委去也恭念陛下聰明齊聖之資不忍為姦臣蔽蒙也念赤子之嗷嗷不忍為姦臣坐視而不救也念金人之猖獗不忍為姦臣縱敵而不殺也伏願陛下念兹在兹斷自淵衷速回鑾輿上以對祖宗之神靈下以慰黎元之懐想外以平醜類之侮拂則天下大定指日可期書曰勅天之命惟時惟幾望陛下留神而早復之臣今遣僚吏呼延次外及臣之子頴詣行闕以聞乞回鑾并罷習水戰疏建炎二年三月通前後表疏係第十七次奏請臣得范瓊書叙説所統軍兵有海内招安使臣水軍奉聖㫖令於儀眞駐劄教習水戰控扼上流於三月八日巳到真州臣讀此語而不知扈蹕之臣誰為陛下建此議也且王者無外其規模約束當使守在四夷昔楚人城郢史猶鄙之況陛下奄有九有之時可規模孑孑為偏霸之事乎兹特憸人之欲虚張敵勢以為可防不意望遷延六龍進發之期爾殊不知此聲一傳則四方驚愕必以謂中原不守遂為江寕控扼之計如是則何以綏定四海之聽乎盖天子為君萬邦而元后作民父母陛下回鑾登樓肆赦則普率之人忻忻悦而相告曰天子宅中圖大則萬邦罔不率俾矣元后正位丕承則兆民浸浸於變時雍矣夫如是臣將見外裔不足滅而中興之功與天比崇若使范瓊教習水戰是聖心猶豫尚緩還期見中外播聞愈自懾怯則萬國何自而咸寕乎此臣所以拭目注望屬車之塵不忘夙夜伏願陛下明詔范瓊整束人馬不湏更習水戰祗備扈駕歸御京闕毋使羣黎百姓齎咨涕泣則豈惟老臣之幸寔天下萬世之幸乞回鑾疏建炎二年四月通前後表疏係第二十次奏請臣竊見漢光武用冦恂為潁川太守因從車駕擊隗囂潁川盜賊羣起帝顧謂恂曰潁川廹近京師當以時定獨卿能平之恂對曰潁川惡少輕剽奚能為哉但聞陛下有事隴蜀故乗間竊發耳若乗輿南向賊必惶怖歸死臣願執鋭前驅帝即日命恂南征盜賊悉降遂建東漢中興之業臣竊見近日有招安到丁進者數十萬衆願為陛下守護京城又李成願扈從還闕即渡河迎取二聖兹三頭項人馬非潁川比也今皆披瀝肝膽同寅協恭共濟國事臣聞得道者多助多助之至天下順之果陛下千乗萬騎來歸九重遹追我太祖太宗奕世聖人二百年大一統基業則天下必心悦而誠服庻績其凝萬國咸寕矣尚何盜賊戎敵之足慮乎臣敢瀝悃誠再冒天聴伏望裁赦乞回鑾疏建炎二年五月通前後表疏係第二十一次奏請臣聞孟子曰雖有鎡基不如待時故君子不先時而起不後時而縮當其可而巳易曰幾者動之㣲吉之先見者也故君子見幾而作不俟終日不曰如之何而巳恭惟我國家曩緣敵人侵犯郊畿殘破州縣恣為誕妄百端邀求今天意悔禍人心助順考時與幾實陛下中興之㑹也古聖人勅天之命惟時惟幾者盖以時哉不可失而知幾若神故也臣觀京師城壁巳増固矣樓櫓已修飾矣龍濠已開濬矣器械巳足備矣寨柵巳羅列矣戰陣巳閲習矣人氣已勇鋭矣汴河蔡河五支河皆已通流泛應綱運陜西京東滑臺京洛北敵皆已掩殺潰遁矣天下萬邦與畿甸生靈夙夕祈天而請者鄉南懇禱而願者但望陛下千乗萬騎號令風伯雨師清塵洒道翠華回輦歸御九重為四海九州作主耳且一人有慶兆民賴之兹其幾也臣願陛下毋聴姦邪之言而忽其時忘其幾天下幸甚果怠兩河山寨之心與沮萬民敵愾之氣則天下危矣願陛下毋循東晉既覆之轍臣老矣不勝至誠惻怛懇切之至願陛下哀憐之遣少尹范世延機幕宗頴詣維揚奏請回鑾疏建炎二年五月通前後表疏係第二十二次奏請臣聞孟子言術不可不慎也矢人惟恐不傷人函人惟恐傷人巫匠亦然臣因斯言始知人心所存之邪正與所作之是非若以迹槩之了然區分如辨黑白夫忠義之人動容周旋無非忠義而不忠不義之士無自入焉故其於上下愛戴保護不啻如函人惟恐其傷之也彼不忠不義之人動容周旋亦無非不忠不義而忠義之道無自入焉故其於上下毁裂擯棄不啻如矢人惟恐其不傷之也恭惟我國家曩縁仇方肆横殘破州縣圍閉京城劫掠邀求靡有紀極以至强迎二聖后妃親王與諸天眷蒙塵北去凡忠義之士莫不痛心疾首泣血奮厲佐佑陛下張皇六師震耀神武總領貔貅之士掃蕩沙漠迎奉二聖來歸京師俾中原生靈還定安集罔或流散愛戴其上保護其下夙夜念念想如函人焉惟恐其或傷之也其不忠不義者但知持禄保寵動為身謀謂我祖宗二百年大一統基業不足惜謂我京城宗廟朝廷府藏不足戀謂二聖后妃親王天眷不足救謂諸帝諸后山林園寢不足護謂周室中興不足紹謂晉惠覆轍不足羞謂廵狩之名為可效謂偏地之伯為可述儲金幣以為敵資樁器械以為敵用禁守禦之招募慮勇敢之敵敵也掊保甲以助軍慮流移之安業也欺罔天聼凌蔑下民凡誤國之事無不為之猶矢人焉惟恐其或不傷之也臣願陛下驗己試之迹以道槩之則人心所存之邪正與所作之是非自然區分無足疑矣臣衰老孱懦謂蒙陛下識擢俾留守京城兼開封府事臣砥礪瀝竭知無不為惟恐失措有誤國家大計然臣每所申奏若非陛下察臣斷斷孤忠憐臣悄悄見愠體天地之大徳覆護曙日月之大明照臨臣與血屬當膏砧斧虀粉萬狀矣尚安能為陛下保釐尹正使京城市井里巷安居樂業熙熙皥皥如我祖宗太平之時乎臣之至此豈止謗書盈篋而已邪臣願陛下六龍萬乗早歸大内下慰四海生靈瀝血懇切之望臣之言此實出悃誠痛切憤悶所以不避姦邪詆誣不避冒犯誅戮臣願陛下降臣此言榜之朝堂俾應在朝臣僚實封章疏指摘臣言如臣言稍渉狂妄乞正典刑明臣罪惡如臣言果符忠義乞降詔勅明告回鑾之期庻安天下之聴此事甚大恭俟睿慈洞察勿貳勿疑乞回鑾疏建炎二年五月通前後表疏係第二十三次奏請臣犬馬之年巳七十矣陛下不以臣衰老無用付之東京留鑰臣自去年七月到任夙夜究心營繕樓櫓城壁掃除宫禁闕廷分布柵寨訓練士卒教習車陣比及終冬諸事稍稍就緒都城貼然風物如舊人人延頸跂踵日夜徯望聖駕還闕臣以故自今年正月三月兩次遣屬吏及臣之子捧表逺詣行在投進懇請車駕西上歸肆大赦於宣徳門使天下曉然皆知陛下言旋舊都再造王室命令用是通達盜賊用是消弭無復有方命阻兵之患然後用臣為陛下條畫措置造膝陳請遣一使泛海道入髙麗諭以元豐搆好之舊令出兵攻仇方之西又復遣官從間道趨河東諭折氏修其舊職以固吾圉使三陲交攻金國令彼應敵不暇吾方大舉六月之師一道繇滑濬一道出懐衛渉河並進北首燕路訪大遼子孫興滅繼絶約為與國則燕薊之感恩荷徳不患不為吾用如此則仇方勢必孤弱自可縛而臣之二聖天眷自此決有歸期兩河故地自此決可收復而況兩河之人感祖宗二百年涵養之澤雖䧟敵踰年而戴宋之心初無㩦貳使吾大兵渡河而戰則東北人民必有背敵歸我前徒倒戈攻于後以北誰不願為吾死孟子曰雖有智慧不如乗勢雖有鎡基不如待時今時則易然也臣嘗以今日時勢觀之天意悔禍人心固結雖三尺童子争欲奮臂鼓勇恨不碎仇方之首食仇方之肉又況當六月宣王北伐之時機㑹間不容髮陛下何憚而不亟還京師使臣獲奉咫尺之威請借筯以籌黄帝書曰日中必熭操刀必割此言時不可失也諺曰當㫁不㫁反受其亂此言㫁不可誣也今日之事臣願陛下以時果斷而行之毋惑讒邪之言毋沮忠鯁之論倘陛下以臣言為是願大駕即日還都使臣為陛下得盡愚計若陛下以臣言為非願陛下即日放罷老臣或重竄責臣所不辭惟明主可與忠言臣故昧死以聞奏乞回鑾仍以六月進兵渡河疏建炎二年五月通前後表疏係第二十四次奏請臣聞詩於小雅載六月宣王北伐之事盖夷狄以弓矢馬騎為先而當六月歊蒸之時皆難於致用故宣王乗時行師終於薄伐玁狁以建中興之功臣自留守京師夙夜匪懈經畫軍旅近據諸路探報敵勢窮促可以進兵臣欲乗此暑月遣王彥等自滑州渡河取懐衛濬相等處遣王再興等自鄭州直護西京陵寢遣馬横等自大名取洺趙真定楊進王善丁進李貴等諸頭項各以所領兵分路並進既過河則山寨忠義之民相應者不啻百萬契丹漢兒亦必同心殲殄金人事纔有緒臣乞朝廷遣使聲言立契丹天祚之後講尋舊好且興滅繼絶是王政所先以歸天下心也况使敵人駭聞自相㩦貳邪仍乞遣知幾辯博之士西使夏東使髙麗喻以禍福兩國素蒙我宋厚恩必出助兵同加掃蕩若然則二聖有回鑾之期兩河可以安貼陛下中興之功逺過周宣之世矣臣犬馬之齒今年七十矣勉竭疲駑區區愚忠所見如此臣願陛下早降回鑾之詔以繫天下之心臣當躬冒矢石為諸將先若陛下聴從臣言容臣措畫則臣謂我宋中興之業必可立致若陛下不以臣言為可用則願賜骸骨放歸田里謳謌擊壤以盡殘年頻煩上凟天聴上乞毋割地與金人疏臣聞天下者我太祖太宗肇造一統之天下也奕世聖人繼繼相承増光共貫之天下也陛下為天眷佑為民推戴入紹大統固當兢兢業業思傳之億萬世柰何遽議割河之東又議割河之西又議割陜之蒲解乎此三路者太祖太宗基命定命之地也柰何輕聴姦邪附敵張皇者之言而遂自分裂乎臣竊謂淵聖皇帝有天下之大四海九州之富兆民萬姓之衆自金人再犯未嘗命一將出一師厲一兵秣一馬曰征曰戰但聞姦邪之臣朝進一言以告和暮入一説以乞盟惟辭之卑惟禮之厚惟敵言是聴惟敵求是應因循踰時終致二聖播遷后妃親王流離北去臣每念是禍正宜天下臣子弗與仇方俱生之日也臣意陛下即位必赫然震怒旋乾轉坤大明黜陟以賞善罰惡以進賢退不肖以再造我王室以中興我大宋基業今四十日矣未聞有所號令作新斯民但見刑部指揮有不得謄播赦文於河東河西陜之蒲解兹非新人耳目也是欲蹈西晉東遷既覆之轍耳是欲裂王者大一統之緒為偏霸耳為是説者不忠不孝之甚也既自不忠不孝又壊天下忠義之心禠天下忠義之氣俾河之東西陜之蒲解皆無路為忠為義是賊其民者也臣雖駑怯當躬冒矢石為諸將先得捐軀報國恩足矣臣衰老不勝感憤激切之至宗忠簡集巻一
