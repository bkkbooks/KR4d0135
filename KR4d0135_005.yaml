body:
  text: 宗忠簡集卷五宋宗澤撰賦撫松堂賦遺王居士嵩少之麓萬松鬱然偃髙蓋以鳴風盤深柢而切天却揮斤於睥睨欵化石而頑堅帳莫致之華我林泉發聘士之幽尋課畦丁而小遷培拱把而氣藏運桔槹而智圓寓修身於種藝戒除惡於蔓延期百尺于嵗寒扶大厦於將顛眷焉撫之倚笻於麓薈翳其成森若巖谷且溉且壅濯我喬木或攢膏而為酒或飛煙而取墨或採脂以儲藥或祈明而代燭或盤縷以為扇箑或折枝以當麈玉倘聘士之見須效尺長於必録我觀此物碨落節目擅巨棟於廟堂備行艫於海瀆用扶危而利涉肯收功於芒粟肖象伊何萃於一庭蒼官侍坐青衣侑尊鼓琴瑟於晚吹晃屛幄於朝暾聘士顧之內娛外欣陋軒駟之飛馳避門箔之炎薰我觀此物受命不羣稟直氣以自如信孤標之獨尊聳若髙才儼如正人思仰止而企及罷童語之紛紜苟好尚之不移質是非於老生姑置勿談羽服綸巾時矯首以怡顏毋折腰而役形處身世於無心看出岫之飛雲以聘士為後來之淵明也古楠賦有序巴城之南山有寺曰南龕寺之外有大木曰楠其生甚久唐刺史嚴武御史史俊皆有詩歌刻于嵓腹嚴曰臨溪插石盤老根史曰結根幽壑不知嵗自時迄今又數百年邦人謂之古楠宜矣僕到官之三月兩至岩下讀史嚴之清什感是楠之老於岩谷而可憐也因慨然操筆而賦之曰楠之生兮層崖之中巔詢之人兮不知幾何年包堅根而下蟠兮貫頑石而徹沈淵竦修幹以上凌兮並孤岑而參蒼天大枝崛起兮虎豹拏攫小枝回屈兮蛟螭蜿蜒黃葉敷隂白晝沉沉輪廣十畝蓋穹百尋衆鳥托宿鄧林非深諸卉仰芘荆雲非隂雨濯瑩兮一塵不染風振響兮海潮同音露下兮鶴唳月明兮猿吟擅此清致亘古迄今有客戾止惻然動中吁嗟斯木之異兮有不遇之窮爾胡不生於泰山之側秦帝東封會風雨之是避豈以五大夫之號而封松爾胡不生於周成之宮禁林九重顧親賢之是戲豈以封國之瑞而剪桐爾胡不生於分陜之域舍彼召公未必以甘棠之蔽芾流詠於國風抑亦豈無工師之良識爾材之非常用之為棟梁則足以建九重之明堂用之為舟楫則足以濟巨川之汪洋用為宗廟社稷之器則足以參鼎鼐交神明薦至德之馨香夫何默默而甘老於窮山寂寞之鄉徘徊其下恍若夢兮心駭而目眙蒼髯偉人瞑目視曰噫謂子知我乃不吾知吾生於斯長於斯始于毫末至于十圍雨露不吾遺霜雪不吾欺春兮秋兮吾不知代謝之有期漢兮唐兮吾不知興亡之幾時柯葉顏色曾無改移過者千百睥睨焉不以吾為朴􅈪輩待之斧斤之害亦幸不罹吾受天地造化之恩孰有等夷子之不智而乃我悲使子處此復將奚為吾非不知強自取藏器以待時而動老當益壯自任以天下之重倘匠人斫而小之能不浼然而悔痛乃所願比不材之樗同乎無所用若曰不遇自有物主之非吾所能為姑亦付之一夢客聞之釋然悟曰達矣夫斯言可書紳而永誦詩五言古東上辭松楸一首八年坐親黨泯伏長安城甘心傍松楸申我兒子情閉户慨岩廊讀書笑金籯力田固為政課童乃司兵深病骨相寒不蒙軒冕榮維天臨萬邦搜羅世豪英我友挽出之大人今繼明古無忠孝全泣涕去丘塋為翁大門閭翻然以東征感時有序強敵長驅京邑阽危此忠臣義士痛心疾首勤王報國之秋也而宰臣遷家郡守踰垣縉紳士大夫陸竄水奔使人主嬰孤城以自守無一犯難者事小定矣而上書獻䇿之人亦未有慨然以東者世道之衰一至此乎太息之餘以詩自道卿士辱多壘天王憤蒙塵禦戎要虓將謀國須雋臣百戰取封侯未必亡其身懷姦廢忠義胡顏以為人吁嗟世道衰大僇加縉紳平居事奔競梁汴分雲屯一旦國步艱四迸如星繁輔相巳擇棲守令仍踰籓冠蓋陸西竄舳艫水南奔鄙夫用慨然䇿馬趨修門勤王羞尺柄悟主期片言時來倘雲龍峩冠拜臨軒逶迤上玉除造膝伸元元措世於泰寧歸來守丘樊謁華嶽楊賜嶽所挺嚴武金天晶二子為時出顧我非炳靈維嶽鎮四方氣秀天骨青嶻嶭立千仞力能産公卿降神詠嵩髙讖諱仍反經取象到執圭譎怪如洞冥平生笑窮奇立語心自驚我質培塿耳胸山固峥嶸誰言華嶽髙我山摩玉京是中所包藏丹碧參瑰瓊平居蟄雲雷飛雨溢四溟此豈真有之落筆紛縱橫發我文物祕象渠膏澤傾太華屹不搖我山身載行五言律雨晴渡關二首燕北靜胡塵河南濯我兵風雲朝會合天地晝清明泣涕收橫潰焦枯賴發生不辭關路逺辛苦向都城其二蕩滌真成快氛霾不敢隂萬花恩澤了二麥寵光深地勢瞻仙掌河源識帝心馬頭迎霽色詩句日邊尋過潼關一雨崤函底風沙放我過嶽神猶假借官吏莫誰何塹斷思航渡城堅戒石摩一夫工墨守寧怯萬夫多道逢鄉人笑僕騶馬之瘦生笑長裾曳仍羞下澤奔據鞍非馬援叱馭豈王尊汗血能觀國的顱終感恩莫欺騶馬瘦揮䇿詣金門五言絶盤豆鋪南李翁園李翁臥亭午春深掩柴荆忽聞風雨響疑是勤王兵六言題趙園瑶瑛夾侍梅臺琴瑟自鳴松島山中野服相羊足以亡憂遣老鑿池智有泉源種木胸無芥蒂螭頭吐水涓涓端是銀潢一𣲖七言古道逢散遣之卒云講和退師無所用之矣輒以二十六句道胸臆翁擁麾幢我為兒剽聞竊睹皆兵機其中襲擊不容瞬颷行電掣猶逶迤戎人長驅越大河天下震驚觀闕危肉食之謀殊未臧我憤切骨其誰知慨然奏疏金馬門力陳盟賂損國威嚴尤下策尤可笑朝錯上書亦奚為道路荆棘初剪除花如步障吾東之八年閉户尺蠖屈一旦渡關匹馬馳行行側身聽戎捷忽聞募士詔遣歸濃書大墨榜教詔曰敵悔過今退師羽檄向來召貔虎乃詠出車歌杕杜櫜兵銷刃兵猶怒却把鋤犂農鼓舞君王神武今藝祖爾賊不歸汙我斧七言絶句曉渡小雨踈風轉薄寒駝裘貂帽過秦關道逢一澗兵徒涉赤脛相扶獨厚顏華隂道中煙遮晃白初疑雪日映斕斑却是花馬渡急流行小崦柳絲如織映人家其二菅茅作屋細家居雲碓風簾路不紆坡側杏花溪畔柳分明摩詰輞川圖其三寧王畫作金盆鴿韓愈詩誇玉井蓮瓦缶泥泓村落小亂茅羣雀不堪傳至洛都人士女各紛華列肆飛樓事事嘉政恐皇都無此致萬家流水一城花華下千岩層出亂雲飛失我平生洞府期夜據征鞍不交睫舉頭彈指睡希夷馬上口占龍興虎視詫周秦王氣東遊作汴京隂祝巨靈移此險大河為塹嶽為城蚤發􅀈幄垂垂馬踏沙水長山逺路多花眼中形勢胸中䇿緩步徐行靜不譁宗忠簡集卷五
