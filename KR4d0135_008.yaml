body:
  text: 宗忠簡集巻八宋宗澤撰附録宋勅劄忠簡公家藏朕惟欲求臣之忠盖必先崇其爵秩庻得其讜論以盡輔弼之誠爾宗澤登名進士歴任御史中丞功及社稷薦歴嵗久今特陞宗政少卿亷充副元帥所以彰厥報功之心爾當益勵厥志益修厥職可依前件奉勅如右牒到奉行右擬轉保副元帥宗澤准此崇寕元年十月十六日午時下兵馬大元帥府伏見朝奉郎秘閣修撰權發遣磁州等處制置河北義兵總管兵馬副元帥宗澤風力敏强氣節英偉方時艱棘夙夜勵精招集民兵豪傑争附志存衛國義不辭難經營百為各有條敘老當益壯懋哉乃勲宜除集英殿修撰已具奏聞去訖右劄付宗殿撰准此靖康元年十二月十二日都統制兵部郎中宗澤守鎮金人撫字民瘼黎庻無不念徳口北闗隘番廬聞其令名畏其威聲懼不敢侵擾汝有佐朝護國之綱有推山塞海之志設計剿殺法令肅然朕得江山鞏固放下心懐用是親賜録勅龍飛鋒劒表叚旌旗扈從軍伍數萬敕尚書兵部郎中進禦鎮江為統領都統元帥有不聼調度者俱該刑斬不動奏聞治軍治民以仁以徳太平寕静班師回朝故諭故敕垂惟欽哉右擬轉保為統領都統制兵馬大元帥宗澤准此建炎二年二月日建炎進退志見李忠定公綱集志云余薦宗澤於上以為留守非澤不可澤浙東人自為小官即卓犖有氣節敢為不詭随于世以故屢失官靖康間知磁州上以康邸持節使敵中時金人已再犯河北澤力挽留以為不可行其後有元帥之命遂即大位澤之功為多同列忌之譖毁百端不得留府中既而除知襄陽府余到行在澤適至與語衮衮可聽發於忠義至慷慨流涕故余力薦之上笑曰澤在磁凡下令一切聽于崔府君余歎曰古人亦有用權術假于神以行其令者如田單是也澤之所為恐類於此京師根本之地新經擾攘人心未安非得人以鎮撫之不獨外寇為患亦有内變可虞使澤當職必有可觀上許之乃除延康殿學士知開封府兼留守澤至京師果能彈壓撫循軍民畏愛修治城池樓櫓不勞而辦屢出師以挫敵鋒雖嫉之者深竟不能易其任也熊人霖曰宋髙宗得稱中興也宗李二公柱石哉二公天資剛茂學力静深其了達承當非凡所見故皆能應大變定大難處大疑人以為烈風猛雨迅霆之交施而二公意思安閒指措不差黍累昔韓魏公未嘗以膽許人范文正公獨以天下為巳任夫任所果者膽也膽所定者識也識所淵者學也讀二公集則二公之所養可知矣忠定集曩抄本在秘府近建寕尹皖城三山左公始發厥裔李生嗣𤣥之藏而剞之余友筠州五湖黄君西昌初仕戴君緘寄余署中余拜手長讀信二公之出處天實為之而喜二集之並出于時足以堅任士之骨也韓范宗李將無同忠定有哭忠簡詩一章惜刻中僅有其目嗣當從左公訪補今採忠定品題忠簡者於此古人聲氣之投豈曰借交引重哉有君臣而後有朋友聖賢之所以立倫也忠簡公諡辭謹按謚法危身奉上曰忠正直無邪曰簡人臣任安危之寄或齎志而未伸國家厚終始之恩有易名而殊賜其須頒命以厲庻士具官宗澤早負吏能雅都時譽逮艱危之際乃不顧身以覊靮之餘遂參佐命朕既嗣承七廟行撫萬邦駐蹕東南用應運㑹惟留鑰勲衛之寄紫㣲之居勤勞百為忠勇一節惠感衆士威行兩河將率扶義之師以賛定傾之業而大星遽殞部曲瓦分遺奏上聞道路雨泣國憂未艾天意難忱盖祖逖尚存石勒不敢為寇道濟巳死魏人頻嵗來侵自昔所嗟于今乃見危身正直合二義以尊名垂光子孫將十世而永賴可諡忠簡以慰英䰟題宗忠簡公家傳遺藏誥勅金華宋濓譔青城妖祲連雲赭虇􅀢在都龍在野百年藝祖舊河山萬騎長驅若水解東京留守一世豪仰天雪涕風蕭騷起扶白日炤河北赤手欲障三秋濤義旗戞天天為泣四方猛士聞風集自期徇國與神通豈謂忠言反難入披肝上疏留至尊乗輿不顧東南廵拊床三呌大星落非天棄宋良繇人功業無成志可紀古來英傑多如此君侯心事漢武侯偉氣英聲冠千祀我來已恨生世遲不得親觀忠勇姿每過鄉邑髮猶竪綸誥況是當時為却憶前朝司馬死章蔡羣奸乗間起國雖未亂政先亡萬里蒙塵從此始吁嗟黼輩眞奴臣賊君致寇肥其身姓名汙眼尚欲嘔君侯在位能無嗔侯乎侯乎慎勿嗔誰使彼奴操國均君不見汴京禮樂正全盛江南杜宇啼天津又吉水解縉譔余少時每讀宗忠簡請髙宗還京二十餘疏及公臨薨諭諸將之語未嘗不流涕沾襟也公未薨時招集羣盜聚兵積糧結諸路義兵連燕趙豪傑渡河克復指日可期嚮使公未薨而髙宗還汴則公雖死而宋亦可復中原公不死而渡河克復髙宗雖去之海上必復還汴然則公之連疏請還駕汴京其辭激切感之以二帝曉之以禍福公殆亦㣲知其將死歟或者以憂憤致疽發以死者殆未足以見公之心公是時年巳七十矣憂不能忘而何憤之有公之平生忠精明哲服岳飛之善論兵使宗穎之能得士皆賢哲之所尤難嚮使髙宗能以穎代公以飛副之公死猶不死惜哉此勅乃公為小人所擯斥時被受時宰又王黼也公寳愛至今而賢子孫如經者又時出於人間公之愛君憂國小心忠恪氣象可想見故有以知其憂而無憤也永樂癸未十二月廬陵解縉大紳書又郡人胡翰譔忠簡公以宣和四年差監鎮江都酒務告命之下門下侍郎王黼首署焉黼於是始拜少師與蔡攸童貫圖任國事内小人而外君子宋運方否之時也雒京既䧟王業偏安於江表百五十年之間人才用舍徃徃如此國之不競誰執其咎哉洪武六年冬金華胡翰從公之八世孫曰經者獲觀是巻遂書以識其後又眉山蘇伯衡譔右故宋宗忠簡公復官誥謹按公元祐六年年三十六進士及第調館陶尉歴龍游膠水趙城令政和三年改官知掖縣差通判登州道士髙延昭恃勢犯法公窮治之不少貸延昭至京師因林靈素訴公改建神霄宮不當公既乞祠而歸猶坐削權羈寘鎮江寔宣和元年以四年郊恩叙復就差監鎮江都酒務此則當時所被勑也六年除通判巴州事靖康二年御史中丞陳過庭等薦可臺職召赴闕假宗正少卿充和議使公奏名不正改其名計議使議者以公剛方難合必不可屈徒死無益乃不遣行㑹選易河北帥守擢公直秘閣知磁州加河北義兵都總管就遷秘閣修撰髙宗以親王奉使過磁公力止之朝廷即授以天下兵馬都元帥公為副元帥暨髙宗即位南宮命公以龍圖閣學士知襄陽府俄徙知青州又用尚書右僕射李綱薦徙知開封府遂以延康殿學士為京城留守兼開封尹陞資政殿學士建炎二年秋薨于雒有㫖除門下侍郎御營副使依舊留守而遽以訃聞詔贈觀文殿學士諡忠簡公先是公請休致特授朝散大夫恤典行累進其階繇通議大夫至開府儀同三司詩不云乎無競維人若公者非所謂命世之大材與方其盛年置之散地且踰兩紀以忤一道士得幸用事者坐廢四年及河朔事勢危急始舉磁以授之公年已六十八矣其受任居守也二帝北狩髙宗南巡於斯之時中原岌岌眞如一髮之線引千鈞之石臨萬仞之淵尚賴公雖老而奮然自必身任恢復之事夫何規模甫定功業垂成而時宰黄潛善汪伯彥忌之遇事輙從中沮之公不勝憂憤疽發於背而死及之兹非有志之士所為太息流涕者耶公既薨而宋竟不復有中原矣豈人之無禄而天不憖遺也將不欲混一而遽摧之也於戲喪亂之來必生撥亂之材以擬其後公智略不世出天固生之徽宗固不用之髙宗雖用之又不免以小人間之是則公之吞志以沒宋之偏安於一隅其豈天運抑亦有人事焉覽是誥者未可直以為足見一代之故事也此誥行於宣和四年壬寅後二百八十二年為今洪武六年癸丑公八世孫經重加裝池且請其表兄蘇伯衡識公削奪之由并官伐之槩以便觀者而伯衡輙以夫所素慨者係之寔是嵗之十月二十日也宗忠簡公祠堂記知府劉􅉅譔治亂有循環之運禍福無不報之機君子之事功有幸不幸之殊而其休光則無古今之或異公一代人豪也遭時坎坷踣躓頓挫老而見用宋室中㣲郊闗為壘奸邪竊柄羣情洶洶汪伯彥黄潛善輩力主播遷秦檜王倫輩力主和議舉天下之人匹夫匹婦皆知其非而牢不可破膠固而不可解卒以亡國者子不知孝臣不知忠孤注君父以偷目前之茍安而不知敵人谿壑之欲正欲蹂踐我疆場民物以收不戰之功懵者黠而智者愚豈非數歟公忠義奮激羹牆夢寐無時不在青城左右使宋人少知親上死長之義相李忠定以責成於内委公與岳武穆以收効於外則返上皇而復邊境可以指屈乃不知出此此殆難以人論矣夫以髙宗之明困心衡慮備嘗世故自開府以至即真與公同事豈不知公之必可用而用之必有成柰何為君父一心也為巳又一心也汪黄之姦何所不至想其紿帝必曰畫江守淮此為上䇿輕挑速戰難成大功宗某之才規畫有餘持重不足萬一少挫雖欲假寐江東不可得矣以為巳之心聼為巳之説不約而同深入骨髄故下令曰敢阻南遷者死公則大肆危言略不顧忌回鑾之疏至於二十四上披瀝血誠吐露肝膽雖字字流涕言言忠愛不勝衆楚之咻矣嗚呼宋室之禍亘古未有天下臣民嗚咽飲泣有不忍言者公雖有天下之大才不能濟天下之大艱能以片言留康王以續南渡一百六十餘年之統而不能以大兵返北狩之轅能使兩河赤子戴之如父母而不能使髙宗信任之如汪黄能化奸為良而呼吸之間招集百八十萬之戰士而不能一時脱於讒譖之口盖公之所能者天也所不能者人而天之也使公抱恨含寃賫志以沒非公之不幸宗社生靈之不幸也公之忠精則與雷霆争震與日月争光與天壤争悠久宋人自狹乃較一官於死贈然則門下侍郎與觀文殿學士何足軒輊我公耶公諱澤字汝霖系出南陽漢汝陽太守資之裔五代時避亂江南遂居婺之義烏生於嘉祐四年十二月十四日已時登元祐六年進士第廷對剴切置末科官館陶縣尉歴龍游膠水趙城令所至有惠政以薦改知萊州掖縣乞祠得管南京鴻慶宮左道嬖倖者譖之褫秩覊置鎮江府愛江山之勝遂卜居焉經郊恩復監鎮江府酒税靖康元年御史中丞陳過庭等薦之八月甲寅假公宗正少卿使北時以公剛方恐撓和議不果行九月除公朝奉郎直秘閣知磁州是時公年六十九矣窮拂萬狀之餘始得少展自此至沒纔三年嗚呼晩而用用而不究豈獨宋人之憾哉其子穎扶𦵏鎮江京峴山之陽今為丹徒縣治東大慈鄉汝山灣之原永樂間郡守劉仁為之立祠表墓買田以贍祀事可謂知所重也余自童稚讀書論世未嘗不三復浩嘆思起公於九原為之執鞭先驅今乃濫竽父母之郡竊念岳武穆本受公節制而廟在臨安湯隂極其宏壯公梓里乃無半畝之宮以妥靈爽何以表揚忠義而風動後人徃來于懐者久之一日買得隙地數十丈於光孝觀之東髙阜爽塏惬余鄙志乃鳩工市材搆屋四楹中奉公木主不敢随俗肖像左右各四楹以處公孫子之司香帛者門屋四楹以時扄鑰直前百歩買民居闢甬道以通拜謁公豈以祠之有無為加損而亷頑立懦非此不章固有司事也祠成貳守濟南張齊通府晉陵趙天定推官新建姜山甫咸曰此不可以無記余因闡治亂禍福成敗之由備論有宋君臣之得失以附春秋之義而發古人之所未論諸君臣恐亦不得而辭也正徳乙亥五月望為之記弔忠簡公長篇給事中天台呉芾譔原名著嗚呼哀哉元帥公百世一人不易逢堂堂天下想風采心如鐵石氣如虹正色立朝不顧死半生長在謫籍中眞金百鍊愈不變流水萬折歸必東落落奇才世莫識欲知勁草須疾風維時中原丁禍亂邊塵漲天天濛濛衆人畏縮公獨奮毅然來建中興功雄圖一定百廢舉獨見南陽起臥龍嗚呼哀哉元帥公翩然遺世何悤悤無乃上天亦乏材故促我公還帝宮公還帝宮應有用何忍坐視四海窮嗚呼四海正困窮興仆植僵賴有公公昔居東都天下日望公登庸公今既云亡天下不知何時康正如濟巨川中流失舟航當今士夫豈無人闕雖有公器業誰如公忠良公雖不為相徳望振要荒公雖非世將威稜讋豺狼偉哉奇節冠今古我試一二聊鋪張靖康之季秋北敵正披猖廟堂驚失色愁睹赤白囊公首慨然乞奉使欲以口伐定擾攘朝廷是時未知公公之素志不獲償憂國耿耿思自效再得守土河之旁命下得磁州翼日徑束裝下車未三日敵騎巳及疆敵人聞公亟退舍疋馬不敢臨城隍頃之得兵數十萬康邸賴公王業昌及公領留守北顧寛吾皇恩威兩得所春雨兮秋霜餘刃曾不勞㣲弱成安强姦雄盡膽落誰敢亂紀綱嗚呼哀哉公死矣民今安有粟得嘗虇􅀢乗我虗近復陷洛陽洛陽去東都雉堞遥相望不聞敢侵犯豈是軍無粮祗畏我公霹靂手氣懾不復思南翔嗚呼哀哉公已矣秋髙馬肥誰與防天子久東狩去冬幸維揚都人心戀主謂言何相忘朝夕望回輦斷腸還斷腸公獨以死請百請意愈剛嗚呼哀哉公死矣萬乗何時歸大梁咄咄食肉人尚踵蔡與王姦䛕蔽人主痡毒流萬邦人怨天且怒意氣猶洋洋所冀我公當軸日盡使此曹膏劒鋩嗚呼哀哉公死矣始知國疾在膏肓我公我公經濟才設施曾未究所長但留英聲與茂實永與日月争輝光此死與公亦何恨顧我但為天地傷我聞天下哭公者哀痛何啻父母喪父母生我而已耳安能保我身無殃都人此時失所依波迸東下紛蒼黄我公我公不及見秋風在處生悲涼百身倘可贖我願先以㣲軀當靈丹如可活我願萬金求其方旁皇竟無起公計安得長喙號穹蒼嗚呼哀哉元帥公太平時節君不容及至亂離君始用民之無禄天不從嗚呼哀哉元帥公古來有生皆有終維公存亡係休戚千年萬口長怨恫嗟我草萊一賤士念此抑鬱氣拂胸銜哀忍涕何有極願以此詩銘鼎鐘忠簡公畫像賛東吴吴伯宗譔公之力足以旋乾而轉坤公之功足以攘夷而安夏始以一言能反北斾而南還後以二十四疏不能回南轅而北駕且留鑰之任方切而巧言遽入於帝聰渡河之志未酬而大星已殞於中夜何人之於公則知媢嫉而天之於公則不知假借此有志之士百世之下所以想英風而激昻拜遺像而悲咤也題忠簡公峴山遺壟邑人王禕譔艤舟大江口矯首望京山山色近目睫洩雲護層巒吾鄉忠簡公丘壟在其間嗚呼靖康亂九鼎紛播遷建炎既南狩國事巳艱難公方任社稷百戰心力殫神州將金璧抗疏請回鑾大誼表日月衷言披膽肝誰歟獨何心忍使棄中原星殞孔明死王業遂偏安惟留忠誠節宇宙垂不刋遺墳托兹土孰敢樵牧千客途有程期無由拜荆菅遺武幸可蹈英風杳難攀天昏白日落凄然洒清澘書復立宗忠簡公墓碑巻後廬陵楊士竒譔為政在使民知為善而巳而非有以勸之民或不知為之也故尊徳禮賢表孝友褒忠節皆勸民之務也宋宗忠簡公其孤忠大節所謂皦然可與日月争光者而竟以譖幽憤死盖天下後世所共仰慕而悼惜之者也然𦵏於潤無三百年巳莽然荒烟衰草之墟樵牧徃來行道不弔此豈潤之人其心獨有異哉公嘗仕於此居於此至感慕徳義吾意潤之人必有深於天下後世之人者何為獨漠然若是也非由為政者不達勸民之道雖有公之賢不知敬禮而致民之然歟今六七年前金華劉侯伯静以監察御史出守是邦一新政教修舉百廢乃復葺公之祠及治其墳塋又經紀其祠田命佛氏之徒董祀事而躬率博士弟子展禮墓下又刻石墓道使過者皆知為宋忠臣宗公之墓於是潤之人始知有忠簡公又知為善者之久而不泯而在已不可不勉于善也劉侯為政可謂知所務矣去年與侯同在史館為余道其事今侯去潤而佐江右大藩自昔江右孤忠大節如忠簡公尤多而江右之人固不為潤之人之漠然也將侯所以加勸之者尚能拳拳如治潤之時乎又原作義烏宋先達傅邑人王禕譔宗澤字汝霖母夢雷電紅光下燭寤而生澤自幼有大志元祐六年登進士第調館陶尉歴龍游膠水趙城令皆有能名改知掖縣差通判登州忤道士得幸用事者予祠而歸復坐削奪覊置鎮江尋監鎮江酒税靖康元年朝廷議遣使與金人講和用薦者假宗正少卿充和議使澤奏名不正改計議使衆謂澤方剛難合必不能屈且徒死無補不若付以河朔一要郡除直祕閣知磁州從羸卒十餘人倍道之官至則治城池修器械廣儲畜募敢勇為必守計且條畫邊防要䇿與勤王之議上之除祕閣修撰河北義兵都總管髙宗以康王使金過磁澤力止之朝廷因命為兵馬大元帥澤副元帥加集英殿修撰髙宗承制復加徽猷閣待制凡與金兵十數戰皆有功方進兵臨濮而京城不守矣金人逼徽宗欽宗北行澤即引兵趨滑抵大名將徑度河據其歸路邀還之而勤王之兵無一至者又聞張邦昌僭位即欲先行誅討乃還軍衛南且上書髙宗勸進建炎元年五月髙宗即位南京趣詣行在所入對涕淚沾臆陳興復大計踰千言且曰願陛下一怒以安天下之民臣雖駑怯當冒矢石為諸將先得捐軀報國家志願誠足矣髙宗壯其言擢龍圖閣學士知襄陽府改知青州俄改知開封府尋遷延康殿學士京城留守眞除開封府其訓辭曰雖蕭何之守闗中寇恂之徇河内以卿比迹於古有光澤素蓄忠義至是益自感奮招集四方義士得百餘萬復有河北山寨效順者數十萬來聽節制京城内外所屯兵實百八十萬方尅日大舉渡河而遽屬疾諸將入問狀矍然起曰吾固無恙政以二聖蒙塵至此汝等能殲滅醜類吾死何恨衆皆洒泣同聲應曰敢不盡力翼日遂薨臨終唯呼渡河者三二年七月也時髙宗南渡已久至是有㫖除澤門下侍郎御營副使命未下而訃聞詔贈觀文殿學士通議大夫賜諡忠簡始澤身任中原之事既修復京城力請回鑾疏凡二十四上而黄潛善汪伯彥從中沮之以故憂憤成疾澤既薨數日間民人散去者十五六議者謂其子穎嘗居戎幕得將士心宜用以卒父功於是朝廷巳用杜充為留守乃除穎祕閣留守判官穎尋服喪而歸所集義士悉散去而中原不守矣穎後為兵部郎中贊曰髙宗之南渡也中原之事一委於忠簡及中原尅復而髙宗乃無有北還意忠簡以中原無所倚因請以信王榛為兵馬大元帥信王榛者髙宗親弟也潛善伯彥輩輒譖其有異圖遂有門下之命雖曰尊任之然實奪之權家傳國史皆不書其事盖諱之也嗚呼髙宗之無意於中原固不足論使忠簡而緩死則神州全璧社稷長靈實嘉賴之矣然則盛衰之際庸非天乎宗忠簡集巻八
