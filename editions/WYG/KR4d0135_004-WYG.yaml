body:
  text: 宗忠簡集巻四宋宗澤撰書求教書某未冠時持先人遺書一車他無所㩦悲吟梗槩懔然去國求師承于四方閲十餘年矣崇筵絳帳所歴數十取道一無所得莫悟其繇因悵然以歸一日拏舟越重湖將泛巨浪以放心志之鬱紆也並堤而行延緑葦間皆漁聚落得漁老焉邀過其處蔽漏蕭然掃地以坐因詢之曰瀕湖而漁何憊之甚豈術之謬乎曰不然余所學任公子釣也任公子之釣為大鈎巨緇五十犗以為餌期年而得魚可以厭淛河蒼梧之民也若夫有是具而得是魚則利固可以終身豈不泰乎今有若魚矣而乏其具是以病焉某始聞而驚曰求師而取道亦猶是也學未備而欲聞至教固亦難矣盍益之名都大邑通儒之聚凡古人所著之書與今日之學者耳目所未及一皆貫穿熟讀要其無所不知無所不有一展底藴以求至教則於取道其亦庻乎既歸且治之有智叟過門而歌曰辰乎辰乎盍來之遲而去之迅乎巳乎已乎筋力憊而死期至乎某再聞之而疑曰諒矣魚人之弗慧也吾又祖其困而取斃耶大魚不易得至教不易求吾其與求魚並志可弔之使改圖乎因訪前日之處首至其鄰焉因告以學漁之難繼訊之曰子之漁何求之易而利之多耶鄰漁曰予所學詹何氏之釣也不若是之費也詹何氏之釣以獨繭絲為綸芒針為鈎荆篠為竿剖粒為餌於百仞之淵汨流之中引盈車之魚綸不絶鈎不伸竿不撓為術無他獨臨河而用心專故能以輕致重也某終乃拊髀而増嘆且至是乎必求大具以要大魚者皆見笑於詹何氏者也亟走以歸屏前日之俗勞一其慮養其氣盡精白而無巧偽所幾亦有取道之質矣今則行之彌年果獲造先生之門焉恭惟先生道學淵㣲智識髙玅登天庭而拾科第揚仕路而展材略皆其緒餘耳然則所至則士皆歸嚮所言則世必傳載凡游門下者其於求教而取道無不厭其所欲某前時過江來鄉曲知識皆寄聲相賀曰知子用鄰漁術㩦荆篠針鈎徃遊龍伯宫矣盍勉之干冒師嚴上鄭龍圖求船書嘗觀昔有逸客為江湖隠者意欲浮家泛宅便可一生而呉興太守敕舟徃助之昔有墨客為山水遊者㑹以暴漲輙數日不粒而來陽縣令具舟徃迎之夫為江湖隠是殆徜徉彷徨於塵埃之外為山水遊是殆茹髙激清於耳目之表非有不得巳之事羈酸憔悴之色彼太守縣令者何為乃旦旦然待之覻覻然驚之賓賓然恤之借使有冰氏之子俯仰空谷鶉衣之士蕭寂窮途寄五斗米而淵明之歸去來有不可賦無二頃田而衛人之胡不歸有不可得全家百指如飄蓬斷梗一在天之涯一在地之角其當時太守縣令脱或見此豈不伐南山之木而濟之哉某諱窮久矣家徒四壁立矣平生不喜為吏寒窘犯人挈挈然廹之使出官遊東方聚室待餉獨祖母老矣重棄故鄉而客逺官遂留不行乃者家君得幕金陵去鄉邦跬歩白髮之老亦既願徃低回商略勢不可久於此昔攜家中半而遊東方今又攜家之半而歸江南矣然自密取道得車則至朐山帆則至江左躊躇四顧疾聲而問曰誰哀王孫乎誰借以一葦而使渉大川乎恭惟閣下英風健譽傳在衆口徳宇廣闊人有芘賴某也名不譽於賓客之席肩不摩於夫子之牆乃欲囊㩦長書筆話羈態如轍中鮒犬呼乞憐豈獨他人笑之某亦自笑之矣且謂孤窮無挾之語惟某可言廓落推挽之心惟閣下可望矧龍圖近班非若呉興來陽之卑且賤而某今日懇欵亦豈為江湖隠為山水遊特得巳而不巳者哉倘蒙垂徳肯聴則飛帆鼓楫泝大江而下其朝浮暮泛者皆恩波也上王提刑書天寒日暮雪霜併至蕭條冀北之野犬争食而鳥啄瘡者乃其所也孫陽過焉昻頭掉尾强起而一鳴人孰不笑之噫是馬也瀕困等死耳亦知激其感遇夫何傷乎孫陽忽察焉見其所不見而不見其所見秣芻以飼之封藥以裹之異棧而羣毛辟易受羈而道路改觀春風入蹄頓掣千里自古詩人畫史與㑹稗小説一皆異口而賛美兹事是以孫陽為善相馬而精䰟比於列星信不誣也某深感於此故復摭其事而進焉重念某一登仕路備驅策者二十餘年盖亦渉長途縈險道未嘗敢一跌以負主人之責者況竊衘轡為哉今則既仕而老將至矣以日計之方將㺯影於無人之道而猶坐曹以竊禄也嗟夫士不遇知巳老死填溝壑者徃徃尚有顧某何足數而欲覬閣下之知我而憐我雖然冀北之鳴聊為孫陽而一發恭惟閣下英姿偉望簡在朝右固宜羽儀帝側而鳴玉禁途廼者暫輟華班出司邦憲擁麾澄按經歴列城正孫陽過門時矣倘僕僕道旁袖書自列不知者皆胡盧而笑知我者猶謂其激於感遇也不識可賜調御一經九折之坂否剖心誓天言不悉意上李丞相書諱綱某衰老無所能解但聞敵人驕蹇尚有横肆之意欲言之慮渉自媒欲不言之又恐緩不及事且或誤國然自媒之罪小萬一於國有誤則罪死無濟比蒙恩差某知青州兼京東路制置使仰荷朝廷眷注所以為一身計則甚安便矣方今二聖蒙塵天子駐蹕在外京城嗷嗷顒望翠華回輦四海生靈猶有未復業安堵如我祖宗時者顧一身偷自安便如憂思過當不能自為一身安便何恭惟僕射相公以道應世不忘天下休休有容恢恢無間欲再造王室欲中興大宋基業想勞心經濟上副仰成凡所設施必以天下在起居飲食間也前過京師有河東數百姓來日訴乞收復河東州縣有數太學生并太學正王擇仁來相見言收河東事於今月二十九日有王擇仁附書并諮目來與某顧某雖不以一身自營為計而無路可為相公有志天下願輔佐天子纉承焦勞再造中興我太宗奕世一統寳緒毋蹈東晉既覆之轍毋安積薪未燃之火某不勝痛憤激切之至所有王擇仁劄子謹此繳納與北道總管趙野約入援京城書靖康二年二月某惶恐再拜上覆北道總管資政閣下春和恭惟鈞候動止萬福竊惟京城圍閉日久君父注望四方勤王之師入援想不啻饑渴資政為北道大總管乃將大兵自衛迂回曲折走南京駐劄蔽遮江淮之人俾不能進前固護王室則朝廷何賴於屏翰伏望早賜指揮進發去京二三程劄寨示敵人以天下人心歸嚮軍民怨切願瞻天表之意庻幾敵人畏恐下城引去以示忠節無為身謀不勝拳拳憤悱激切之至與河北河東宣撫范納約入援京城書某惶恐再拜上覆河北河東宣撫太傅春和恭惟鈞候動止萬福太傅是朝廷重望大臣凡所舉措為天下重輕為四方軌則今以河北河東宣撫之名乃擁兵自衛迂回退縮劄駐南京是耶非耶不知太傅晝思夜度謂臣子大義果如此耶若以周旋無非合於義理伏乞指揮開放道路濟以糧斛令江淮以南州軍皆得自進勤王去京城二三程劄寨示敵人以天下歸向激切之意庻敵懲戒無有後艱毋為全身之計不勝幸甚與知興仁府曾楙約入援京城書某頓首再拜上覆知府待制春濃恭惟台候動止萬福近汪元帥録云藥方云是左右所撰某竊疑之且有人至親偶感是疾其為子者豈可安然坐視漫不省察使邪毒之氣漫滛侵蝕耶亦豈可輕聴人言遂一切屏去表發洗滌之劑以助養真元使三百六十骨節之間更無外邪之證俾其親享無窮之夀而其子自保仁且孝之名乎今敵人猖獗侵犯畿甸待制使之為醫者誰歟醫之用藥能表發其外洗滌其内者誰歟既來有為醫與藥者乃揮諸兄弟令望望然去之曰是時氣也姑當任之不可召醫不可用藥是亦不仁不孝也已某衰老無能過膺重責夙夜震恐不敢寕處伏望待制炤悉早賜指揮所統諸將起發前進令去京二三程劄寨示敵人以天下軍民至誠懇切奮不顧身願入覲天表之意毋為一向顧惜諸人私意俾敵人恣肆全無忌憚也宗忠簡集巻四
