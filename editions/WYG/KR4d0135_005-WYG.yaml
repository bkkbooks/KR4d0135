  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0135_WYG_005-1a, image: WYG1125/WYG1125-0051a.png}
body:
  text: 宗忠簡集巻五宋宗澤撰賦撫松堂賦遺王居士嵩少之麓萬松鬰然偃髙盖以鳴風盤深柢而切天却揮斤於睥睨欵化石而頑堅帳莫致之華我林泉發聘士之幽尋課畦丁而小遷培拱把而氣藏運桔槹而智圓寓修身於種藝戒除惡於蔓延期百尺于嵗寒扶大厦於將顛眷焉撫之倚笻於麓薈翳其成森若巖谷且溉且壅濯我喬木或攅膏而為酒或飛烟而取墨或採脂以儲藥或祈明而代燭或盤縷以為扇箑或折枝以當麈玉倘聘士之見須効尺長於必録我觀此物碨落節目擅巨棟於廟堂備行艫於海瀆用扶危而利渉肯收功於芒粟肖象伊何萃於一庭蒼官侍坐青衣侑尊鼔琹瑟於晩吹晃屛幄於朝暾聘士顧之内娱外忻陋軒駟之飛馳避門箔之炎薫我觀此物受命不羣禀直氣以自如信孤標之獨尊聳若髙才儼如正人思仰止而企及罷童語之紛紜苟好尚之不移質是非於老生姑置勿談羽服綸巾時矯首以怡顏毋折腰而役形處身世於無心看出岫之飛雲以聘士為後來之淵明也古楠賦有序巴城之南山有寺曰南龕寺之外有大木曰楠其生甚久唐刺史嚴武御史史俊皆有詩謌刻于嵓腹嚴曰臨溪挿石盤老根史曰結根幽壑不知嵗自時迄今又數百年邦人謂之古楠宜矣僕到官之三月兩至岩下讀史嚴之清什感是楠之老於岩谷而可憐也因慨然操筆而賦之曰楠之生兮層崖之中巔詢之人兮不知幾何年包堅根而下蟠兮貫頑石而澈沈淵竦修榦以上凌兮並孤岑而叅蒼天大枝崛起兮虎豹拏攫小枝回屈兮蛟螭蜿蜒黄葉敷隂白晝沉沉輪廣十畝盖穹百尋衆鳥托宿鄧林非深諸卉仰芘荆雲非隂雨濯瑩兮一塵不染風振響兮海潮同音露下兮鶴唳月明兮猿吟擅此清致亘古迄今有客戾止惻然動中吁嗟斯木之異兮有不遇之窮爾胡不生於泰山之側秦帝東封㑹風雨之是避豈以五大夫之號而封松爾胡不生於周成之宮禁林九重顧親賢之是戲豈以封國之瑞而剪桐爾胡不生於分陜之域舍彼召公未必以甘棠之蔽芾流詠於國風抑亦豈無工師之良識爾材之非常用之為棟梁則足以建九重之明堂用之為舟楫則足以濟巨川之汪洋用為宗廟社稷之器則足以參鼎鼐交神明薦至徳之馨香夫何黙黙而甘老於窮山寂寞之鄉徘徊其下恍若夢兮心駭而目眙蒼髯偉人瞑目視曰噫謂子知我乃不吾知吾生於斯長於斯始于毫末至于十圍雨露不吾遺霜雪不吾欺春兮秋兮吾不知代謝之有期漢兮唐兮吾不知興亡之幾時柯葉顏色曾無改移過者千百睥睨焉不以吾為樸􅈪輩待之斧斤之害亦幸不罹吾受天地造化之恩孰有等夷子之不智而乃我悲使子處此復將奚為吾非不知强自取藏器以待時而動老當益壯自任以天下之重倘匠人斵而小之能不浼然而悔痛乃所願比不材之樗同乎無所用若曰不遇自有物主之非吾所能為姑亦付之一夢客聞之釋然悟曰達矣夫斯言可書紳而永誦詩五言古東上辭松楸一首八年坐親黨泯伏長安城甘心傍松楸申我兒子情閉户慨岩廊讀書笑金籯力田固為政課童乃司兵深病骨相寒不蒙軒冕榮維天臨萬邦捜羅世豪英我友挽出之大人今繼明古無忠孝全泣涕去丘塋為翁大門閭翻然以東征感時有序强敵長驅京邑阽危此忠臣義士痛心疾首勤王報國之秋也而宰臣遷家郡守踰垣縉紳士大夫陸竄水奔使人主嬰孤城以自守無一犯難者事小定矣而上書獻䇿之人亦未有慨然以東者世道之衰一至此乎太息之餘以詩自道卿士辱多壘天王憤蒙塵禦戎要虓將謀國須雋臣百戰取封侯未必亡其身懐奸廢忠義胡顏以為人吁嗟世道衰大僇加縉紳平居事奔競梁汴分雲屯一旦國歩艱四迸如星繁輔相巳擇棲守令仍踰籓冠盖陸西竄舳艫水南奔鄙夫用慨然䇿馬趨修門勤王羞尺柄悟主期片言時來倘雲龍峩冠拜臨軒逶迤上玉除造膝伸元元措世於泰寕歸來守丘樊謁華嶽楊賜嶽所挺嚴武金天晶二子為時出顧我非炳靈維嶽鎮四方氣秀天骨青嶻嶭立千仞力能產公卿降神詠崧髙讖諱仍反經取象到執珪譎怪如洞㝠平生笑窮奇立語心自驚我質培塿耳胷山固峥嶸誰言華嶽髙我山摩玉京是中所包藏丹碧參瑰瓊平居蟄雲雷飛雨溢四溟此豈眞有之落筆紛縱横發我文物秘象渠膏澤傾太華屹不揺我山身載行五言律雨晴渡闗二首燕北静胡塵河南濯我兵風雲朝㑹合天地晝清明泣涕收横潰焦枯賴發生不辭闗路逺辛苦向都城其二蕩滌眞成快氛霾不敢隂萬花恩澤了二麥寵光深地勢瞻仙掌河源識帝心馬頭迎霽色詩句日邊尋過潼闗一雨崤函底風沙放我過嶽神猶假借官吏莫誰何塹斷思航渡城堅戒石摩一夫工墨守寕怯萬夫多道逢鄉人笑僕騶馬之痩生笑長裾曳仍羞下澤奔據鞍非馬援叱馭豈王尊汗血能觀國的顱終感恩莫欺騶馬痩揮䇿詣金門五言絶盤豆舖南李翁園李翁臥亭午春深掩柴荆忽聞風雨響疑是勤王兵六言題趙園瑶瑛夾侍梅臺琴瑟自鳴松島山中野服相羊足以亡憂遣老鑿池智有泉源種木胷無芥蔕螭頭吐水涓涓端是銀潢一𣲖七言古道逢散遣之卒云講和退師無所用之矣輙以二十六句道胸臆翁擁麾幢我為兒剽聞竊睹皆兵機其中襲擊不容瞬颷行電掣猶逶迤戎人長驅越大河天下震驚觀闕危肉食之謀殊未臧我憤切骨其誰知慨然奏疏金馬門力陳盟賂損國威嚴尤下策尤可笑晁錯上書亦奚為道路荆棘初剪除花如歩障吾東之八年閉户尺蠖屈一旦渡闗匹馬馳行行側身聴戎㨗忽聞募士詔遣歸濃書大墨榜教詔曰敵悔過今退師羽檄向來召貔虎乃詠出車謌杕杜櫜兵銷刃兵猶怒却把鋤犂農鼔舞君王神武今藝祖爾賊不歸汙我斧七言絶句曉渡小雨踈風轉薄寒駝裘貂帽過秦闗道逢一澗兵徒渉赤脛相扶獨厚顏華隂道中煙遮晃白初疑雪日映斕斑却是花馬渡急流行小崦柳絲如織映人家其二菅茅作屋細家居雲碓風帘路不紆坡側杏花溪畔柳分明摩詰輞川圖其三寕王畵作金盆鴿韓愈詩誇玉井蓮瓦缶泥泓村落小亂茅羣雀不堪傳至洛都人士女各紛華列肆飛樓事事嘉政恐皇都無此致萬家流水一城花華下千岩層出亂雲飛失我平生洞府期夜據征鞍不交睫舉頭彈指睡希夷馬上口占龍興虎視詫周秦王氣東遊作汴京隂祝巨靈移此險大河為塹嶽為城蚤發􅀈幄垂垂馬踏沙水長山逺路多花眼中形勢胷中䇿緩歩徐行静不譁宗忠簡集巻五
