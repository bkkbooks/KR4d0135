body:
  text: 宗忠簡集巻六宋宗澤撰雜著寕國長老語録序趙州栢子果是分明靈雲桃花更無疑惑一宿不為迅速九年未是遲延萬法只是一門千口豈有兩舌寕國堂頭宗乗東道覺路南車儒釋兼通死生了達包藏無礙常發大慈悲心度接有縁默傳正法眼藏如某愚昧願師提撕濟我無底舟航還我未生面目深悟筌蹄之要證此上機姑有土苴之餘寓諸方冊閿鄉麻衣寺痩佛畫像賛壁上痩者乃人天師非病維摩亦非辟支學道雪山跏趺忍饑中包太虚外示清羸方其痩也一麻一麥鬢髪如蓬巉巗面骨及其肥也丈六金身相三十二為佛世尊非我癯儒亦非飛仙願此法身充滿大千是故合掌作此偈言題珣師休牧軒頌青居曾露一絲頭謾示人能解牧牛究竟本來無一物未知能使阿誰休一乗休去已忘機恰似當初未牧時雲起雲消本無迹有為全體是無為空餘短笠與輕蓑道着休時事早多更向中間問消息夜深無柰月明何告金天廟文維嶽雄峻維神司之雲雷翕張神固專之作帝金天號位髙明云胡戎醜竊我盛名夫金者奠方則為西制器則為兵論幣則為上鍾人則為英厥號耿光可享維神彼敵無知擅于厥身匪國之殃繄神之讐神弗殄誅為神之羞大發隂兵百萬其師怒目張牙龍甲豹皮彍弩横刀鐵騎沓馳助我羆熊戮彼鯨鯢神以獨尊祀以不隳借神威靈一掃無遺請寕國再開堂䟽伏以山上浮雲本無心於去就海中潮水豈有意於徃來無非時節因縁要識巻舒任用寕國堂頭自家衣鉢非徒庾嶺傳來心地泉源便是曹溪流出吞盡三世諸佛跳出四面八方七縱七擒縱横妙用三仕三已喜愠不生何妨舊店重開可謂前燈復續珠還合浦鶴返故巢正當恁麽時請説這箇法請海長老住蘇溪崇徳疏伏以萬法本空一性圓寂撚花鷲嶺曾虧一笑之瑕面壁少林猶病多言之失必也忘眞俗之二諦泯色空之兩途自非圓頓之流曷致機筌之用某人長老洞明宗㫖深達祖風始出世於治平實印可於法湧退藏密㫖栖心彌勒之道塲重振宗乗示跡法輪之古刹人天共集凡聖瞻依㑹須振領提綱十方坐斷若也超佛越祖一線不容除是慣戰作家能具正法眼藏既登寳座願振潮音俯徇衆情無煩退托請舉老住滁州寳林靈山正法眼本從㣲笑傳來金粟不二門亦向無言悟入必將説難説之法相與叅未參之禪灼然開口便差須是當仁始得某人導雲門之一派住龜鷲之三春祖風夙振於淮壖道價浸髙於海内屬寳林之虚席合衆刹以謀師既蒙赴感於随緣何異逢塲而作戲前日瑯琊席上巳示老婆心只今襄水岸頭佇聞獅子吼為華州作延請晝老疏義標第一建特地之伽藍語揭前三屹衝天之窣堵雖伏神龍之暗護亦資象數之㝠捜不有當仁豈容作禮某人性融圓覺迹契因縁定裡光明入惠持之境界句中法令得智老之門庭願解禪包來提祖印奮拳擲臂宜借掌於巨靈舉拂拈鎚試拔蓮於玉井不憂末劫端是本心千手眼大悲偈千手一手用千眼一眼觀用觀無差殊何必許多般覽鏡偈覽鏡影還在掩鏡影還去試問鏡中人却歸什麽處盧行者偈休問東西南北莫説之乎者也直饒神秀文章不似老盧行者佛説偈後學要説禪教人學圑謎佛祖意分明但為傳衣鉢宗忠簡集巻六
  hash: sha256:cace7d299b90d88f6b31eccf9607fc93f5d2898c7a12aaec66e4e30ce667b737
