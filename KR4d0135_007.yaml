body:
  text: 宗忠簡集卷七宋宗澤撰遺事公姓宗氏諱澤字汝霖系出南陽漢汝南太守資之裔五代之亂避地江南居婺之義烏生嘉祐四年十二月十四日巳時公生而趣尚不凡長有大志讀書過目不忘游學四方籍籍有聲登元祐六年進士第時宣仁聖烈皇后垂簾詔廷對䇿限以字數同輩相告曰必如詔可以中程公曰事君盡忠自今日始豈可圖前列而效寒蟬乎遂力陳時病幾萬餘言且及吳處厚蔡確事曰自古興衰治亂悉由人材人材之困厄於朋黨今處厚箋注詩章臣恐朋黨之禍自此始主文者以其言直恐忤㫖置公末科賜同進士出身八年以將仕郎調大名府館陶縣尉攝邑事吏多以年少易之及牒訴遝至剖析曲直迎刃而解不奄月訟庭閴然紹聖二年冬呂參政惠卿自大名移帥鄜延欲辟公置幕府固辭不就即檄公與邑令視河堤檄到值喪長子捧檄遽行惠卿聞之曰可謂憂國忘家者也適朝廷大開御河隆冬役夫僵仆於道中使不以申奏監董甚急公上書帥司略曰某非有避也時方凝寒鍤钁一舉冰凍已合徒苦民而功未易集少需之至初春可不擾而辦當身任其責卒用公言上奏朝廷從之明年河成所活甚衆㑹秩滿去官五年循通仕郎遷衢州龍游令邑小民未知學公為建庠序設師儒延見諸生講論經術自此登科者相繼起里閭惡少嘗十百為羣持蛇虺擾民以規利稍不如意輒鼓譟擲瓦礫碎屋壁前令不能禁公密白之州籍其壯者為軍日得百餘人風遂革未幾丁淑人劉氏憂崇寧二年服除調萊州膠水令膠水號劇邑豪奸宿蠧挾勢虐民習以成風有溫包者恃隂告人率不實公案前後犯治之州别駕與包連姻以位臨曰令敢爾邪公曰包犯法某以法治不知其他也有强賊百餘人侵縣境率僚屬親捕之且約曰獲盜公等受賞不然身獨任罰幸無退志一士族女被掠匿旁郡久之不能獲公亷得其跡越境徑造賊壘取女以出斬首五十餘級焚其廬州奏功于朝官屬皆被賞公亦進文林郎同舍生林迪者先公登第音問不相及者纍年官萊之别邑公始至也迪挈家詣公經旬而去迪以病告公赴之垂革尚能語曰迪身如何公曰某任後事室人子女如何公曰嫂當養子當教女當適佳士後以迪女妻修職郎康森且慮居處南北再以親女妻森之弟協申愛好焉迪子懋後從公討賊得官又文登令卒于官貧不能歸公詣弔之厚以俸津遣其行職甫滿丁大父憂大觀三年循承直郎再調晉州趙城令下車修媧皇祠新趙簡子廟且請于朝曰趙城前有并河汾陽之固後當晉絳蒙坑之險左依霍邑右阻太行沃野百里可以種植實河東用武之地願升縣為軍如楚之漣水開德之德清命以軍額實治縣事且大養軍士以備不虞復言慶源乃國家興王之本趙城又慶源之本也書聞不盡如所請公曰方今承平之久固無慮他日有警當有知吾言者矣政和三年以薦改奉議郎知萊州掖縣一日當路需牛黃縣坐數百兩吏民惶懼無以應公條具報部使者曰方時疫癘牛飲其毒凝為黃當此太平和氣橫流牛無傷者黃何自得部使者怒取邑官名位欲劾奏之公曰此意自某出同僚何預獨書銜以上牛黃竟免亦不加罪公前後宰四邑其綱條簡而不煩所至稱治嘗語人曰某之作邑其始以信濟之以威信既孚矣威亦何用直龍圖閣范公純粹知公深每對客語及作縣則曰如宗君所至有去思雖古循吏未見其比在掖縣甫及考尤為青帥王公敷所知辟置幕下未幾敷罷中書梁公子美繼來公投檄丐去子美驚曰聞公名舊矣何疑而遽去也公力辭不獲子美欲新青城壁擬拆齊之樓櫓以助增修檄公往相視公曰齊亦吾地損彼益此人必以公為隘願勿毁子美欣然從之五年有㫖升登萊濰密四州為次邊遴選能吏可任守二者子美以公名應選差通判登州郡邑有宗室財用田數百頃皆磽瘠不毛之地嵗輸萬餘緡無所收率取于民以應辦公條奏得除免黃縣有大俠與河上居人有隙請於朝言治河事下部使者大起夫役公曰是役也吾未見其利而徒擾于民條具申乞寢罷朝廷從之道士髙延昭者恃勢犯法無復以州縣為意公窮治之不顧已而朝廷遣使結金人為海上之盟公語所知曰軍興多事自兹始矣磨勘承議郎宣和元年丐祠得主管南京鴻慶宫方退居東陽結廬山谷間著書自適有終焉之志會延昭訴于朝以公改建神霄宫不當林靈素主之褫職羈置鎮江府公聞命曰罪大責輕丹徒善地即日就道坐廢四年公娶陳氏至是疾卒卜葬京峴山之陽就居丹徒經郊恩得自便四年差監鎮江府酒稅敘宣教郎公盡心乃職課入倍加六年復判巴州靖康元年有詔侍從官各舉所知御史中丞陳過庭等薦公可任臺諫召赴闕公奏對三䇿上嘉之時尼瑪哈斡里雅布再犯河朔王師一再失利廷議遣使八月甲寅假公宗正少卿奉使斡里雅布李公若水假祕書少監使尼瑪哈副使令選差七日起發公曰此行不生還矣或問其故公曰某豈能屈節外庭上辱君命邪彼如悔過退師固善否則與之力爭必死敵手初以和議使為名公力奏言名不正請改曰計議使從之議者謂公剛方難合且徒死何補時朝廷意主和遂改命著作郎劉岑初王雲使北歸過磁相謂守臣曰敵聲勢非前日比且善因糧若清野則無所得矣兩州如其言公抗章論列宰相非其人及宣撫使副提大軍逗遛不進并劾雲張皇敵勢迫脅人主及請河北西路清野聲東應西恐從東路入冦雲墮賊計先自困西路耳上以章示雲雲于是憾公切骨九月㑹詔選易河北帥臣等辛未除公朝奉郎直祕閣知磁州訓詞曰河朔列城每謹擇守矧兹滏陽當兩衝㑹寄委之重尤在得人以爾才術敏强裕於從政宣力中外克著風績俾膺是選實允僉言往其悉爾心力惟事事乃克有備則罔後艱可不懋哉時太原新失守真定攻圍甚急河北河東州縣多闕官被命者率託故不行公曰食君之祿而臨事畏避吾君何賴焉遂單騎即日就道從羸卒十餘人至河上自北來者盡驚曰敵已犯真定矣雖往何益笑不納庚辰至郡前此磁經北騎往來人民流徙帑藏枵然不復可守公至則繕城壁浚隍池治兵器募豪傑為必守計不逾月而辦唯糗糧不足視帑中所有盡以髙價糴米數萬斛然後廣募義兵應者雲集公度所儲尚不能久贍又出俸助之由是民間爭獻金榖公上疏乞邢洺磁趙相五州各養精兵二萬敵攻一郡四郡應援則一路常有十萬兵上嘉之嘗以語康王其後諸郡議卒不用時敵人再犯河朔攻保塞不克遂治兵中山大㑹酋長諸番部於真定晝夜急攻壬辰上親劄賜公曰知卿糾集軍民共濟國難今遣呂剛中侯章團練起發想當即日就道以效忠義之節苟可立功一面施行髙爵厚祿朕所不愛也繼除公河北義兵都總管有招安强寇號第十三將首令者恣橫凶暴不改故態馳騁市肆間公命斬之公領所練義兵直抵真定屢與敵接戰兵力單弱圍不可解十月丁酉真定陷河北居民震恐公條畫邊防要䇿與勤王之議併上之䇿議佚十一月詔曰知磁州宗澤措置邊防利害可採除祕閣修撰訓詞曰朕以疆場多虞干戈未息咨擇能吏以扞一方而滏陽近藩實當要衝爾條畫邊務洞達戎機剡牘上聞朕用嘉歎中祕論撰之職其選甚髙非爾之才不以輕授益恢逺略紓我顧憂斡里雅布自真定引兵南進陷慶源宣撫使范訥率兵五萬守滑濬以扞之公亦大治甲兵聲振河朔斡里雅布知有備乃東趨大名歷魏縣乙亥自李固渡渡河恐公兵躡其後乃分遣數千騎直叩磁州城下公披甲乘城令壯士以神臂弓射之矢下如雨敵退走開門縱兵追擊之斬首數百級所得牛馬金帛盡以賞軍其城上用神臂弓者又厚賞之自是義兵人人奮勵迭出擊敵或守要害日有克捷初刑部尚書王雲遣從吏李裕間道馳歸傳斡里雅布語若得親王兩府奉使議和兵庶可解康王頃嘗與斡里雅布周旋北人畏服乞遣康王朝廷從之公抗章乞輟康王之行章佚朝廷猶豫㑹雲繼至請益堅上曰肅王既留又遣康王萬一盡為所留奈何雲曰康王行則和議可成和議成必無留康王之理臣以百口保之上用雲計於是王被㫖出使以中書舍人耿延禧觀察使髙世則為參議官延禧世則見王即召雲共語王曰國步囏難臣子當盡忠竭節茍可以安社稷何辭使萬里顧謂雲曰尚書謂此行和議必成至以百口保之豈别得斡里雅布之語乎雲爭曰未嘗敢為此說王曰尚書奏事時適在御屛後盡聞所言康譓亦侍立榻旁呼譓出問之如王語雲無以對丁丑發京師辛巳至磁公率官吏迎謁王撫勞甚至公曰大王乃欲親使敵中乎王曰奉皇帝之命不可不行公曰更熟議之聞敵人由大名已渡河矣恐不可遣萬一更如肅王為敵所留又將如之何以澤觀敵情豈有肯和之理哉特設詭詞欲挽致大王耳可不察乎㑹郊外飛塵亘天公密遣禆將張宗領騎數百覘之甫至三十里果遇敵騎遙望問張宗曰是非康王與王尚書乎宗應聲云是復傳語尚書可速來宗回以告公密戒城中為備旦以宗所見白之康王曰敵情灼然可見願大王勿行王因問所養兵公曰民兵可及萬人皆在近地有急則呼之饋不費糧趙洺邢相則無有也雲因面責公曰公前日見劾何也公曰如公固不足劾自宣撫使副劉韐等某無不劾之大抵張皇敵勢者天下所共疾何獨某哉王行期未決磁有嘉應侯祠州人事之甚謹請康王與王尚書共謁祠下公從旁贊可之曰卜以決疑時有被鹵婦人從魏縣寨中脫走至磁言見斡里雅布掠太平車由李固渡相衝如浮橋過南隄又以船載魏縣官妓吹笙簫月下而渡人心聞此殊不寧且怨曰敵不由磁相乃從李固渡前用雲計徒毁我牆屋籍我糧草壬午㑹王謁廟州民遮馬諫曰不可去肅王已為人誤送入燕山初言至河必曰斡里雅布重信義大臣亦保無他今果何如雲乘馬在後語之曰大王謁廟即歸非北去也民不以雲言為信曰已有萬人守北門雖欲行不可延禧世則諭雲勿與辨雲曰人言何足恤乎竟進至廟民心益忿激厲聲指雲曰此清野之人為敵計真細作也謁神畢民如山擁公語雲曰外頗喧亂約與偕行雲易之與延禧世則先出小吏附耳語延禧曰外已失王尚書馬延禧約世則速行百姓皆露刃怒目因迫視曰此非王尚書耶雲乘小吏焉相繼出遂遇害及王出廟門父老前擁言曰今離此門五六十里即有敵騎王雲乃細作也王諭以不復北去衆始引退王諭公取首亂者一人斬之梟首廟前收雲從吏𨽻王府內外乃定從馬識逺取國書識逺曰雖云副使實曰小吏國書未嘗見也乃發雲行李索得國書并上賜肅王肅王夫人書長主與都尉曹晟書咸已發封知前後未嘗逹也又得皂裘一番巾三羅綾錦各一王曰必有人見此故謂雲為細作也衆因謂磁不可留又初過河之明日巡警使臣任永為敵騎所掠問王所在永不以實告後得脫告王癸未王留相州乙酉斡里雅布軍劉家寺京城戒嚴閏十一月癸已尼瑪哈亦至軍青城已酉朝廷遣忠訓郎閣門祗候秦仔等賫蠟書詣王康王可充兵馬大元帥陳享伯可充兵馬元帥宗澤汪伯彥可充副元帥丙辰京城失守戊午王語僚屬曰吾夕夢皇帝脫衣賜我我服之此何徵也有頃仔至再拜以蠟書進王涕泣望闕謝恩軍民感動仔曰敵圍城甚急方大雪皇帝御遙津亭遣仔等請王起兵入衛十二月壬戌朔王開大元帥府於相州備御劄行下丁卯准大元帥府備坐詔曰乃知州郡糾合軍民共起義兵此皆祖宗百年涵養忠孝之士天地神祇所當佑助同力叶謀以濟大功應辟置官屬兹從便益劄下知磁州祕閣修撰宗澤准此公拜命感泣甲子御前再遣閣門祗候侯章至大元帥府出蠟書曰京城圍閉日久康王真朕心腹手足之託巳除兵馬大元帥更無疑惑可星夜前來入援章曰皇帝遣章十輩來唯章一人得達陛辭日宣諭臣曰三辟中書舍人得可令便益草詔盡起河北精兵入援又曰恐諸郡留精兵自衛當使守臣自將庶盡得精鋭之兵或難章曰審如此則河朔兵一空他日金人歸師列城何恃章曰方京城事急未遑他議況此出皇帝之意王乃命延禧草詔如章言頒之乙丑大元帥府乃傳檄諸郡其檄曰契勘閏十一月二十七日康王於相州被受御前蠟封皇帝親筆除兵馬大元帥巳於今月一日開府三日又准閣門祗候侯章齎詔書來催促起兵當府除巳備坐詔書行下外仰逐州依詔書守臣自將竊惟敵人猖獗再犯京城攻圍未解君父憂危臣子之心義當效死矧凡在職世受國恩當此艱危豈應坐視宜勉忠義戮力勤王仰逐州守臣如指揮到日依巳降詔㫖不移刻措置起兵除量留本處募到土豪分擺地方守禦外盡數剗刷官兵精鋭招集强壯堪充出戰人逐色團結并堅利器械隨隊附帶差得力人官兵以將佐隊將押隊內選差民兵以知縣丞簿巡尉內選差逐州使臣更切措置糧料輕齎以防沿路次舍艱食隨宜供億本府已選定十二月十七日以後正月三十日以前節次到大名府㑹合聽候指揮審度前進右劄送中山府陳延康享伯知河間府黃待制潜善知冀州權修撰邦彥知德信州梁徽猷揚祖知洺州王寶文麟知深州姚直閣鵬知磁州宗修撰澤知德州滑大夫彥齡知棣州趙大夫闕知博州孫大夫振知慶源府裴刺史汝明知保州葛刺史逢知霸州辛刺史彥宗知安肅軍王大夫徹等准此唯中山慶源受圍不得通餘悉被受丁卯上遣僉書樞密院事曹輔同北使迎王且密為蠟封及礬書付之因令齎詔撫諭河北詔曰大金軍巳登城斂兵不下朕親出郊見兩院帥和議遂定宗社自安生靈獲全恩厚德深恐四方隔絶日久未免疑惑仰諸路監司守臣速行撫諭及移文鄰路各令安業故兹詔示想宜知悉乙亥王發相州丁丑至大名先是公屢言宜㑹兵奪李固渡斷敵歸路衆議不可公聞李固渡敵騎往來不斷自將秦光弼出東西兩門夾擊之敵兵潰斬首數百級因拔城下寨光弼兵不過千餘人更出迭進以撓李固寨敵既渡河留兵數萬屯西岸有寨數百公時遣壯士夜搗之破三十餘寨奪其資糧翼日㑹大元帥府檄至約提兵㑹大名遂班師公即量留人兵守禦磁城盡提所募兵進渡漳水宿鄴鎮軍馬履冰渡河時天大雪公披堅乘馬道逢郡守往往臥氊車齎庖具自隨公與士卒同甘苦故人樂為用癸未至大名領兵以參王府王諭撫循甚至論至終日且曰京師受圍日久入援之䇿不可緩乞早處分王即面諭公就供副帥之職僉書公名公禀命退繼除公為集英殿修撰曰伏見兵馬副元帥宗澤風力敏强氣節髙邁方時艱棘夙夜精勤招集民兵豪傑爭輔志存滅敵義不辭難經營百為各有條序老當益壯今見其人宜除集英殿修撰巳具奏聞去訖右劄付准此公翼日入謝初尼瑪哈欲召王還京師其曹輔之出迎王也敵以甲騎三千從輔東至興仁城守甚備王師二萬列栅郭門外敵騎去城數里許留不進輔獨入城與知府事曾懋密語具道敵巳登城而斂兵不下議和恐可成懋詰輔曰敵人貪冒姦詐豈有登城而兵不下者必公家族遭執脅為是言耳輔乃裂礬書示懋并出蠟封令奉上大元帥府甲申破蠟封乃上手詔曰京城失守社稷安危尚賴金人講和止於割地而已仰大元帥康王將天下勤王兵總領分屯近甸以同濟難無得輕動恐誤國事四方將帥亦宜詳此次以礬書其字粲然乃樞密院書也書曰大金已通和好猶未退師諸路勤王人兵可且於稍近三五程間駐劄候師退日放散於是汪伯彥等在側咸執以為然公曰敵人狡譎事勢如此是必欵我師也豈可深信以詒後悔乙酉知洺州直寶文閣王麟將千人詣大元帥府謁告歸視親疾從之以兵𨽻公丙戌王㑹幕府議行軍所向公請直趨開德府次第進發以解京師之圍伯彥曰不可敵兵十萬圍京城四控要害自衛南抵都城壁壘相望覘者水火不通吾當量力何論解圍也公曰京城圍閉日久君臣相望入援何啻饑渴方今之計當言軍中久不聞天子詔令願見君父既曰通和請亟退設有詭詐則吾兵巳在城下王從之命公先行審敵情大元帥以次進發戊子公提兵二萬發大名以劉浩將前軍尚公緒將左軍陳淬將中軍常景將右軍王孝忠將後軍河北轉運判官顧復本隨軍應付出南門趨開德府聲言王在軍中庚寅王發大名如東平二年春正月辛卯公至開德府時遣精鋭與敵挑戰前後十三戰兵出輒捷敵自是不犯開德癸已王次東平敵挾帝迎王甚急乙未遣中書張澄行戊戌澄持詔直叩開德問王所在諸將以不知答之澄曰敵方登城援兵未可進徒誤大事公曰此賊為他來欵我師令壯士乘城射之澄與敵俱遁走閣門宣贊舍人蔣彬持詔至北道總管司詔曰朕自即位以來金人交戰不巳朕纍下哀痛之詔諒爾久悉朕意今金人攻圍京城已及一年應援兵尚爾稽遲使社稷生靈坐以待盡比者金人已登城按甲議和欲使朕與吾民肝腦塗地金人請求靡有不從每念屈辱之極時事如此不獲已許帝姬和親立大河為界而金人實未斂兵質我太上皇帝又欲使朕南遷朕自禱皇天皇天未之震怒下告人民人民未之懷憤祖宗積纍至此而欲盡乎朕之德薄不能以保吾民乎朕思一身朝夕不能安痛切深思實無罪戾夫何使朕與吾民至此極也咨爾河北之民與其陷于邊裔孰若發憤抱孝懷忠更相推立首領多與官資監司守土帥臣與爾推讓結集北道軍州自以為號守疆土使豫中國不失于邊裔天下安平朕與汝等分土共享之朕言及此痛若碎首故兹詔示宜體至懷辛丑右文殿修撰知冀州權邦彥帥州兵千人至大元帥府王命屯開德受公節制二月丁卯王命公及黃潜善分領勤王兵檄曰契勘金人長驅再來攻圍京城當府近自河北被㫖勤王已領大兵過河與諸路㑹合前進解圍救援君父夙夜痛心惟恐緩期尋據興仁府申到曹樞密所傳蠟書手詔及樞密院礬書白劄子當府尋節次探得金人自京城劄寨擺布北來直至東明宛亭南至胙城東跨五丈河西抵黃河水泄不通度其奸計一則把截以防北來勤王之師二則恐朝暮不測迤邐進寨漸回東北前來窺伺吾軍若不前起慮落奸後立見危殆今合將諸頭項人馬節次分遣於開德府興仁府濮州柏林鎮廣濟軍單州一帶擺布駐劄除權邦彥尚公緒常景王孝忠孔彥盛𨽻宗元帥張換髙公翰王善𨽻黃待制外今撥濮州閭丘升姚鵬孫振等共二萬四千人並仰聽宗元帥節制廣濟軍丁順孟世寧溫宗建李大鈞張榮等共二萬五千人並仰聽黃待制節制仍各深切體認今來擺布人馬與寨栅一如對壘相望足以伺察動息仰更切不住遣信實得力人偵探多方尋路前去鉤索金人去住之意久近之期所嚮之方如是不測引兵前來侵軼仰火急戒嚴持重以待乘便掩殺仍一面馳檄諸處相為應援及節次不移時飛申當府以憑差撥人馬前去䇿應如是探得京城動息或有釁可乘要須審度可否飛申當府當審詳事宜約南京宣總司催促陜西江淮勤王師帥相與審度然後尅日大舉互相應援務在警懼以備不虞庶幾正應詔㫖不誤國事先是大元帥府遣張超李安入京城偵探至東明為敵所得因留北寨聞敵言國相巳令於三山縛橋絞筏期以端午到燕京既而走脫歸為王言之於是王㑹幕府議或云敵雖曰斂兵不下而京城沈默息耗不通不若約進兵便或言京城四壁既為敵有吾師一逼之如太上皇帝何議不決已已乃再草檄行下曰契勘當府今月七日巳劄黃待制宗元帥節制開德興仁兩府濮單二州廣濟軍柏林鎮等處諸頭項人馬與宣總兩司互相應援務在警懼以備不虞要當審詳毋或輕舉庶幾上應手詔不誤國事并劄宣撫司照㑹外今再簡蠟書手詔及樞密院指揮大意謂金人登城斂兵不下已通和好勤王人馬未可向前恐徒誤國今來雖已劄下開德府駐劄宗元帥節制濮州閭丘升姚鵬孫振及將隨軍陳淬一行諸頭項人馬並聽節制并劄下興仁府駐劄黃待制節制廣濟軍丁順孟世寧溫宗建李大鈞張榮駐劄柏林鎮等將隨軍張換等一行諸頭項人馬竝聼節制及宣總司互相應援切慮隄備未謹審度未盡仰逐處更切差得力信實之人前去京城以來多方偵探如是登城之敵未有退期及胙城衛南韋城宛亭東明南華等處敵寨稍有隙可乘便合隨處事宜審觀形勢料度彼己見得委是可以前進即仰一面進寨駐劄與附近人馬遞相關報互相應援仍申當府以憑䇿應不可守株如未得利便不宜妄動上誤國計即日具本處動息及探報到事宜具狀飛申並劄宣總司照㑹施行令遍牒陜西江淮諸路勤王師帥照㑹施行公得檄日謀進發檄閭丘升人馬逗遛不前公聞王善叛去遣人招集之得三千餘人尚以兵力單弱不能進乙亥有佛奴者本大名之魏縣人為敵所得至劉家寺寨凡半月脫而北歸至宛亭㑹雨雪苦寒不能進又為彼游騎所掠留宛亭寨中使牧羊聞敵言須麥秀可歸師庶無水草之慮巳而復乘間得脫北走官軍得之送大元帥府具道彼中事因言敵之大酋死事者感傷切至以刀剺額跪而大哭佛奴能周旋以效之於是王命檢書已已丁卯檄書再下付公照應施行初武義大夫閣門宣贊舍人常景之將孔彥威告景叛王命彥威擒景許以景官及兵授之是日彥威斬景以首級來於是彥威自承信郎除武翼大夫閣門宣贊舍人統景兵萬人赴開德披城下寨令受公節制即彥丹也戊寅王謂幕府曰京城寂然無耗劄探未詳吾食息不安可再檄開德興仁并下南京宣總司其檄曰契勘金人歸期全未見的確信息不通或云繫橋或云絞筏不久渡河然登城之敵至今不下大寨或有未起小寨旁列四起劫鹵吾民搬運糧料或候麥苖長大可以喂飼牛馬方可北歸是未有去計講和之說實欵我天下之師觀其形勢慮包詭謀今仰見在開德府副元帥宗修撰興仁府黃待制各宜加意召募信實之人前去偵探如是得委有奸計尚或窺伺京城未有退師之意仰詳審形勢料度彼巳隨處糾合附近諸頭項統制官兵尅日進寨於近京駐劄張大軍勢逼脅令去仍宜持重明逺斥堠毋致反落奸後不得先以兵馬挑弄自啓敗盟之釁內如宗元帥舉師之日先告諭開德府濮州如黃待制起師之日先告諭興仁府單州廣濟軍各嚴備守禦其逐處城上地分先已撥布若軍民之兵不得一例起發使各保守以防乘虗并仰南京宣總司照㑹宗元帥黃待制一依今來指揮各精細覘探互相關報㑹合進寨約于近京駐劄務要聲援相應仍下河北運判顧大夫京東運副黃龍圖隨軍轉運梁修撰等各隨處應付錢糧不可小有缺誤小帖子并契勘南京開德府興仁府等處去京城遠近不同即起發當有先後務要同日到京城側近切在契勘無令參差不齊又小帖子再契勘京城圍閉日久昨朝廷遣使齎傳詔諭雖知金人已再講和無復鹵掠然到今纍月未聞退師今勤王之師諸道雲集便欲相與戮力進兵血戰仰念聖上屈已崇信講好息民之意未得輕進當府已纍劄下審觀形勢可進則進無先以兵相加自取敗盟之釁今仰副元帥宗修撰節制黃待制宣撫范承宣訥北道總管趙資政野經制翁閣學彥國發運向閣學子諲發運方徽猷孟卿淮南路提刑汪郎中師忠知楊州許龍圖汾前知密州郭待制奉世西道總管王資政襄陜西五路制置錢侍郎蓋知汝寧府趙侍郎子嵩仰各申飭諸將整軍伍利器械具糗糧若旬日之間師猶未退忍復坐視當約日齊進誓身一戰凡在臣子世受國恩各懷忠義之報必效死立功仍仰吐心瀝誠紬繹方略合謀解難速行條具供申公捧檄謂諸將曰王府今檄灼見敵情忍坐視乎是時北道總管趙野與河北東路宣撫使范訥命軍南京自號宣撫司趙軍自大名亂後尤無紀律日出剽掠甚于敵騎獨公日夕以都城之圍未解憂慮切至書告大元帥曰敵人果修好即應退師今兵久不解疑生變乞更檄諸道約日進兵同㑹京城公又移書野訥曾懋以君父危急願協心入援書見前野輩盡以公為狂不答時子諲在宿子嵩在陳何志同在許升在濮懋在曹俱環京列屯不進彥國則經制東南六路兵徘徊于淮甸間初朝廷以彥國為經制使盡起東南六路兵入援彥國所統洞丁鎗杖弓兵數萬屯泗州聞京城圍閉顧望不行知州事賈公望率官屬詣彥國曰京城報甚急天子日夜望中丞救援今留此不進豈欲反乎不惟上負朝廷泗州久壘錢糧俱竭自明日更不供公宜斬公望以謝軍苐恐朝廷他日未遽貸公耳彥國色沮翼日提軍迂程趨淮西而去公料賊決有異謀且㑹兵五旬無一人至者即欲以孤軍進召諸將計議都統制陳淬曰敵方熾未可輕舉公怒欲斬之諸將拜乞貸淬效死釋之㑹得大元帥府檄令㑹合庚辰公乃進柵南華境上命淬曰汝當先諸將一行謝前日之過淬曰敢不效力遂進兵未十里與敵遇出敵不意敗之即頓兵南華是日康王發東平癸未至濟州三月朔二聖在郊宫丁酉太宰張邦昌以敵命僣立敵自宛亭引衆逼興仁列柵而屯復分兵寇開德公遣彥威與戰敗之度敵必犯濮州急遣邦彥嚴為之備兵果至接戰復敗之駐於近郊辛丑再戰殺傷相當公自南華遣二千餘騎援濮州敵兵引去復向開德邦彥彥威合軍夾擊敗之壬寅公親提所節制兵進至衛南前驅報曰前逼敵營當少避之公曰苐言兩國既和久不退師我欲入覲君父敵無得出寨諸將莫曉其意公曰以將孤兵寡不深入重地不能成意外之功公揮衆入敵區彼亦陳兵以待公操戈直前親冒矢石與敵戰敗之轉戰而東敵益兵至刃既接陽敗而却我師追擊不利傷者什二王孝忠死之公令將士曰今前後盡敵壘進退等死當從死中求生士卒亦知必死人人爭奮莫不一當百敵大敗斬首數千級敵退却數十里遂據韋城巳而公私自計曰敵兵十倍于我一戰而却必當有謀若盡合諸營鐵騎夜以襲我我軍殆矣深暮戒禆將辛叔禧杜琳曰徙軍南華敵果夜至得空營大驚自此深溝自固兵不再出矣癸卯自南華遣兵過大溝河出敵不意襲擊敗之自戊寅檄後兵無㑹者獨公屢與敵戰每捷到王嘉歎不巳於是承制除徽猷閣待制辭曰兵馬大元帥府竊見朝奉郎集英殿修撰河北義兵都總管兵馬副元帥宗澤自河北躬率大兵鼓行而南與敵對壘初則養鋭以待今則奮怒而前人之所難視之甚易心堅金石忠義凛然協濟大功宜有褒擢今除徽猷閣待制先是覘事人張宗至京師為邏者所得執以見權領尚書省王時雍宗具言遣來狀時雍以邦昌事告之且補武修郎不受乞歸報府時雍縱之丁已黃潜善擕宗至大元帥府出邦昌僞號文字金人號文字赦文王讀畢往麟嘉堂與府僚呼問之王慟哭期以身先士卒邀二聖於河北諸將曰此將臣職耳大王乃宗廟所繫不可輕舉王謂府僚曰斯報國之秋可速檄河南北諸郡及河北山水寨一應官民之兵邀其歸路或斷橋厄險設伏襲擊當親提大軍䇿應效死仍檄副元帥宗澤依䇿應行之戊午公得陷敵宗室二人問以都城事言二聖留敵營未還公具上大元帥府已未公起南華進兵臨濮夏四月庚申朔兩宫北狩敵營定議以斡里雅布軍由滑州路進發以尼瑪哈軍由鄭州路進發兩路護送日行數百里辛酉大元帥府傳檄郡國曰靖康二年四月二日兵馬大元帥皇帝弟康王御名檄郡邑曰見危致命者忠臣之心視死如歸者烈士之志凡在率土世受湛恩今陳瀝血之辭庶獲捐軀之效兹者上皇禪位下詔責躬事出忱誠人皆惻隱恭惟皇帝遵養潜邸十有五年克儉克勤博通經史天下延頸莫不歸心及受禪之日金人大入許割三鎮乃肯退師皇帝念祖宗之故疆及陵寢之重地請計賦租之入以為嵗幣之常乃曰渝盟實惟求釁再操戈而詣闕遂鼓衆以乘墉至于屈已稱臣露章引咎初斂兵不下詭曰通和既邀駕出臨乃輒留駐故人望北塵而徯后既已降詔而割地腴民畏左袵而拒門又為隙端以肆貪欲今者二聖太子諸王近臣皆質敵營恐將北去考之自昔未有或然臣子之心痛憤徹骨御名昨奉睿㫖充兵馬大元帥倡義率衆形從響答數百萬衆奮怒而前內揆人心可知天意逼逐狂類今兹已行强抑臣僚俾從僣位天怒人怨曷能安居除已發遣大兵糾合諸郡把扼險阻焚絶河梁或迎擊於前或追躡于後期于掃清千里迎還兩宫帥臣等其統驍鋭之衆使堅忠義之心撫摩良善之民毋忘歸戴之舊凡關津之出入謹於防奸或文書之往來審於辨詐以報皇朝之涵養以底天下之治安報德賞功非言可究三靈在上實聞其言仍下宣撫使范訥河北道總管趙野西路副總管孫昭逺經制使翁彥國東道副總管朱勝非西道副總管髙公紀陜西制置使錢蓋京兆帥范致虗鄜延帥張深副總管劉光世熙河帥王似知汝寧府趙子嵩發運判官方孟鄉向子諲亟㑹兵城下以俟進發奉迎二聖無得輒入都城因緣殺掠初公遣人覘敵動息見其日夜益兵增寨柵備守禦甚嚴公曰是欵我師必欲由他道遁也即夜遣兵襲之得其所掠人問以都城間事或言二聖巳為彼邀取間道渡河北去矣公未之信方謀引兵渡大河據敵歸路而對壘諸營一夕解去公方知二聖果播遷北望號慟即自臨濮提孤軍趨滑州走黎陽由大伾壬午至大名府城南下寨欲徑渡河迎取乘輿而勤王之兵無一至者又聞邦昌僭立即回欲先行誅討且密遣健步間道持檄安慰京城士庶曰兵馬副元帥宗待制契勘當府所統率軍兵奉大元帥康王指揮㑹合分遣諸處人馬追襲掩截金人仍令隨軍便宜措置自承大元帥府劄子星夜間道逺遣使臣等遍督河北河東路州軍府將合心併力各據要害斷絶橋梁把扼圍擊救迎二聖與諸王皇族并后妃期還宮閫與三軍將佐效臣子死節誓報國恩及行下大名府諸路分催諸處義兵將士五路人馬相約掩擊去訖照對自去年十一月以後金人登城按甲不下假倡和議欵四方勤王之兵坐敝近甸詭詐百出使中外聲援不相接致請二聖出郊乃輦金載帛罄竭帑藏以遂其欲又邀擁鑾輿及皇族子孫后妃巳下踰河北去及是啓行外方始知覺四方痛切忿恨呼天號訴日月慘色豈夷敵戕我中國乃上纍君父竊惟大宋一統天下祖宗功德滋休太平自古莫比本緣姦臣誤國結怨生隙流毒遺患遂至今日然以天下之大宗社之重天眷有宋垂億萬年其必有在恃公卿將相一心保護廟朝安存士庶以此見大宋之恩德甚深與天地終始其都城軍民僧道等思慕之心豈有窮已今大元帥康王忠孝友愛出自天性總兵于外親擐甲胄冒犯風雨欲戡定國難輯寧方夏㑹諸路勤王之師不啻百萬前此守議和信盟以俟敵退俯為生靈每戒輕動暨國家一落敵計蒼生奈何康王聞此泣盡繼血雖草木無知亦須悲痛左右開勉莫回便欲躍身自奮手格狂類以刷君父之恥見不住進發人馬催督忠義士數路合擊雖封王建節皆許充賞期以力救駕回用慰中外故未忍歸朝瞻望闕庭欵謁宗廟與本朝諸臣父老軍民僧道相見伏想輿情日夕願望必興念祖宗積纍之厚遽遭金人作孽致二帝播遷惟康王為宗廟社稷所賴佇成大功禔福天下當府駐兵去都城不逺須至詳具公移慰撫都人者時諜者言京城修守禦之具王曰果如此或諸道兵馬皆來討逆則吾民重困矣乃貽書于公曰御咨目上元帥待制台座初夏漸熱伏惟總御師徒勤勞王事台候萬福御名去嵗使敵營中道輟行所攜不過千人閏月被命帥師始集東北兵民進未及畿巳承再和之詔繼得礬書又戒生事且防忌器未敢輕舉但分屯近畿為逼逐之計閲日既久賴知敵情不免督兵前去繼聞領兵戡難感涕交頤即具公文當巳呈達今聞大臣之在敵中者日久分深承其付託而二聖二后青宫諸王北渡大河五內殞裂不如無生便欲身先士卒手刃孽徒身膏草野以救君父而僚屬不容謂祖宗德澤主上仁聖臣民歸戴天意未改故老近臣將帥軍民忠義有素當資衆力具成忠孝本意除已具公文外伏望賈作士氣開曉士心奉迎君父永安社稷以成不世之勳御名不任痛憤泣血懇切之情所有受敵付託之人義當征誅然聞二聖之在郊巳膺僭僞慮百官之謀國或出權宜未當輕動徒使京城重擾軍民被害致欲按甲近城容御名移書問故得其實情即時關報施行未晚今日之事非左右戮力造次在念恐不能濟伏望孚察未瞻㑹關尚冀厚為宗社所賴保倍台重不宣書後復批曰近有尚書省劄子於濟鄆間訪求行府語意無他尤宜謹重仍嚴備也公得大元帥書約移師近都城按甲觀變公曰人臣安有張紅蓋服赭袍居正殿者乎即上書謝書見前繼探報人申俊等申繳張邦昌赦文公讀之益憤怒即具申大元帥府文見前繼具劄子告王文見前兩劄上公謂所知曰怨結王之左右矣不恤也戊辰邦昌召從官入延福宮請元祐皇后垂簾聽政遣奉御史尚書左丞馮解副使權尚書右丞李回詣大元帥府迎王已已邦昌以太宰退處資善堂大元帥府隨行官屬耿南仲等上表勸進王不許公亦纍狀懇請前兩史無撿批答曰兵馬大元帥皇弟康王答副元帥宗待制敵人犯順輒肆剽侵大兵前驅本期殄滅亟聞失守遂蔑戰功永惟太祖創業垂二百年二聖在位幾三十載既遭蕩析乃至播遷涕淚橫流心肝糜潰有天有地古今所未嘗聞為子為臣夙夜實不遑發方行追躡誓必邀迎念元帥之權實出上意顧國家之任難徇衆情所請難議施行公再上狀勸進文見前再批答曰兵馬大元帥皇弟康王答副元帥宗待制金人披猖鑾輿播越詔令不下無所禀承遐邇民心翕然見屬謂天下之動必正於一故連日走請乃至于三雖輿情難以輒違而孝心有所不忍方將遍覽所上詳熟以思俟入京城欵謁宗廟若鑾輿未還欲撫定民庶權聽國事宜體此意無復苦陳初濟隂夜有紅光燭天如赤烏翔翥狀識者以為宋火德之符於是濟之父老軍民以萬計詣大元帥府乞王即位于濟幕府羣僚或曰濟或曰南京議未決㑹公亦乞于南京開府文見前於是南京之議遂定戊寅大元帥府命公部將士於長垣韋城衛南南華已卯以次進發庚辰王發濟州癸未至南京五月庚寅朔王即皇帝位於南京大赦天下曰皇天佑宋卜世過於漢唐藝祖承周受禪同乎舜禹列聖嗣無疆之歷保邦隆不拔之基屬以朝奸稔成邊釁恃中都之安富忘外敵之憑陵馴致金人來犯京邑初登城而不下終邀駕以偕行痛念鑾輿逺征沙漠宗族從而遷徙宮閫為之一空强抑臣僚俾僭位號朕以介弟之親而受㫖開元帥之府以總師方輸敵愾之忠亟奉請和之詔豈圖變故終致阽危蓋嘗指日以誓諸軍使前迎而後請不憚瀝血而檄率土冀外附而內親而三事大夫與萬邦黎獻共致樂推之懇靡容牢避之私謂亹亹萬機難以一日而曠位矧皇皇四海詎可三月而無君勉徇羣情嗣登大寶宵衣旰食紹祖宗垂創之基疾首痛心懷父兄播遷之難顧號令久隔衆罔繫心軍旅荐興民多失業慰民耳目之注敷朕腹心之言爰布湛恩誕綏區夏可大赦天下改元建炎於戲聖人何以加孝朕每懷問寢之思天子必有所先朕欲救在原之急嗟哉文武之烈若時忠義之家不食而哭秦庭士當勇於報國左袒而為劉氏人咸樂於愛君其一德以一心佇立功而立事同候兩宮之復終圖萬世之安副我憂勤躋時康乂以黃潛善為中書侍郎汪伯彥為同知樞密院事辛卯詔元帥府限十日結局詔公赴南京行在甲午公上表賀文見前乙已准告覃恩轉朝請郎訓詞曰朕纂服丕承疏恩大賚眷惟邇烈宜在褒嘉具位宗澤執德粹明受材宏達自升華於法從良著績於周行加秩之崇於昭新渥輸忠之報益展素懷公拜命上謝表表佚分兵河上量帶數百騎徑自衛南南華詣行在所六月巳未朔公入對氣哽不能語涕泗交頤上亦為之動容復陳興衰撥亂大計極論當時人材上問勞甚厚凡進四劄文見前上有留中之意而左右不容癸亥以公為龍圖閣學士知襄陽府提舉隨房郢州兵馬巡檢事訓詞曰唐太宗天䇿舊僚以次登用皆備公卿之選朕元帥開府總兵朔方汝起滏陽之師實為傾助肆加褒擢無愧前聞具官宗澤博學雄文懿行髙節剛大之氣至老不屈縱橫之才應變尤長力陳排難之謀克奮勤王之志獨當一面聲望卓然並嘉翊戴之功宜有褒遷之寵躐延祕閣之華序往鎮襄陽之大邦共濟多艱聿來圖效既通二禁之籍勿替告猷仍俾千里之民悉安新政時復有割地之議公上疏文見前上聞其言壯之戊辰改知青州上丞相李綱書書見前尋以公知開封府訓詞曰朕哀憫元元間罹兵禍思欲濯瘡痍為燠寒變呻吟為謳歌用以靈承顧諟天命庶幾休息惟京師雜五方之俗事物大繁號稱難治用勞侍從之良典司尹正之重以爾氣渾而質厚中偉而外莊篤望可以鎮浮長才足以周變優游兩禁譽處益隆是用膺青社賜履之邦蒞三輔浩穰之寄惟爾乃者從朕兵間訏謨密勿固知豫德意志慮所向矣往宣爾術底於輯寧益昭爾庸用符僉屬公拜命即日就道以七月乙已到京城京城自敵騎退歸樓櫓盡廢諸道之師雜居寺觀盜賊縱橫人情恟恟時敵留屯河上距京城無二百里金鼓之聲日夕相聞京畿千里之民與京東西連亘數千里咸懷悚栗公到首發為敵之淵藪者數人誅之又令都市曰為盜者贓無輕重並從軍法由是豪强退縮盜賊屏竄人皆靡然悅服曰今有宗公我不危矣公察人情粗安市肆商賈稍稍如舊上疏乞回鑾疏見前時詔荆襄江淮悉備巡幸有維揚金陵一議公復上疏疏見前一日敵有八人以使楚為名直至京師公訝之是必假此名以覘我虛實因納議狀遺范公留守請收置牢狴奏取朝廷指揮范公然之即具奏公復上河北京東路稅鹽劄子劄見前八月壬戌以公兼京師副留守㑹范訥罷除公延康殿學士京城留守兼開封尹訓辭曰汴居鄭滑曹許之間其地平衍無山河百二之固太平日久人亦惰驕骫骳不武一經邊塵矍然惕息尤欲得人而綏輯之具位某頃守滏陽一節不撓艱難險阻忠力彌劭身膺簡寄更試留鑰曾未閲月政聲流聞延登祕殿之華增重畿封之任爾其戢奸恤隱酌寬猛之中使民畏而愛之稱朕畀付之意公具狀辭免狀見前降詔不允曰省所奏辭免恩命事具悉國家制均諸郡溥循銅虎之規體重别都特厚玉麟之寄矧今京邑實古大梁億載之所卜年列聖於斯御極肆朕纂承之始暫為巡狩之行倚貴臣而居留仍兼官於尹正庶幾彈壓克用敉寧卿堅强敢為慷慨自信威足以禁暴明足以督奸善良恃以帖安豪猾為之戢息兹升華於祕殿俾增重於中都何必謙撝形於奏牘往膺褒顯以副眷懷所請宜不允上表謝表佚繼奉詔令所拘留敵使遷置别館優加待遇公上疏疏見前再奉詔曰卿彈壓强梗保護都城寬朕顧憂深所倚仗但拘留金使未達朕心朕之待卿盡矣卿宜體此公奉詔即出八人縱之上表謝表見前丙寅詔賜對衣金帶上表謝表見前時議者多以公拘囚金人為非獨尚書左丞許景衡知公最深上疏辨之曰臣竊聞讒者多指開封尹宗澤過失事未知是否如何宗澤之為人及其為政固不能上逃聖鑒苐未知果指何事而言也若只拘留金國使人此誠宗澤之失也然原其本心只緣忠義所激出於輕發未審國家事體耳不知别有何等罪犯也然臣自浙渡淮以至行在得之來自京師者皆言澤之為尹威名政績卓然過人誅鋤强梗撫循善良都城帖然莫敢犯者又方修守禦之備歷歷可觀臣雖不識其人竊用嘆慕每以為去冬京城之內不能固守良由大臣無謀尹正非才之故使當時有如宗澤等數輩赤心許國相與維持則其禍變亦未至如此其酷也往者不可咎來者猶可追今若較其末節小疵便以為罪而不顧其盡忠報國之大節則臣雖至愚竊以為過矣況宗澤昔在河朔遭遇陛下遮留拱衛繼參幕府宣力尤多今尹天府其績效又章章如此則其所為終始亦可觀矣議者獨不能少優容之其不恕亦已甚且開封宗廟社稷之所在其擇人居守尤非他州别路之比今若罷宗澤則當别選留守不識今之縉紳其威名政績亦有加於宗澤者乎若有其人則除受交割尚費日月兵民亦未信服防秋是時計將奈何若未有其人則宗澤未宜遽然更易也人才難得久矣惟聖人以天地為度包容長養兼收而並用之庶幾其濟也其宗澤伏望聖慈上為宗廟社稷下為京師億萬生靈特賜主張厚加委任使成禦侮治民之功天下幸甚八月二十八日奉聖㫖朝廷别無行遣亦無臣僚論列章疏劄下照㑹右劄送京城留守宗延康公拜命上表稱謝表佚九月真定懷衛間敵兵甚盛州郡有乘城固守者敵亦大治兵為攻拔計公欲時暫過河措置事宜乙未上劄子劄見前庚子公回自河北具因依奏聞奏佚辛丑准省劄劄見前九月五日三省同奉聖㫖依令宗澤其功罪尤甚之人申取朝廷指揮右劄送東京留守宗延康准此繼拜詔將諭曰昔趙廣漢之尹京兆民稱頌不容口以為自漢興治三輔者皆莫能及朕念京師兵火之後遴選撫綏彈壓之才以卿帥府舊僚從班耆宿擢居尹正之任肅然政令之行摧折豪强發摘奸伏剛果不撓盜賊屏跡夷考前躅能以嚴治威克允濟亦莫如卿比升祕殿之隆名仍專留司之重寄視古無愧乃績可嘉載惟王畿千里之封實為諸夏本根之地都邑閭閻之衆既遂謐寧甸服田畝之間益當安輯以至練防衛之兵謹城守之備經營財用預思可繼之圖拯濟艱虞務存善後之䇿諒卿體國之志必通時事之宜嗣有寵休靡忘褒贊故兹昭示想宜知悉上表謝表見前公感上知遇益自奮勵京城四壁各置統領守禦使臣每壁立界至以所招義兵分𨽻之隨處置教場為閲習訓練之地造決勝戰車又據形勝立堅壁二十四所於城外隨大小駐兵數萬别選有謀略勇敢之士四人充四壁提領公往來親按試之周而復始沿大河鱗次創連珠寨結連河東河北山水寨忠義民兵及陜西京東西路諸路人馬咸願聽公節制開五丈河以通南北商旅京畿十六縣內兩縣瀕河共七十二里均之諸縣縣護四里有奇各令開濠深廣丈餘於南岸埋鹿角內又團結班直諸班人兵外則隨寨軍兵百姓丁壯等以備緩急之舉各有條序乙已上表表見前奏入不報再上疏疏見前不報再上疏疏見前不報再上疏疏見前有詔遣官迎奉六宮往金陵公復上疏疏見前公防秋之具悉備宮室宗廟省府臺部並見營葺規模宏麗不減全盛時以東門乃回鑾迎奉之地首加增修所分布人馬及閲習戰車招集人兵足以禦敵十月戊午復上疏疏見前公前後申明多降特㫖事由三省樞密院則沮抑之至是公條具五事疏見前聞有詔車駕還闕公上表表見前繼拜詔將還闕公喜甚再上表表見前公自留鑰甫半載威譽四馳逺近歸心招致賊徒如王再興兵五萬李貴兵幾二萬人往來淮上王善兵號七十萬騎護萬乘寇濮州楊進自號沒角牛兵三十餘萬并王大郎等諸頭項人馬百餘萬衆所至侵掠公遍遣人喻以禍福招來之羣盜素知公悉聽命相繼至進尤所敬慕願效死軍聲甚振公諭曰軍中老弱婦女久被驅鹵吾不忍其無辜宜盡釋之進等奉命諸軍所放幾萬人善寇濮州直欲來據京城公單騎往造其巢一見執其手仰天號泣曰朝廷當危難時無一人出為時用使當時有如公輩豈復有今日患善感泣曰敢不效力諸將謂公此行不返及歸迎於郊公曰事畢矣善有帶甲解甲之請幕下未有處公據案命筆書從便二字越三日來降止以五百甲騎隨餘皆解甲既至左右止之曰此留守司門擅入者斬善乃下馬趨入拜於庭公繼以禮接之曰軍禮不得不如此乃延之飲許以節使臨行請公到寨撫諸軍將有請勿行者公獨信之篤入其寨第賞有差時嶽飛偶犯有司欲正典刑公一見奇之曰此將材也留軍前適羽報敵犯汜水遣飛為踏白使以五百騎授之公語曰吾釋汝罪今當為我立功且戒無輕鬬飛禀命即行凱還補為統領後遷總制自是軍聲大振公誅鋤强梗撫民居經制財用各有條緒凡兩河京東西州郡文移往來求軍需者則撤在京所有隨多寡應之欲其同心濟難不以彼此為間時行在所遣中使傳宣撫問上表謝表見前繼聞車駕南幸公復奏疏疏見前批答曰朕惟上都據四方之中開基歷十世之久祖宗創業置諸奠枕之安城社奔流勢若建瓴之順兹請特巡之制姑為近甸之行思宏濟乎艱難致殫勞於櫛沐每念本根之重嘗思監守之懷迄綏靖於侯邦即趨歸於觀闕任卿司守屬在王畿共傾戴后之誠來效回鑾之請眷言忠藎良劇嘆嘉奉公御筆聞京師有稱御前收買珠玉人紛擾民間或至强市即時立賞委緝捕人收捉及出榜告報都人上表謝表見前十二月甲子邊寨駐於大河之北大㑹酋長引兵至河上稍稍南渡西犯汜水北侵胙城敵人雖知公名不敢輕入亦時擁衆以擾瀕河州縣滑州以南沿河諸寨欲并兵方戰斷河梁申乞授師議者曰賊鋒未易當不若堅守自固公笑曰去冬城潰正坐此耳厥鑒不逺尚可襲乎命統制劉衍趨滑劉逺走鄭各提兵二萬戰車二百乘以分衝突之勢且戒諸將不得輕動極力保護河梁以俟大兵過河毋致臨期誤事敵聞之夜斷河梁而遁所獲甚衆二年正月壬辰復自鄭入直抵白沙鎮距京三四十里都人恐甚敵先堅壁不動寮屬請間議守禦之䇿公方延賓圍棋笑語如無事時衆莫敢言退而分布部伍撤弔橋披甲登城都人愈恐公始知之戒諸將曰何事自爾張皇命諸軍將士解甲歸寨曰劉衍等在外必能為我禦敵選精鋭數千以益之戒曰宜繞出敵後設伏路母輕出戰伺其至則縱兵夾擊且諭僚屬曰上元密邇盍奉舊法以迎之命榜諸市張燈五日暫弛夜禁往來軍馬不異平日敵游騎至城下疑不敢入人亦不知所懼衍與敵遇大戰敗之收復延津胙城河隂至滑州尚有屯兵州之西三十里衍分兵夜搗之大捷悉得其輜重甫及收燈五夕捷書鼎至衆始知元夕正王師接戰於版橋之時公謂僚屬曰吾知劉衍必勝百姓可使由之不可使知之若得豫聞徒擾擾敗吾事丁未公復上疏疏見前公再上表表見前二月丙辰敵騎再犯西京公遣統御官李景良閻中立統領郭俊民等領兵萬餘趨鄭遇敵大戰為敵所乘中立死之俊民降敵景良以無功南遁公捕得之謂曰一勝一負兵家之常不勝而歸罪亦可恕私自逃遁是無我也命斬之管軍閭勍統制官藍整等咸為景良乞貸責以後效公姑收繫之後竟斬首以徇繼俊民與敵將史官人燕人何仲祖王義等以數百騎直抵八角鎮與都巡檢丁進遇進擒之生致麾下初欲持書誘公公毅然曰郭俊民吾統兵官也失利就死尚可為忠義鬼後有知者不失血食今全軀苟活反為敵人持書以脅中原有何面目見人乎命斬之謂官人曰京城不守主上巡幸領重兵在近甸命我守此有死而已何不以死敵我而反以兒女語脅我耶亦命斬之顧謂仲祖曰爾本吾宋人脅從而來豈出得巳命釋縛犒以酒肉縱之戊午劉衍領兵凱還入自鄭門公勞問士卒第賞奏功散犒金帛有差敵知衍班師甲子復入滑報至公謂諸將曰滑當衝要必爭之地也有虞則京師不可守不欲再煩諸將可為我守城當親提兵取之內儒將張撝越衆曰撝當效力公甚喜選兵五千付之特加賞勞士卒欣然而行公戒撝曰若衆寡不敵毋輕戰以需援師公親餞於郊撝兼程至滑已已撝身率將士與敵邇敵騎十倍於撝將士請曰衆寡不敵宜少避其鋒以求援兵撝曰退而偷生何面目見宗公乎鏖戰至暮殺傷相當敵為少却援不至撝為所害公聞報遣統領官王宣領五千騎援之且戒之曰敵惟恃衆當設奇以取勝宣以辛未至滑城與敵大戰於北門士卒爭奮敵忽退兵河上宣曰敵必夜渡河上收兵不追敵果夜渡及半以千人進擊之斬首數百級殺傷甚衆報至公即令宣權知滑州且令載撝喪還京公為服緦麻哭於佛寺出俸飯僧哀慟感人復詣其家優厚撫恤至死事之家遣官問勞出錢帛給之人咸曰死則榮矣條奏功績且乞撝恤典甚厚上嘉納之壬申有詔以諸處人馬雖假勤王之名實為聚寇之患詔佚丁丑詔進朝奉大夫資政殿學士訓詞曰先京師而後諸夏布政有倫得猛士以守四方用人為重乃眷帝王之宅數驚塞北之塵御名首簡循良俾司浩穰迄臻綏靖宜有褒嘉具位澤材禀沉雄器涵渾厚仕宧至晚而鼎貴功業遇事而遂彰肆朕省方俾爾留鑰蕭何鎮守克寬西顧之憂畢公保釐終底東郊之治載疇偉績特峻徽章升祕殿之華資進文階之一等并昭異數庸奏膚功瞻望􅊂門未泯蔥蔥之佳氣巡行淮甸豈能鬱鬱而久居惟既乃心以固吾圉公辭免批答曰無德不報實賞典之所先有功見知乃衆情之共悅矧玉麟之重寄屬荷槖之名臣於義當褒欲辭焉可卿慷慨而有大志鎮靜而好逺謀縱橫康世之圖談笑適時之略肆朕省方於淮甸倚卿居守於汲都更歷春冬帖安京輔屹若長城之固晏然奠枕之寧雖蕭何之撫關中寇恂之守河內以卿比迹於古有光特升祕閣之峻資仍進文階之崇秩并昭異數丕表茂功何必封章以避休命深嘉沖節難徇雅懷宜亟欽承庸昭眷遇公上表謝表見前壬午詔賜對衣金帶上表謝表見前三月乙酉公復上疏疏見前不報有王䇿者本契丹酋豪善用兵有籌略敵委任甚專嘗從千餘騎往來河上措置邊事公密令統制官王師正擒之生致麾下公釋縛解衣坐之堂上與之飲食從容與語曰契丹本我宋兄弟之國今女真辱吾主又滅而國汝何不悟義當協謀以刷社稷之恥他日復修舊好我亦何忍殺汝䇿感泣曰䇿至庭下自意必死今蒙再生之恩且聞公之意使䇿曉悟敢不盡死節以報已而使就館舍待之如禮公時呼與語因問虛實盡得其謀公大舉之計遂決召諸將謂曰汝等有忠義之心樂相歸附當思我宋二百年涵養之恩今二聖逺在沙漠君父巡幸未返能同心協謀剿滅狂類期還二聖以立大功乎當立詣回鑾與諸君親行主上雖封侯建節肯以充賞言訖泣下諸將亦掩泣同聲應曰今四方義士雲集京師幾二百萬人所齎糧可給半載亦嘗密遣人直抵兩河探伺聞所陷州縣每處不過數百人餘皆脅從令衣塞服此輩日望王師來某等願即日渡河以盡死節公慰撫之且曰進取老少可於逐寨邊處踏逐未復業田畝權借耕植各有自齎牛具種糧無者官給人皆樂從京城內外所屯兵百八十萬人兵革之盛前此未有敵人數不利至是畏威所屯兵悉退去中外帖然已亥公復上疏疏見前壬寅詔賜湯藥及傳宣撫問上表謝表見前乙已再上表表見前四月甲寅磁州統制官趙世隆世興兄弟以兵三千來歸人以為疑公曰世隆本吾一校耳必無他有所訴也翊日拜於庭公面語之曰前日殺守臣者誰世隆曰事非得已衆以無糧欲殺斯人以止亂耳公笑曰河北陷沒而吾宋法令上下之分亦陷沒耶顧左右拽出斬之衆兵露刃立庭下世興佩刀侍側左右莫不寒心世隆既執公徐謂世興曰汝兄犯法當誅固應無憾汝能奮志立功足以雪恥矣世興叩頭請罪曰公之號令如此水火畢入㑹滑州報敵騎有屯城下者公謂世興曰試為我取滑州世興欣然受命出告諸部曲曰吾兄擅殺守臣巳正典刑吾屬元帥釋而不問使我輩共取滑州以贖前過衆亦鼓舞請行公遺以金碗戰袍銀鎗等物部屬之賜有差世興辭以出以戊午日至滑掩敵不備獲級數百得州以歸公厚賜之丁進故巨寇有嘯聚數十萬衆其初降也人情鼎沸謂其非真管軍閭勍等以甲士隂衛公曰不然正當披心腹待之雖木石可使感動況人乎及進至公慰勞撫存甚至呼進首領數人飲食之待之如故吏進等感甚翼日請公詣寨公許之不疑進等益懷感畏後進黨有隂結以亂京師者進自簡殺之有相率逃遁者自追治之馬臯者進之次也每命出戰必先登一日自陳中傷還見公方問勞撫存之而羽報又急公曰誰可代汝行者臯曰非臯不可乃裹瘡而前數日後捷到仍擒一酋長而歸由公平日賞罰明號令信開心見誠故人樂為用命也趙海亦賊之雄者屯板橋於路設橋以阻行者閭勍芻者八人過海營海怒曰我畏閭太尉耶悉臠之覘者以聞公呼海海以甲士五百人從公方迎客遽語之曰殺芻者誰海辭曰無之出報牒讀示海具服命械繫獄客曰奈甲士何姑徐之公笑曰諸公怯耶治海者某諸公何預諭次將曰領衆還營趙海已械送所司告偏禆善護卒伍明日誅海聞者股栗楊進者舊屯駐城南王大郎者衆亦千餘皆山東游手先楊進來降屯於城北二人平日氣不相下一旦各領千餘衆相拒於天津橋京城人頗恐有告公命筆以片紙批令二魁曰為國之心固如是耶當戰陳立功時勝負自見二人慙沮而退公當危疑處之裕如如此已未公復上表表見前當是時契丹九州人日有歸中國者曰公之威名外疆敬服每有擒獲來者公遣契丹漢兒引邊坐側推誠與語曰契丹與大宋修盟好舊矣今女真小國既滅天祚又侵凌中國契丹臣民宜與我共奮忠義殺滅仇方以刷伊父之恥吾心即汝心也我不忍殺汝即釋之仍給資糧使去及令持公據為照曰契丹漢兒自與我宋盟約幾百年實兄弟之國頃緣權臣奸議遂結金人壞亂耶律天祚之後今將欲發大兵過河盡行勦除又敵倉卒之際不暇辨理枉有殺戮已約大軍期應契丹漢兒特給公據仰各收執以為信驗又各令持數百本歸散國人後有自燕來者云契丹漢兒皆願得公據以俟王師又為榜文散示陷沒州縣曰訪聞邊寨中多是我國積善良民偶失備禦被驅鹵髠頭絞髮裝著塞服侵犯州縣其赤心忠孝思念生處父母血屬但無路自新實可憐憫當所遣大兵前去恐倉卒之間不暇辨别枉有殺戮汝等若不忘生長墳墓鄉井痛心悔禍可以相助回戈掩殺外人永為我宋太平赤子耕養自如各請照知又給公據付被鹵之人曰訪聞邊寨中多是我國良民被鹵入敵想其本心忠義實可憫憐今被遣大兵前去恐倉卒難以辨别枉有殺戮除已出榜曉諭外今出公據付被鹵之人收執㷖㑹大軍到日執呈免致誤被殺戮以措置因依具疏奏疏見前又奏乞差崔興知西京專一保護陵寢太尉閭勍充保護陵寢使已已復上疏疏見前公以他日迎取二聖還京修治隆德宮惟淵聖皇帝未有蒞止之所改修寶籙宫丁丑上疏疏見前五月甲申再上改修寶籙宮之奏疏見前未報已丑再奏疏見前不報再奏疏見前范少尹等到闕上撫勞之賜豫有差詔答曰舜巡四嶽當歸格藝祖之文周撫萬邦存王歸在豐之訓庸如帝王之執範咸以都邑為本根朕遭時多艱思世大治永懷撥亂之䇿不憚省方之勞俟敉寧之有期即旋復之何晚夙夜軫慮寢食不忘雖王者以天下為家曾靡常於臨幸而臣子視君猶父得無鬱於瞻思卿留居千里之畿拱護九重之闕合數十百函之奏傾億千萬衆之心渴聞鳴蹕之音䖍舉回鑾之請備觀忠藎深可歎嘉公與諸將議六月起師及結連諸忠義山水寨人兵約日進發再奏疏見前不報一時權臣忌公成功從中沮之公嘆曰吾志不克伸矣積憂成疾疽發於背諸將問疾排闥而入公矍然起曰吾固無恙止以二聖蒙塵之久憂憤成疾爾而能為我殲滅同仇以成主上恢復之志雖死無恨衆皆墮淚同聲應曰敢不盡力諸將退公復嘆曰吾度不起此疾古云出師未捷身先死長使英雄淚滿襟翼日公薨實七月十二日也是日風雨晦冥公臨啓手足連呼過河者三無一語及家事先乞休訓詞曰忠於許國允資剸劇之才老矣告勞宜遂歸休之志眷言哲人爰錫綸章宗澤器識恢宏性資方正事達古今之要才兼文武之全逮豫纂圖俾守留鑰恩威竝施夙夜惟勤生靈賴芘以保釐寇盜望風而披靡方資謀畫遽以疾聞力貢忱辭懇求謝事念宣力之勤瘁宜錫命以褒嘉嵗五百而生賢克濟艱難之業禮七十而致仕益髙知止之風乃命進階以昭貴老尚期勿藥以介夀康可特命朝散大夫依舊資政殿學士賜如故繼上遺表表見前時已有㫖除公門下侍郎御營副使依舊京城留守至是贈觀文殿學士通議大夫致仕其詞曰氣徑而謀深識髙而慮逺懷尊主庇民之志有愛國忘家之心逮朕省方擢司留鑰言多底績勇於敢為折衝樽爼之間制敵股掌之上三軍服其紀律百姓安於教條方籍壯猷以復大業比觀奏牘遽爾告終未究雄圖但聞遺愛載用嘆嘉李廣云亡史有成蹊之喻羊公已逝時興墮淚之思升觀殿之華資進文階之峻秩特隆異數併示眷懷英烈如存尚克歆享公尹京未久而威行恩洽流亡復業商賈輻輳人有長城之賴公薨之日都人為之號慟朝野無賢愚相弔出涕數日間去者十五六識者憂之相與請於朝言公之子穎常居戎幕得士卒心願加奬拔以繼父功時朝廷已用杜充為留守遂以穎直祕閣充留守判官穎以杜充頗失人心諸將多不安稍稍引去且充酷而無謀屢爭不從穎曰勢所不加事必危殆力丐終喪得請扶護歸京口與夫人陳氏合葬於京峴山公為人端方質直平居不妄笑語律己甚嚴苟悖於禮雖毫髮不犯義所當為鼎鑊在前不恤中間間坐屢年杜門却掃賦詩自娛或清坐終日啜菽飲水淡如也晚年尊顯祿餼稍厚而自奉甚薄所衣不過綈紵經嵗無所更製親族故舊窶而無告者多依公以活養孤遺幾百人故家無留儲其為文不事雕琢渾然天成豐約中度於書無所不讀尤邃於左氏有文集藏於家後穎乞諡於朝曰契勘先臣父澤知磁州日主上在潛藩以使事過郡父力陳敵情叵測因留不行逮主上開元帥府父實副之敵合數國大入二聖北狩父上章乞早登寶位以定民志至於再三批答具存又抗章以生靈徯望天意有在懇切推戴至除京城留守敵騎屢擁大兵過河意欲深入命將出師特挫敵鋒遂至逺遁逾年不敢南向秉志盡節勤勞有為天下共知無待縷陳當是時重以二聖逺在沙漠主上巡幸淮甸日夕憂勤㑹集師旅聲勢大振自請身先士卒收復兩河尅日指期冀成中興之功憂鬱成疾遽先朝露竊緣父平日但秉孤忠上酬知遇不能阿附權臣坐此痛遭阻抑一時褒封反不逮尋常恩數伏念父頃司留鑰而主上駐蹕淮甸頗獲奠枕及父棄世之後敵騎長驅遽自江淮直至二浙以此較之當日為國屏翰不為無功又念父忝預大元帥府僚屬遭遇推戴之功非特生前為權臣所沮不得盡其所長至於身後亦無恤典使天下之士無以激勸欲望特賜敷奏矜念父勳績優賜褒贈以慰忠義之魂奉聖㫖與賜諡禮部太常寺擬諡忠簡按諡法曰危身奉上曰忠正直無邪曰簡告辭告見前公一子穎官終兵部郎中五孫嗣益朝奉郎通判福州卒於官次嗣尹朝奉大夫通判慶州死於家次嗣旦承議郎所乘監司斡官卒於家次嗣良承議郎知汀州次嗣安文林郎充沿海制置司斡官曾孫合十八人長普迪功郎邵武軍大寧縣尉卒於家餘未仕壻左承議郎知婺州金華余翺狀顯謨閣學士曾懋銘公墓云讀忠簡公遺事公初起滏陽艱危屬多壘蒼然國家意委身干戈裏隂颷卷翠華朔雪被南紀悠悠虞淵日力盡揮不止寅恭秉齊鉞際㑹開朱邸長安付馮異漢業中興始宮庭數汛掃蹕路無荆杞疚心望鑾輿感激涕如水上表方出師嗚呼孔明死宴安不可懷肉食毋乃鄙巨舟竟未焚三語猶在耳蕭然舊祠下碧草垂階戺登堂挹光儀赤舄仍几几千載墮淚碑一夫敢殘毁傳家有遺書叙事非虛美朂哉慎失墜庶以禆信史三學祭文宋興九葉宗社阽危凡百在位莫克扶持堂堂我公百世之師提忠仗義力欲振之出守滏陽敵徒猖狂義旅烏合親當戎行百戰不殆羸老莫傷平原常山千載相望廊廟乏謀肉食者鄙墮敵計中需求愈侈賂以玉輿質我介弟公獨沈幾抗留以死相如程嬰智勇是以帝后播遷神器逆旅盜臣睨之變亂無所公獨奮然以屬我主博陸阿衡今實準古乃攜偏師以抗雄敵氣吞遐方頓為褫魄兩河景從天聲有赫詔速公歸邊畝動色天子有命尹帝之京未幾下車路殷歡聲市價無二枹鼓不鳴二尹三王異世並名一司留事國勢鼎寧事上逮下一以至誠奸惡不貸賢善必旌人無流品用惟其能山公啓事容或未精金湯作固衆人所先神祖七閏乃克僅全以飾其壞曾不半年翬飛繩直有光於前周公營周豈亦云然必死之寇野心莫測屯備無虞孰如昔力守河之瀕野無馬跡考其情言畏威服德羣狙披猖阻兵嘯聚哮噬無前民莫旅拒豈無朝命曾不知顧公一呼之聽命如女趙喜復生敢此乖忤國體從民抗疏請還天語諄復不移如山分遣諸將開心吐誠喻以大義罔敢偷生語及二聖號呼拊膺願身督戰以濟中興屬纊之際猶未忘情世謂金石浸爍不侵公之忠誠逾石與金讒人何辜訿議日尋皇天后土實鑒此心嗚呼哀哉人之無祿喪我元老天為雨泣霣汝中道稚子庸夫罷市相弔悍將驕卒投兵痛悼某等受恩甚渥大庇久依天子誰忍棄子如遺九原可作繄誰與歸興言及此涕血交頤觴豆甚薄公其享之嗚呼哀哉尚享按公集熊公刻於庚辰冬日而遺事識於夏日云余既刻忠簡集吳興友人潘宗玉氏復以家藏宗公遺事鈔本見示屬瀫上友人章無逸氏為之訂次繫公集後無逸名有成冬誤夏也至遺事詞氣中多蔓復無史家敘述之法然不敢效宋學士編潘舍人年譜取其理通者為之特稍訂其甚者而後綴三學祭文及哭公詩人吳公芾及一詩并序兹將黃文獻公潛讀遺事詩附後而祭文摘附文獻詩後其芾長篇巳載原刻不宜獨入其名一詩深恨汪黃沮公然未能殺公也忠之見厄於奸天運國勢使然與奸何與而奸之受誅忠實柢之序詩從芟以俟知者後學㑹稽王廷曾識宗忠簡集卷七
