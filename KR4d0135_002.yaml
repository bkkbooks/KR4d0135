body:
  text: 宗忠簡集卷二宋宗澤撰表賀康王即位表二聖蒙塵乾坤改色萬邦徯后天日宜臨亟回謙避之誠丕慰顒昻之望人神胥慶彛夏聳傳臣中賀竊以大宋之應天順人太祖之創業垂統凡奕世盈成之嗣皆挺生睿智之姿其所以繼繼繩繩莫匪乎兢兢業業浸久太平之習稍忘禦侮之圖顧大臣熟此燕安致強敵抵滋猖獗信和盟之妄議墮邀劫之姦謀人咸哀痛而籲天士欲奮張而盡敵然萬方之是賴須一人之作猷果下恤於蒸黎允上符於穹昊恭惟皇帝陛下稟虞舜之大孝體周文之小心既不得巳而有臨宜大有為而無倦如陽方復萬物自春似日初升九幽洞照嘉靖中興之事業戡除外侮之凶殘俾孚於休以永至治臣薾然朽質偶此熙辰屬總師徒進臻河朔慶雲龍之會阻陪鳴玉之班依日月之光第切傾葵之望臣無任云云聞車駕將還闕賀表建炎元年十月通前後表疏係第九次奏請臣今月六日承遞報車駕將還闕者恭聞明命肅詔回鑾歡騰率土之謠和浹中天之氣里閭喜悅如嬰孺之將見慈親道路光輝若翳霾而忽曕白日人情至此天意可知中謝竊以列聖格言先正垂裕天難諶而聰明自我人至衆而好惡匪殊但觀自我之是非可驗匪殊之嚮背是知人所欲者自然天亦從之所以君子不務小同自然天下能成大順恭惟皇帝陛下以道觀政以德行仁密韜神武之機獨幹乾剛之斷整齊萬乘來歸九重宇宙澄鮮預想屢豐之慶廟堂肅穆式隆宏濟之休昊穹降福以穰穰寰海來宗而濟濟六軍有雷動雲行之勢四彛蒙風驅電掃之威赫奕重光崇髙再造列辟駿奔而忭舞寰區竭蹶以欽承臣無任云云聞車駕議還闕賀表建炎元年十月通前後表疏係第十次奏請恭膺明命肅詔回鑾下蘇徯后之情仰對在天之意蔥蔥佳氣增光二百年之休勉勉逺猷駿惠大一統之盛佇觀丕應聿享咸寧中謝竊以太祖肇基奕世嗣服並據本根之地宏施實德之風宅四表而率服吾君奄九有而來崇真主曩緣辰告暫聽時巡知人久戀於睿慈聚議獨形於英斷欲繼志而述事遂斡乾而轉坤時方奉於詔書顧忽聞於雷震是天喜悅為人音聲想衆歡呼應時舞蹈河伯安流而迎駕雨師灑道以清塵兒童爭提㩦於壺漿父老願平治於道路里閭皥皥田野熙熙收兩河山寨之心鎮逺徼彛人之聼然後御端門而肆赦滌舊染以維新欵宗廟而告歸儼威容而如在憂勤祖述恭儉緝熙大成有截之功永以無疆惟恤臣無任云云乞回鑾表建炎元年九月通前後表疏係第三次奏請臣聞君陳之尹東郊深敕謀猷之告后宋璟之守京兆極明得失而進言皆所以啓沃君心針規政闕矧荷聖神之知眷有懷宗社之安危敢忘斧鉞之誅仰瀆冕旒之聽中謝竊以天子居九重之奧窔非務蒙塵京師為諸夏之本根當思奠枕倘值艱虞之會未詳利害之機或輕萬乘以逺巡致駭四方之羣聽則本根斯弱華夏奚安逺稽唐室之浸微實乃商鑒之可擬越自運啓炎宋卜都大梁宅中而包三萬里之幅員創業以貽二百年之基緒重熙纍洽端拱垂衣非緣三嵗之親祠曷見六龍之逺御曩值澶淵之寇或陳楚蜀之巡賴有直臣卒排異議星奔一鏃膽落四彛豈圖姦蠧之擅朝繼被仇方之猾夏二聖既以北狩中都幾至內訌所幸人無離心市不易肆日徯真人之繼統心傾我后之來蘇果致宗廟降靈上穹悔禍皇帝陛下天縱上聖運叶中興載纘璇圖增光火德親屈鑾輿以冒犯霜露躬整師旅以殄滅虇􅀢然行在久留於别都清蹕未回於魏闕逆徒尚熾羣盜繼興比聞逺近之驚傳似有東南之巡幸此誠王室安危之所繫天下治亂之所關仰祈聖慮之深詳宜戒屬車之輕動且以中國之倚恃實為兩河之盛疆前自敵騎長驅列城畏遁獨懷忠憤糾進義兵力抗賊鋒率多俘馘然久闕王師之助援己深民庶之暌疑近者雖時遣將徂征渡河深入尚闕膚公之奏先傳南幸之音慮增四海之疑心謂置兩河於度外因成解體未諭聖懷倘敵人乘之而縱橫則中國將何以制禦臣叨膺委寄代匱留司兹緣密託於雲天偶遂敉寧於畿甸遽報翠華之移幸深虞中外之難安願罄孤忠冀回淵聽昔奉春委輅建䇿猶止洛陽之都張禹驛馬抗章尚返江陵之駕矧丁聖世曷愧前修伏願陛下秉虞舜察言之明體成湯從諫之聖輟巡南服回駕汴都以安東北兵民之情以慰溥率雲霓之望則人神悅豫彛夏謐寧邊陲指日以肅清盜賊不令而衰息咸資睿斷用杜危機瀝悃扣閽罔避龍鱗之觸傾都拭目佇迎天仗之還願俯徇於愚誠誓益堅於忠報臣云云乞回鑾表建炎二年正月通前後表疏係第十三次奏請臣言今月二十四日準范世延等齎降詔命車駕將欲還闕者比遣屬僚仰輸誠款薦瀆蓋髙之聽益懷履薄之憂睿眷矜憐特賜回鑾之詔愚忠戀慕愈增徯后之誠中謝竊以萬乘來歸六龍扈從雨伯前驅而灑道河神迎駕以安流不煩夾道之壺漿自有隨師之甘露人情皥皥如聼南風天意昭昭乃回西顧再斡乾坤之造重增宇宙之光赫有宋之中興奄多方而大定想瞻原廟應加肅穆之儀爰御端朝愈見鬱蔥之氣雍容對越駿惠緝熙宏收率土之歡誕作普天之宥下所欲者上必從之恭惟皇帝陛下踐祚應天時巡淮甸備歷艱難之事盡昭勤儉之風謂京師為諸夏本根而元后作斯民父母念本根不宜搖動謂父母自合依歸兹俄奉於詔音衆但知於抃舞願陛下繼志述事整頓萬機願陛下命將出師邀迎二聖平蕩叢彛之窟保全疆埸之封坐視穆清時躋仁夀臣云云乞回鑾表建炎二年三月通前後表疏係第十八次奏請臣言屢奏囊封疊干宸扆聖主未頒於明命愚臣敢避於嚴誅謹攄悃愊之誠再瀆髙明之聽願從人欲以格天休中謝竊以京師是諸夏本根元后作斯民父母本根如已深固則枝葉自爾扶疏父母若未安寧則子孫無緣泰定兹實簡編之成理蓋非里巷之浮言始陛下踐祚於應天萬方皆欣其有主近陛下駐蹕於淮甸百姓因此而致疑何前日之郡縣靖共而近時之盜賊荒擾繇勤王者弗恤與救駕者靡憐贊主上逺父與兄乃巡南服助姦臣贖壻與子欲棄中原百為祗肆於誕謾一事罔繇於誠實迹狀如此情意可知伏望陛下斷自淵衷早回法駕據本根而致治體父母以視民俾人自勉勉以來主天亦穰穰而降福恩霈端門之赦歡收寰宇之心俗既逺罪以歸農敵亦望風而遁迹王室自兹再造大宋繇是中興黎民時雍萬世永賴果臣有飾非之語則臣甘誤國之誅狂妄奏陳憤悶流涕臣云云乞回鑾表建炎二年四月通前後表疏係第十九次奏請臣某言易謂省方書言輯瑞是天子或時巡於下土邦人可瞻仰於至尊然古今之事勢有殊宜觀會通而制治况上下之人情至切思聞詔命以回鑾故老臣再瀝於血誠願聖主早形於睿斷意狂罪大語出涕零中謝臣伏聞先有格言事必師古藝祖應天而受成命太宗繼志以集大勳列聖所以繼繼繩繩諸福所以穰穰簡簡實在京師本根之地以為寰宇朝覲之天端拱而坐九重穆清而朝萬國陛下纘承寶緒紹述丕圖當奄九有而有為體三無而無外奈有姦臣之臆説與憑仇方之誕辭忘周宣之中興循晉惠之往轍天下之來勤王者使去義夫之黥救駕者弗知兩河保山寨之忠民四方作草竊之賊子皆緣陛下久駐蹕於淮甸咸思慕於翠華懷抑鬱而籲天罔聞致猖狂而遷善無路果還法駕大肆鴻恩人當澡雪以歸農敵亦遁逃而屏迹遹追一統之大丕昭萬世之休兹甚易知而易行勿謂難測而難識但去阿諛柔佞之語而宏剛健中正之風必天日之照臨應祖宗之保祐一人有慶庶績其凝臣無任云云遺表建炎二年七月心期許國每輸扶廈之忠死不忘君猶積戀軒之意魂魄將離於形體精忱願達於冕旒中謝伏念猥以朴忠受知淵聖擢自困躓羈窮之際付以寇敵往來之衝適遇陛下出總元戎察臣粗著榮效坐籌密計俾臣得預屬僚逮夫踐祚之初首録孤危之迹寇攘未泯暫為淮甸之巡宗廟斯存委守留司之鑰力小任重志大心勞誓殄仇方再安王室但知懷主甘委命於鴻毛無復偷生期裹尸於馬革夙宵以繼寢食靡寧斯民獲奠枕之安北馬無飲河之意事為紛至黽勉惟多回視頽齡巳迫桑榆之晚景益堅素節每期松柏之後雕豈謂餘生忽先朝露尚扶病以治事敢愛已以顧私隂陽之寇洊深藥石之功莫效少延殘喘庶畢願言昨有招安到楊進等約其衆多無慮百萬昔嘗為寇頗聚衆以震師今巳革心欲為國而戡難足踵道路雲集都城巳涓吉而戒塗擬成功於指日干戈未舉舟壑忽移神爽飛揚長抱九泉之恨功名卑劣尚貽千古之羞仰憑睿眷之深必無生死之異屬臣之子記臣之名力請回鑾亟還京闕上念社稷之重下慰黎民之心命將出師大震雷霆之怒救焚拯溺出民水火之中夙荷君恩敢忘尸諌顒昻法座無繇再望於清光枯朽微生從此永辭於宸扆臣無任云云謝親札令縱遣敵使表建炎元年八月知開封府日懷柔逺人親灑宸翰既哀矜於外使復肆宥於愚臣仰承曠蕩之湛恩但增感涕恭俟熒煌之法駕早賜回鑾中謝伏念臣垂釣渭濵耦耕莘野居厲舉毛之志誓端造膝之誠斷斷無他皇皇有素偶承宣於滏水辱顧盻於潛龍依日角之照臨見天顔之咫尺恪攄情悃瀝竭論思願戡外侮之艱難力助中興之事業曩聞敵使祗齎荆楚之書因憤戎心失奉本朝之意是藉口以覘虛實欲合衆以苟侵陵實不憤於誕謾遂乞收於囹圄庶全國體以爍姦謀豈敢涉於自專乃上貽於北顧恐懼承旨倉惶改圖文列雲漢之昭回精神滉漾筆現奎躔之赫奕耳目疏通旋收錯愕之魂仰認撫綏之意更聽警蹕永保生成臣云云除京城留守兼開封尹謝賜對衣金帶表建炎元年八月猥叨眷奬併冒寵光分內府之衣而副之兼金出上廄之馬而飾以華較曳婁知感負乘增羞伏念臣濫中儒科泛駕仕路偶緣遭遇洊被使令縈帶為城本無善䇿下車搏虎徒有壯心雖殫犬馬之勞曾乏絲毫之效敢圖異數誤逮孤忠不稱身章尤慙蕃錫此蓋伏遇皇帝陛下法天之健躬攬萬機如日之明光被九有察臣腹心忠義曲賜顧憐知臣蹤迹羈單每加覆露故令衰朽亦玷恩榮臣謹當克勵駑庸勉效綿薄雖逼桑榆之景敢渝金石之心知無不為深戒容身之計老當益壯永懷報主之忠臣無任云云謝降詔奬諭表建炎元年八月守麟符之兩月方懼罔功下漢札於九天遽叨睿奬恩言曲逮俯已增榮中謝竊惟京邑衆大之居實為諸夏本根之地封畿廣逺民物浩穰豪強萃聚而彈壓當先姦伏紛拏而發摘匪易比在熙平之盛尚稱綏撫之難况當兵火被毒之餘繼以府治曠官之後閭閻雕敝綱紀隳頽凶殘罔畏於明刑掠奪公行於白晝仰勤憂顧誤被簡求而臣學昧知方器非任重徒抱孤忠而許國妄期薄效以報君初抵都畿首蠲宿蠧鉏耰姦暴剪蕩寇攘良民獲奠枕之安昏夜罕鳴枹之警悉奉行於條詔偶坐格於謐寧陛下憐臣帥府參籌叨塵簮履之舊念臣神州領尹粗宣犬馬之勞特升祕殿之隆名仍畀留司之重寄深虞尸素仰玷倚毗兹蓋伏遇皇帝陛下柔如神之智以臨照百官體逮下之仁以駕馭羣俊彰德非專於爵賞念功思奉於綸言冀風勸於臣鄰俾日新於事業致兹庸陋獲預寵褒臣敢不祗服訓詞恪司管鑰金城雉堞嚴守禦以增崇甸服田疇咸勞來而安輯經費務先於實粟練兵敢怠於防秋預畫事宜悉符告戒刻宸章於琬琰式昭天府之榮觀傳寶訓於雲來永侈老臣之知遇更殫九殞少補萬分臣無任云云謝中使傳宣撫諭表建炎元年十月星使自天玉音在耳恭被聖神之賜頓增畿甸之光臣固衰微倐望天顔於咫尺人咸慶抃願隨獸舞以駿奔感戴而思涕淚以血中謝恭惟皇帝陛下聰明睿智恭儉憂勤稟天縱之多能亶日新之盛德整淵衷之孝悌思沙漠之父兄天鑒昭回必助恭行之罰人心激勵盡懷敵愾之誠因矜浩穰之都遂遣皇華之命里閭見九天之軺從競夾道以焚香父老聞萬嵗之歡呼但吞聲而飲泣伏望陛下誕宣溫詔早敕回鑾庶寬大旱之望雲式慰調飢之念食卑誠懇切輿論傾依臣無任云云謝收捕開封府稱御前收買珠玉仍出榜告諭都人表建炎元年十月基王化而宅域中端臨萬國躬儉寶以先天下懋迪羣黎宸翰誕頒民風丕變朝野識德意之所嚮邦家知泰階之可期伏讀訓辭第增感涕中謝恭以治自近始化繇躬行儀倡肇黼扆之嚴視聽徹要荒之表好惡所示治忽可稽弗剪茅茨堯俗於變躬履革舄漢治勃興深惟治化之端實以朴儉為本恭惟皇帝陛下秉德紹統建極御圖誠意正心以齊家國復朴敦本以律士民念國步之猶艱慨民俗之浸靡克勤克儉去泰去奢屛服用玩好之奇聚左右圖書之富申嚴厲禁豈特却璀璨之珍昭示儉純蓋將揚絲綸之化農知重榖而力穡士知守義以遵繩革蜉蝣之僣奢成行葦之忠厚一人表正四海風傾臣猥以菲才誤膺繁使惟知朴直以報國不敢偷薄以示民仰聖訓之丁寧激孤忠而抃躍臣敢不播揚純儉之化恪遵禁令之嚴一道德以同風冀追太古修政事而攘敵行見丕平臣無任云云謝除資政殿學士進階朝奉大夫表建炎二年二月祕殿參華文階序進繇被湛恩之厚靡容瀝懇之辭荷寵若驚撫躬增愧中謝竊以真皇御宇之際景德紀年之時將優待於近臣乃肇修於新職學士有資政之號朝廷為盛事之傳舉兹以旃名稱至重若樞廷之均逸始獲新除非丞轄之辭榮未嘗輕授豈意衰遲之迹亦叨超躐之恩伏念臣天賦朴忠人推愚直方帥幕宣威之日嘗贊運籌暨帝暉繼照之辰誤蒙序爵興言遭遇良劇兢凌俄分青社之符旋拜夷門之命就司留鑰俾衛上都初無槃木之先容實出冕旒之獨斷忠懷子翼不忘河內之孤功謝鄼侯豫謹關中之守深慚么麼曷副使令敢圖繼被於褒章濫賜比蹤於前哲顧惟宿姦之讒箭無以中傷乃如大佞之笑刀莫能潛害爰念保全之德每懷補報之恩敢望崇資洊加朽質循牆欲避渙汗難回兹蓋伏遇皇帝陛下堯舜性仁湯文義洽慶賞刑威之馭衆尤先崇德而報功聰明睿智以臨人固不泄邇而忘逺宜收簪履用慰桑榆光華顯設之榮恐懼褒優之過臣謹當堅持晚節愈激懦衷讀回鑾之詔書但形鼓舞感懋官之德意誓竭靡捐臣無任云云謝賜對衣鞍馬表建炎二年二月服思不稱始貴身章馬志無疆方為駿骨況帶被兼金之飾而鞍如華較之榮仰荷寵私倍增慚惕中謝竊念臣蓑衣冷族駑廄下材本操耒耜以耕雲偶備驅馳而獵道恭承褒字巳驚在笥之羞景仰天飛尤激戀軒之望既免回旋而見肘敢忘夙夜以加鞭兹蓋伏遇皇帝陛下天道覆臨萬邦衣被乾剛運動四海駿奔灼見三有之心迪知九德之行致臣衰朽亦被恩榮臣敢不曵婁懷慚負乘知愧素絲可效誓堅正直之心小駟無能願竭周旋之力臣無任云云謝傳宣撫諭并賜茶藥表建炎二年三月皇華睿使溫潤訓詞仰膺覆燾之恩曲示眷憐之意孤忠鯁槩誓戡外侮之殘直道對揚庶贊中興之盛此誠激厲但涕交零中謝竊以太祖太宗基命定命其肇造本根之際必參稽年世之占卜既協於休祥事乃臻於泰定所以繼繼繩繩之治無非巍巍蕩蕩之資纍聖緝熙億年駿惠逮陛下入承於丕緒偶大臣密奏於偏言託曰時巡意圖偏伯忘宗廟朝廷之重違神明天地之心棄大一統之規模毁二百年之基業且天下是陛下之天下彼姦臣何恤於存亡如京師是陛下之京師想憸佞安知夫去就但知親屬歸在江湖寧顧中原變為荆棘臣薾然衰憊強爾支持曾無毫􅀢之功徒竊乾坤之造金符剛正同有闕文密緘蜀市之珍寵錫建溪之異仰叨殊眷願畢餘生但知力竭以報一人豈顧狂迷而忤三事伏望陛下奮乾剛之獨斷敷離照以旁觀特出宸衷早回法駕俾四海謳歌而來享使萬民竭蹶以嚮方用承滋至之休永貽無疆之賴臣無任云云宗忠簡集卷二
